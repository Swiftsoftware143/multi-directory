<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multi-Directory</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--teal:#0d9488;--teal-light:#14b8a6;--teal-bg:#f0fdfa;--bg:#f8fafc;--card:#fff;--text:#1e293b;--text-secondary:#64748b;--border:#e2e8f0;--sidebar:#0f172a;--sidebar-text:#94a3b8;--sidebar-active:#14b8a6;--danger:#ef4444;--danger-hover:#dc2626;--success:#22c55e;--warning:#f59e0b}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex}
a{color:var(--teal);text-decoration:none}a:hover{text-decoration:underline}
.login-container{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#0f172a 0%,#1e293b 100%);width:100%}
.login-card{background:var(--card);border-radius:16px;padding:40px;width:400px;max-width:90vw;box-shadow:0 25px 50px -12px rgba(0,0,0,.4)}
.login-card h1{font-size:1.75rem;color:var(--teal);text-align:center;margin-bottom:4px}
.login-card .tagline{text-align:center;color:var(--text-secondary);font-size:.9rem;margin-bottom:28px}
.login-card .error{background:#fef2f2;color:#dc2626;padding:10px 14px;border-radius:8px;font-size:.85rem;margin-bottom:16px;display:none}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:.85rem;font-weight:600;color:var(--text);margin-bottom:4px}
.form-group input,.form-group textarea,.form-group select{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-size:.9rem;outline:none;transition:border-color .2s;font-family:inherit}
.form-group input:focus,.form-group textarea:focus,.form-group select:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(13,148,136,.15)}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:10px 20px;border-radius:8px;font-size:.9rem;font-weight:600;cursor:pointer;border:none;transition:all .2s;gap:6px}
.btn-primary{background:var(--teal);color:#fff}
.btn-primary:hover{background:#0f766e}
.btn-secondary{background:#e2e8f0;color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{background:#cbd5e1}
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:hover{background:var(--danger-hover)}
.btn-sm{padding:6px 12px;font-size:.8rem}
.btn-full{width:100%}
.btn:disabled{opacity:.6;cursor:not-allowed}
.sidebar{width:260px;min-height:100vh;background:var(--sidebar);position:fixed;top:0;left:0;display:flex;flex-direction:column;z-index:100}
.sidebar-brand{padding:24px 20px 16px;border-bottom:1px solid #1e293b}
.sidebar-brand h2{color:var(--teal-light);font-size:1.1rem;letter-spacing:.5px}
.sidebar-brand p{color:var(--sidebar-text);font-size:.75rem;margin-top:2px}
.sidebar-nav{flex:1;padding:12px 0}
.sidebar-nav a{display:flex;align-items:center;gap:10px;padding:10px 20px;color:var(--sidebar-text);font-size:.85rem;transition:all .2s;border-left:3px solid transparent;cursor:pointer}
.sidebar-nav a:hover,.sidebar-nav a.active{color:#fff;background:rgba(20,184,166,.1);border-left-color:var(--teal-light)}
.sidebar-nav a .icon{font-size:1.1rem;width:22px;text-align:center}
.sidebar-footer{padding:16px 20px;border-top:1px solid #1e293b;font-size:.8rem;color:var(--sidebar-text)}
.sidebar-footer .user-email{color:#fff;font-weight:600;margin-bottom:4px}
.sidebar-footer a{color:var(--sidebar-text);cursor:pointer}
.sidebar-footer a:hover{color:var(--danger)}
.main{margin-left:260px;flex:1;padding:0;min-height:100vh}
.main-header{display:flex;align-items:center;justify-content:space-between;padding:20px 32px;border-bottom:1px solid var(--border);background:var(--card);position:sticky;top:0;z-index:50}
.main-header h1{font-size:1.4rem;font-weight:700}
.main-header-actions{display:flex;gap:8px;align-items:center}
.main-content{padding:24px 32px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px}
.card:hover{box-shadow:0 4px 12px rgba(0,0,0,.06)}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px;text-align:center}
.stat-card .num{font-size:2.25rem;font-weight:800;color:var(--teal);display:block}
.stat-card .label{font-size:.85rem;color:var(--text-secondary);margin-top:4px}
.stat-card .icon{font-size:1.5rem;margin-bottom:8px}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th,td{text-align:left;padding:10px 14px;border-bottom:1px solid var(--border);font-size:.85rem}
th{font-weight:600;color:var(--text-secondary);background:#f8fafc;font-size:.8rem;text-transform:uppercase;letter-spacing:.5px}
tr:hover td{background:#f8fafc}
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--card);border-radius:16px;width:520px;max-width:100%;max-height:90vh;overflow-y:auto;padding:28px}
.modal h2{font-size:1.2rem;margin-bottom:20px;color:var(--text)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
.toast-container{position:fixed;top:20px;right:20px;z-index:300;display:flex;flex-direction:column;gap:8px}
.toast{padding:12px 20px;border-radius:10px;font-size:.85rem;font-weight:500;box-shadow:0 10px 30px rgba(0,0,0,.15);animation:slideIn .3s ease;max-width:360px}
.toast.success{background:#14532d;color:#bbf7d0}
.toast.error{background:#7f1d1d;color:#fca5a5}
.toast.info{background:#1e3a5f;color:#bfdbfe}
.search-box{display:flex;gap:8px;margin-bottom:20px}
.search-box input{flex:1;padding:12px 16px;border:1px solid var(--border);border-radius:10px;font-size:.95rem;outline:none}
.search-box input:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(13,148,136,.15)}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.75rem;font-weight:600}
.badge.active{background:#14532d;color:#bbf7d0}
.badge.inactive{background:#7f1d1d;color:#fca5a5}
.badge.category{background:#1e3a5f;color:#bfdbfe}
.badge.key-active{background:#14532d;color:#bbf7d0}
.badge.key-revoked{background:#7f1d1d;color:#fca5a5}
input[type="color"].tc-color::-webkit-color-swatch-wrapper{padding:0}
input[type="color"].tc-color::-webkit-color-swatch{border:none;border-radius:4px}

.walkthrough-overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:400;display:none;align-items:center;justify-content:center}
.walkthrough-bg{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px)}
.walkthrough-card{position:relative;background:var(--card);border-radius:20px;padding:36px 32px 28px;max-width:480px;width:90%;text-align:center;box-shadow:0 30px 60px rgba(0,0,0,.4);animation:fadeIn .3s ease}
.walkthrough-icon{width:64px;height:64px;border-radius:50%;background:var(--teal-bg);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:1.75rem}
.walkthrough-card h3{font-size:1.2rem;color:var(--teal);margin-bottom:12px}
.walkthrough-card p{font-size:.9rem;color:var(--text-secondary);line-height:1.6;margin-bottom:24px}
.walkthrough-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.walkthrough-dots{display:flex;justify-content:center;gap:6px;margin-bottom:20px}
.walkthrough-dots span{width:8px;height:8px;border-radius:50%;background:var(--border);transition:all .2s}
.walkthrough-dots span.active{background:var(--teal);width:24px;border-radius:4px}
.help-icon{position:fixed;bottom:24px;right:24px;width:48px;height:48px;border-radius:50%;background:var(--teal);color:#fff;font-size:1.3rem;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 16px rgba(13,148,136,.4);z-index:150;border:none;transition:transform .2s}
.help-icon:hover{transform:scale(1.1)}
@keyframes slideIn{from{opacity:0;transform:translateX(100%)}to{opacity:1;transform:translateX(0)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:20px;height:20px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear;display:inline-block}
.spinner-teal{width:32px;height:32px;border:3px solid rgba(13,148,136,.2);border-top-color:var(--teal);border-radius:50%;animation:spin .6s linear;display:inline-block}
.empty-state{text-align:center;padding:40px 20px;color:var(--text-secondary)}
.empty-state .icon{font-size:3rem;margin-bottom:12px;opacity:.4}
.empty-state h3{font-size:1.1rem;margin-bottom:4px;color:var(--text)}
.empty-state p{font-size:.85rem}
.flex{display:flex;gap:6px;flex-wrap:wrap}
.mt-2{margin-top:8px}
.mb-2{margin-bottom:8px}
.copy-key{font-family:monospace;font-size:.8rem;background:#f1f5f9;padding:2px 6px;border-radius:4px;cursor:pointer}
.copy-key:hover{background:#e2e8f0}
@media(max-width:768px){
.sidebar{width:0;overflow:hidden}
.main{margin-left:0}
.card-grid{grid-template-columns:1fr}
.stat-grid{grid-template-columns:1fr 1fr}
.main-content{padding:16px}
.main-header{padding:16px;flex-wrap:wrap;gap:8px}
}
</style>
</head>
<body>
<div id="app"></div>
<script>
(function(){
var token=localStorage.getItem("ws_dir_token")||"";
var user=JSON.parse(localStorage.getItem("ws_dir_user")||"null");
var CP=location.hash.replace("#","")||"dashboard";

var g_sync=[];
async function loadBlog(){var el=document.getElementById("pageContent"),pa=document.getElementById("pageActions");pa.innerHTML='<button class="btn btn-primary btn-sm" onclick="showBlogModal()">+ New Post</button>';el.innerHTML='<div style="text-align:center;padding:40px"><span class="spinner-teal"></span></div>';try{var posts=await g("/api/v1/blog-posts");if(!posts.length){el.innerHTML='<div class="empty-state"><div class="icon">\ud83d\udcdd</div><h3>No Blog Posts Yet</h3><p>Create blog posts for SEO. Each post appears on the directory landing page.</p></div>';return;}var h='<div class="card-grid">';for(var i=0;i<posts.length;i++){var p=posts[i];h+='<div class="card" style="position:relative;overflow:hidden"><div style="font-size:.75rem;color:var(--text-secondary);margin-bottom:4px">'+esc(p.directory_name||p.directory_id||"")+' <span style="color:var(--border)">|</span> '+(p.published?'<span class="badge active">Published</span>':'<span class="badge inactive">Draft</span>')+'</div><h4 style="font-size:1rem;margin-bottom:6px;color:var(--text)">'+esc(p.title)+'</h4><p style="font-size:.8rem;color:var(--text-secondary);margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">'+esc((p.excerpt||p.content||"").substring(0,200))+'</p><div style="font-size:.75rem;color:var(--text-secondary)">'+(p.slug?'<code style="background:#f1f5f9;padding:1px 5px;border-radius:3px">/'+esc(p.slug)+'</code> ':'')+'<span>Updated: '+(p.updated_at||p.created_at||"").substring(0,10)+'</span></div><div class="flex" style="margin-top:10px"><button class="btn btn-sm btn-secondary" onclick="editBlog(\x27+p.id+\x27)">Edit</button><button class="btn btn-sm btn-danger" onclick="deleteBlog(\x27+p.id+\x27)">Delete</button></div></div>';}h+='</div>';el.innerHTML=h;}catch(e){el.innerHTML='<div class="empty-state"><div class="icon">\u26a0\ufe0f</div><h3>Error</h3><p>'+esc(e.message)+'</p></div>';}}
function showBlogModal(pid){var isEdit=!!pid;var ov=document.createElement("div");ov.className="modal-overlay";ov.id="blogModal";var dirOpts="";var dirs=g_sync;if(!dirs.length){dirOpts='<option value="">No directories found</option>';}else{for(var i=0;i<dirs.length;i++){dirOpts+='<option value="'+dirs[i].id+'">'+esc(dirs[i].name)+'</option>';}}var html='<div class="modal" style="width:600px"><h2>'+(isEdit?"Edit Blog Post":"New Blog Post")+'</h2><div class="form-group"><label>Title *</label><input id="bpTitle" placeholder="Post title"></div><div class="form-group"><label>Slug</label><input id="bpSlug" placeholder="auto-generated-from-title"><div style="font-size:.75rem;color:var(--text-secondary);margin-top:2px">URL path for this post. Leave blank to auto-generate.</div></div><div class="form-group"><label>Directory *</label><select id="bpDir">'+dirOpts+'</select></div><div class="form-group"><label>Excerpt (SEO snippet)</label><textarea id="bpExcerpt" rows="2" placeholder="Brief summary for search results"></textarea></div><div class="form-group"><label>Content * (HTML supported)</label><textarea id="bpContent" rows="8" placeholder="Full blog post content..."></textarea></div><div class="form-group"><label><input type="checkbox" id="bpPublished" checked> Published</label></div><div class="modal-actions"><button class="btn btn-secondary" onclick="closeModal(\x27blogModal\x27)">Cancel</button><button class="btn btn-primary" id="bpSaveBtn" onclick="saveBlog(\x27'+(isEdit?"\x27"+pid+"\x27":"null")+'\x27)">Save Post</button></div></div>';ov.innerHTML=html;document.body.appendChild(ov);if(isEdit){fetchBlogForEdit(pid);}}
async function fetchBlogForEdit(pid){try{var p=await g("/api/v1/blog-posts/"+pid);document.getElementById("bpTitle").value=p.title||"";document.getElementById("bpSlug").value=p.slug||"";document.getElementById("bpExcerpt").value=p.excerpt||"";document.getElementById("bpContent").value=p.content||"";document.getElementById("bpPublished").checked=p.published!==false;if(p.directory_id)document.getElementById("bpDir").value=p.directory_id;}catch(e){toast("Failed to load post: "+e.message,"error");}}
async function saveBlog(pid){var title=document.getElementById("bpTitle").value.trim();var dir=document.getElementById("bpDir").value;var content=document.getElementById("bpContent").value.trim();if(!title||!dir||!content){toast("Title, directory, and content are required","error");return;}var body={title:title,slug:document.getElementById("bpSlug").value.trim()||null,excerpt:document.getElementById("bpExcerpt").value.trim()||null,content:content,directory_id:dir,published:document.getElementById("bpPublished").checked};try{if(pid){await pu("/api/v1/blog-posts/"+pid,body);}else{await po("/api/v1/blog-posts",body);}toast("Post saved!");closeModal("blogModal");loadBlog();}catch(e){toast(e.message,"error");}}
async function editBlog(pid){showBlogModal(pid);}
async function deleteBlog(pid){if(!confirm("Delete this blog post?"))return;try{await dl("/api/v1/blog-posts/"+pid);toast("Post deleted");loadBlog();}catch(e){toast(e.message,"error");}}
async function loadLegals(){var el=document.getElementById("pageContent"),pa=document.getElementById("pageActions");pa.innerHTML='<button class="btn btn-primary btn-sm" onclick="showLegalModal()">+ New Page</button>';el.innerHTML='<div style="text-align:center;padding:40px"><span class="spinner-teal"></span></div>';try{var pages=await g("/api/v1/legal-pages");if(!pages.length){el.innerHTML='<div class="empty-state"><div class="icon">\u2696\ufe0f</div><h3>No Legal Pages Yet</h3><p>Create legal pages like Privacy Policy, Terms of Service, DMCA, Disclaimer. They appear in the footer of your directory landing pages.</p></div>';return;}var h='<div class="card-grid">';for(var i=0;i<pages.length;i++){var pg=pages[i];h+='<div class="card"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px"><h4 style="font-size:1rem">'+esc(pg.title)+'</h4><span class="badge '+(pg.published===false?"inactive":"active")+'">'+(pg.published===false?"Draft":"Published")+'</span></div><div style="font-size:.75rem;color:var(--text-secondary);margin-bottom:8px"><span>Type: '+esc(pg.page_type||"custom")+'</span>'+(pg.is_global?' <span style="color:var(--teal)">\ud83c\udf10 Shared across all directories</span>':'')+'</div><p style="font-size:.8rem;color:var(--text-secondary)">'+esc((pg.content||"").substring(0,200))+'</p><div class="flex" style="margin-top:10px"><button class="btn btn-sm btn-secondary" onclick="editLegal(\x27+pg.id+\x27)">Edit</button><button class="btn btn-sm btn-danger" onclick="deleteLegal(\x27+pg.id+\x27)">Delete</button></div></div>';}h+='</div>';el.innerHTML=h;}catch(e){el.innerHTML='<div class="empty-state"><div class="icon">\u26a0\ufe0f</div><h3>Error</h3><p>'+esc(e.message)+'</p></div>';}}
function showLegalModal(pid){var isEdit=!!pid;var ov=document.createElement("div");ov.className="modal-overlay";ov.id="legalModal";var html='<div class="modal" style="width:600px"><h2>'+(isEdit?"Edit Legal Page":"New Legal Page")+'</h2><div class="form-group"><label>Page Title *</label><input id="lgTitle" placeholder="e.g. Privacy Policy"></div><div class="form-group"><label>Page Type</label><select id="lgType"><option value="privacy">Privacy Policy</option><option value="terms">Terms of Service</option><option value="dmca">DMCA</option><option value="disclaimer">Disclaimer</option><option value="refund">Refund Policy</option><option value="cookies">Cookie Policy</option><option value="eula">EULA</option><option value="custom">Custom</option></select></div><div class="form-group"><label><input type="checkbox" id="lgGlobal"> Shared across all connected directories</label><div style="font-size:.75rem;color:var(--text-secondary);margin-top:2px">If checked, this page appears in the footer of ALL directories in the network (same legal pages for sister cities).</div></div><div class="form-group"><label>Content *</label><textarea id="lgContent" rows="10" placeholder="Full legal text. HTML supported."></textarea></div><div class="form-group"><label><input type="checkbox" id="lgPublished" checked> Published (visible in footer)</label></div><div class="modal-actions"><button class="btn btn-secondary" onclick="closeModal(\x27legalModal\x27)">Cancel</button><button class="btn btn-primary" id="lgSaveBtn" onclick="saveLegal(\x27'+(isEdit?"\x27"+pid+"\x27":"null")+'\x27)">Save Page</button></div></div>';ov.innerHTML=html;document.body.appendChild(ov);if(isEdit){fetchLegalForEdit(pid);}}
async function fetchLegalForEdit(pid){try{var p=await g("/api/v1/legal-pages/"+pid);document.getElementById("lgTitle").value=p.title||"";document.getElementById("lgType").value=p.page_type||"custom";document.getElementById("lgContent").value=p.content||"";document.getElementById("lgPublished").checked=p.published!==false;document.getElementById("lgGlobal").checked=p.is_global===true;}catch(e){toast("Failed to load page: "+e.message,"error");}}
async function saveLegal(pid){var title=document.getElementById("lgTitle").value.trim();var content=document.getElementById("lgContent").value.trim();if(!title||!content){toast("Title and content are required","error");return;}var body={title:title,page_type:document.getElementById("lgType").value,content:content,published:document.getElementById("lgPublished").checked,is_global:document.getElementById("lgGlobal").checked};try{if(pid){await pu("/api/v1/legal-pages/"+pid,body);}else{await po("/api/v1/legal-pages",body);}toast("Legal page saved!");closeModal("legalModal");loadLegals();}catch(e){toast(e.message,"error");}}
async function editLegal(pid){showLegalModal(pid);}
async function deleteLegal(pid){if(!confirm("Delete this legal page?"))return;try{await dl("/api/v1/legal-pages/"+pid);toast("Page deleted");loadLegals();}catch(e){toast(e.message,"error");}}

var DLS=[];
async function loadDeals(){var el=document.getElementById("pageContent"),pa=document.getElementById("pageActions");pa.innerHTML='<button class="btn btn-primary btn-sm" onclick="showDealModal(null)">+ New Deal</button>';el.innerHTML='<div style="text-align:center;padding:40px"><span class="spinner-teal"></span></div>';try{var deals=await g("/api/v1/deals");DLS=deals;if(!deals.length){el.innerHTML='<div class="empty-state"><div class="icon">\U0001f39f\ufe0f</div><h3>No Deals Yet</h3><p>Click "New Deal" to create your first deal or coupon. Deals appear on directory landing pages and business profiles.</p></div>';return;}var h='<div class="card-grid">';for(var i=0;i<deals.length;i++){var d=deals[i];var pct=d.discount_percent?" -"+d.discount_percent+"%":"";var dp=d.deal_price?"$"+d.deal_price:"";var op=d.original_price?" <s>$"+d.original_price+"</s>":"";h+='<div class="card"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px"><h4 style="font-size:1rem;color:var(--teal)">'+esc(d.title)+'</h4><span class="badge '+(d.status==="active"?"active":"inactive")+'">'+esc(d.status||"unknown")+'</span></div><div style="font-size:.85rem;margin-bottom:6px">'+dp+op+pct+'</div><div style="font-size:.75rem;color:var(--text-secondary);margin-bottom:8px"><span>Redeemed: '+(d.redemption_count||0)+'</span>'+(d.redemption_limit?' <span>| Limit: '+d.redemption_limit+'</span>':'')+(d.featured?' <span class="badge active">Featured</span>':'')+'</div><div class="flex"><button class="btn btn-sm btn-secondary" onclick="editDeal(\x27+d.id+\x27)">Edit</button><button class="btn btn-sm btn-secondary" onclick="claimDeal(\x27+d.id+\x27)">Claim</button><button class="btn btn-sm btn-danger" onclick="deleteDeal(\x27+d.id+\x27)">Delete</button></div></div>';}el.innerHTML=h+'</div>';}catch(e){el.innerHTML='<div class="empty-state"><div class="icon">\u26a0\ufe0f</div><h3>Error</h3><p>'+esc(e.message)+'</p></div>';}}

function showTemplateModal(tid){var isEdit=!!tid;var ov=document.createElement("div");ov.className="modal-overlay";ov.id="templateModal";var html='<div class="modal" style="width:600px"><h2>'+(isEdit?"Edit Template":"New Email Template")+'</h2><div class="form-group"><label>Name *</label><input id="tplName" placeholder="e.g. Welcome Email"></div><div class="form-group"><label>Subject *</label><input id="tplSubject" placeholder="e.g. Welcome to {{business_name}}!"></div><div class="form-group"><label>Category</label><select id="tplCategory"><option value="general">General</option><option value="deal">Deal</option><option value="review_request">Review Request</option><option value="submission">Submission</option><option value="newsletter">Newsletter</option></select></div><div class="form-group"><label>Body * (HTML supported)</label><textarea id="tplBody" rows="8" placeholder="Email body content..."></textarea></div><div class="form-group"><label>Variables (comma-separated, e.g. business_name, deal_title)</label><input id="tplVariables" placeholder="business_name, deal_title, user_name"></div><div class="modal-actions"><button class="btn btn-secondary" onclick="closeModal(\x27templateModal\x27)">Cancel</button><button class="btn btn-primary" onclick="saveTemplate(\x27'+(isEdit?"\x27"+tid+"\x27":"null")+'\x27)">'+(isEdit?"Save":"Create")+'</button></div></div>';ov.innerHTML=html;document.body.appendChild(ov);if(isEdit){loadTemplateForEdit(tid);}}

async function loadTemplateForEdit(tid){try{var t=await g("/api/v1/email/templates/"+tid);document.getElementById("tplName").value=t.name||"";document.getElementById("tplSubject").value=t.subject||"";document.getElementById("tplCategory").value=t.category||"general";document.getElementById("tplBody").value=t.body||"";document.getElementById("tplVariables").value=(t.variables||[]).join(", ");}catch(e){toast("Failed to load template","error");}}

async function saveTemplate(tid){var name=document.getElementById("tplName").value.trim();var subject=document.getElementById("tplSubject").value.trim();var body=document.getElementById("tplBody").value.trim();if(!name||!subject||!body){toast("Name, subject, and body are required","error");return;}var varsStr=document.getElementById("tplVariables").value.trim();var variables=varsStr?varsStr.split(",").map(function(v){return v.trim();}).filter(function(v){return v;}):null;var body={name:name,subject:subject,body:body,category:document.getElementById("tplCategory").value,variables:variables};try{if(tid){await pu("/api/v1/email/templates/"+tid,body);}else{await po("/api/v1/email/templates",body);}toast("Template saved!");closeModal("templateModal");loadEmailTemplates();}catch(e){toast(e.message,"error");}}

async function editTemplate(tid){showTemplateModal(tid);}

async function deleteTemplate(tid){if(!confirm("Delete this template?"))return;try{await dl("/api/v1/email/templates/"+tid);toast("Template deleted");loadEmailTemplates();}catch(e){toast(e.message,"error");}}

function showCampaignModal(cid){var isEdit=!!cid;var ov=document.createElement("div");ov.className="modal-overlay";ov.id="campaignModal";var html='<div class="modal" style="width:560px"><h2>'+(isEdit?"Edit Campaign":"New Campaign")+'</h2><div class="form-group"><label>Name *</label><input id="cmpName" placeholder="e.g. Welcome Series"></div><div class="form-group"><label>Status</label><select id="cmpStatus"><option value="draft">Draft</option><option value="sending">Sending</option></select></div><div class="form-group"><label>Scheduled Date</label><input id="cmpSchedule" type="datetime-local"></div><div class="form-group"><label>Recipient Filter (JSON)</label><textarea id="cmpFilter" rows="3" placeholder='{"status":"approved"}'></textarea></div><div class="modal-actions"><button class="btn btn-secondary" onclick="closeModal(\x27campaignModal\x27)">Cancel</button><button class="btn btn-primary" onclick="saveCampaign(\x27'+(isEdit?"\x27"+cid+"\x27":"null")+'\x27)">'+(isEdit?"Save":"Create")+'</button></div></div>';ov.innerHTML=html;document.body.appendChild(ov);if(isEdit){loadCampaignForEdit(cid);}}

async function loadCampaignForEdit(cid){try{var c=await g("/api/v1/email/campaigns/"+cid);document.getElementById("cmpName").value=c.name||"";document.getElementById("cmpStatus").value=c.status||"draft";if(c.scheduled_at)document.getElementById("cmpSchedule").value=c.scheduled_at.substring(0,16);document.getElementById("cmpFilter").value=c.recipient_filter?JSON.stringify(c.recipient_filter):"";}catch(e){toast("Failed to load campaign","error");}}

async function saveCampaign(cid){var name=document.getElementById("cmpName").value.trim();if(!name){toast("Name is required","error");return;}var filterVal=document.getElementById("cmpFilter").value.trim();var recipient_filter=null;if(filterVal){try{recipient_filter=JSON.parse(filterVal);}catch(e){toast("Invalid JSON in recipient filter","error");return;}}var body={name:name,status:document.getElementById("cmpStatus").value,scheduled_at:document.getElementById("cmpSchedule").value?new Date(document.getElementById("cmpSchedule").value).toISOString():null,recipient_filter:recipient_filter};try{if(cid){await pu("/api/v1/email/campaigns/"+cid,body);}else{await po("/api/v1/email/campaigns",body);}toast("Campaign saved!");closeModal("campaignModal");loadEmailCampaigns();}catch(e){toast(e.message,"error");}}

async function editCampaign(cid){showCampaignModal(cid);}

async function deleteCampaign(cid){if(!confirm("Delete this campaign?"))return;try{await dl("/api/v1/email/campaigns/"+cid);toast("Campaign deleted");loadEmailCampaigns();}catch(e){toast(e.message,"error");}}

async function sendCampaign(cid){if(!confirm("Send this campaign now?"))return;try{var r=await po("/api/v1/email/campaigns/"+cid+"/send");toast("Campaign sent! ("+(r.sent_count||0)+" sent)","success");loadEmailCampaigns();}catch(e){toast(e.message,"error");}}


function showCloneModal(srcId){g("/api/v1/directories").then(function(dirs){var src=null;for(var i=0;i<dirs.length;i++){if(dirs[i].id===srcId){src=dirs[i];break;}}if(!src){toast("Source directory not found","error");return;}var ov=document.createElement("div");ov.className="modal-overlay";ov.id="cloneModal";
ov.innerHTML='<div class="modal"><h2>\U0001F4CB Clone Directory</h2><p style="font-size:.85rem;color:var(--text-secondary);margin-bottom:16px">Cloning: <strong>'+esc(src.name)+'</strong></p>'+
'<div class="form-group"><label>New Directory Name</label><input id="cloneName" oninput="autoSlug()" placeholder="e.g. Fort Lauderdale Businesses"></div>'+
'<div class="form-group"><label>Slug</label><input id="cloneSlug" placeholder="e.g. fort-lauderdale"></div>'+
'<div class="form-group"><label>City / Location</label><input id="cloneCity" placeholder="e.g. Fort Lauderdale, FL"></div>'+
'<div class="form-group" style="display:flex;align-items:center;gap:12px;padding:10px 0"><label style="margin:0;cursor:pointer;display:flex;align-items:center;gap:8px"><input type="checkbox" id="cloneListings"> Clone listings (businesses)?</label></div>'+
'<div class="form-group" style="display:flex;align-items:center;gap:12px;padding:10px 0"><label style="margin:0;cursor:pointer;display:flex;align-items:center;gap:8px"><input type="checkbox" id="cloneLinkParent" checked> Link as sister city?</label></div>'+
'<div class="modal-actions"><button class="btn btn-secondary" onclick="closeModal(\x27cloneModal\x27)">Cancel</button><button class="btn btn-primary" onclick="doClone(\x27+src.id+\x27)">\U0001F680 Clone Directory</button></div></div>';
document.body.appendChild(ov);document.getElementById("cloneName").focus();});}
function autoSlug(){var nm=document.getElementById("cloneName").value.trim();if(nm){document.getElementById("cloneSlug").value=slugify(nm);}}
async function doClone(srcId){var nm=document.getElementById("cloneName").value.trim(),sl=document.getElementById("cloneSlug").value.trim(),ct=document.getElementById("cloneCity").value.trim(),cloneLis=document.getElementById("cloneListings").checked,linkPar=document.getElementById("cloneLinkParent").checked;if(!nm||!sl){toast("Name and slug are required","error");return;}
try{var src=await g("/api/v1/directories/"+srcId);var tc=src.template_config||{};var body={name:nm,slug:sl,description:"Cloned from "+src.name,template:src.template||"default",template_config:tc};if(ct)body.city=ct;var newDir=await po("/api/v1/directories",body);if(linkPar){var srcConn=tc.connected_directories||[];srcConn.push(newDir.id);await pu("/api/v1/directories/"+srcId,{connected_directory_ids:srcConn});var newTc=body.template_config||{};newTc.connected_directories=[srcId];await pu("/api/v1/directories/"+newDir.id,{template_config:newTc});}if(cloneLis){var listings=await g("/api/v1/directories/"+src.slug+"/businesses");for(var i=0;i<listings.length;i++){var l=listings[i];await po("/api/v1/directories/"+newDir.slug+"/businesses",{name:l.name,description:l.description||"",address:l.address||"",city:l.city||"",state:l.state||"",zip:l.zip||"",phone:l.phone||"",email:l.email||"",website:l.website||"",latitude:l.latitude,longitude:l.longitude,category_id:l.category_id});}}toast("Directory cloned successfully!");closeModal("cloneModal");loadDirectories();}catch(e){toast(e.message,"error");}}

function showConnModal(dirId){g("/api/v1/directories").then(function(dirs){var dir=null;for(var i=0;i<dirs.length;i++){if(dirs[i].id===dirId){dir=dirs[i];break;}}if(!dir){toast("Directory not found","error");return;}var tc=dir.template_config||{};var connIds=tc.connected_directories||dir.connected_directory_ids||[];var ov=document.createElement("div");ov.className="modal-overlay";ov.id="connModal";var list="<h2>\U0001F517 Sister Cities: "+esc(dir.name)+"</h2><p style='font-size:.85rem;color:var(--text-secondary);margin-bottom:12px'>Link directories to create a network. Connected directories show as Nearby on each other's pages.</p><div style='margin-bottom:12px'>";var found=0;for(var i=0;i<dirs.length;i++){if(dirs[i].id===dirId||!dirs[i].slug)continue;var isConn=false;for(var k=0;k<connIds.length;k++){if(connIds[k]===dirs[i].id||(typeof connIds[k]==="object"&&connIds[k].id===dirs[i].id)){isConn=true;break;}}var dTc=dirs[i].template_config||{};var dLoc=dTc.city||dirs[i].city||"";list+='<div class="card" style="margin-bottom:8px;padding:12px;display:flex;align-items:center;justify-content:space-between"><div><strong>'+esc(dirs[i].name)+'</strong>'+(dLoc?' <span style="font-size:.8rem;color:var(--text-secondary)">\U0001F4CC '+esc(dLoc)+"</span>":"")+'<br><span style="font-size:.75rem;color:var(--text-secondary)">'+esc(dirs[i].slug)+"</span></div>"+'<button class="btn btn-sm '+(isConn?"btn-danger":"btn-primary")+'" onclick="toggleConn(\x27'+dirId+'\x27,\x27'+dirs[i].id+'\x27,\x27'+esc(dirs[i].name).replace(/\x27/g,\x27\x27)+'\x27)">'+(isConn?"Disconnect":"Connect")+"</button></div>";found++;}list+=(found===0?"<p style='font-size:.85rem;color:var(--text-secondary)'>No other directories to connect.</p>":"")+"</div>";list+='<div class="modal-actions"><button class="btn btn-secondary" onclick="closeModal(\x27connModal\x27)">Done</button></div>';ov.innerHTML='<div class="modal" style="width:500px">'+list+"</div>";document.body.appendChild(ov);});}
async function toggleConn(dirId,targetId,targetName){try{var dir=await g("/api/v1/directories/"+dirId);var tc=dir.template_config||{};var connIds=tc.connected_directories||dir.connected_directory_ids||[];var idx=connIds.indexOf(targetId);var connecting;if(idx>-1){connIds.splice(idx,1);connecting=false}else{connIds.push(targetId);connecting=true}tc.connected_directories=connIds;await pu("/api/v1/directories/"+dirId,{template_config:tc,connected_directory_ids:connIds});var td=await g("/api/v1/directories/"+targetId);var ttc=td.template_config||{};var tConn=ttc.connected_directories||td.connected_directory_ids||[];var tidx=tConn.indexOf(dirId);if(connecting&&tidx===-1){tConn.push(dirId)}else if(!connecting&&tidx>-1){tConn.splice(tidx,1)}ttc.connected_directories=tConn;await pu("/api/v1/directories/"+targetId,{template_config:ttc,connected_directory_ids:tConn});toast((connecting?"Connected to ":"Disconnected from ")+targetName);closeModal("connModal");showConnModal(dirId);}catch(e){toast(e.message,"error");}}

async function doBulkExport(fmt){var el=document.getElementById("exportResult");el.innerHTML='<div style="text-align:center;padding:20px"><span class="spinner-teal"></span></div>';try{var r=await g("/api/v1/export/bulk?format="+fmt);el.innerHTML='<pre style="background:#f1f5f9;padding:16px;border-radius:8px;font-size:.8rem;overflow:auto;max-height:400px">'+esc(typeof r==="string"?r:JSON.stringify(r,null,2))+'</pre>';toast("Export ready");}catch(e){el.innerHTML='<div class="empty-state"><div class="icon">⚠️</div><h3>Error</h3><p>'+esc(e.message)+'</p></div>';}}

// ── Webhooks ────────────────────────────────────────────────────────

async function loadWebhooks(){var el=document.getElementById("pageContent"),pa=document.getElementById("pageActions");pa.innerHTML='<button class="btn btn-primary btn-sm" onclick="showWebhookModal(null)">+ New Webhook</button>';el.innerHTML='<div style="text-align:center;padding:40px"><span class="spinner-teal"></span></div>';try{var whs=await g("/api/v1/webhooks");if(!whs||!whs.length){el.innerHTML='<div class="empty-state"><div class="icon">🔗</div><h3>No Webhooks Yet</h3><p>Create webhooks to connect external services and n8n integrations.</p></div>';return;}var h='<div class="card-grid">';for(var i=0;i<whs.length;i++){var w=whs[i];h+='<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><h4>'+esc(w.name||"Webhook")+'</h4><span class="badge '+(w.active!==false?"active":"inactive")+'">'+(w.active!==false?"Active":"Inactive")+'</span></div>';h+='<div style="font-size:.75rem;color:var(--text-secondary);margin-bottom:6px"><code>'+esc(w.url||"")+'</code></div>';h+='<div style="font-size:.75rem;color:var(--text-secondary)">'+(w.last_triggered?'Last triggered: '+new Date(w.last_triggered).toLocaleString():'Never triggered')+'</div>';h+='<div class="flex" style="margin-top:8px"><button class="btn btn-sm btn-secondary" onclick="editWebhook(\''+w.id+'\')">Edit</button><button class="btn btn-sm btn-danger" onclick="deleteWebhook(\''+w.id+'\')">Delete</button></div></div>';}h+='</div>';el.innerHTML=h;}catch(e){el.innerHTML='<div class="empty-state"><div class="icon">⚠️</div><h3>Error</h3><p>'+esc(e.message)+'</p></div>';}}

function showWebhookModal(id){var isEdit=!!id;var ov=document.createElement("div");ov.className="modal-overlay";ov.id=isEdit?"whModalEdit":"whModal";var h='<div class="modal" style="width:480px"><h2>'+(isEdit?"Edit Webhook":"New Webhook")+'</h2>';h+='<div class="form-group"><label>Name *</label><input id="whName" placeholder="e.g. n8n Lead Sync"></div>';h+='<div class="form-group"><label>URL *</label><input id="whUrl" placeholder="https://hook.example.com/endpoint"></div>';h+='<div class="form-group"><label>Events (comma separated)</label><input id="whEvents" placeholder="listing.created, review.submitted"></div>';h+='<div class="form-group"><label><input type="checkbox" id="whActive" checked> Active</label></div>';h+='<div class="modal-actions"><button class="btn btn-secondary" onclick="closeModal(\''+(isEdit?"whModalEdit":"whModal")+'\')">Cancel</button><button class="btn btn-primary" onclick="saveWebhook(\''+(id||"")+'\')">Save</button></div></div>';ov.innerHTML=h;document.body.appendChild(ov);if(isEdit)fetchWebhookForEdit(id);}

async function fetchWebhookForEdit(id){try{var w=await g("/api/v1/webhooks/"+id);document.getElementById("whName").value=w.name||"";document.getElementById("whUrl").value=w.url||"";document.getElementById("whEvents").value=(w.events||[]).join(",");document.getElementById("whActive").checked=w.active!==false;}catch(e){toast("Failed to load: "+e.message,"error");}}

async function saveWebhook(id){var name=document.getElementById("whName").value.trim();var url=document.getElementById("whUrl").value.trim();if(!name||!url){toast("Name and URL are required","error");return;}var body={name:name,url:url,events:(document.getElementById("whEvents").value||"").split(",").map(function(s){return s.trim();}).filter(Boolean),active:document.getElementById("whActive").checked};try{if(id){await pu("/api/v1/webhooks/"+id,body);}else{await po("/api/v1/webhooks",body);}toast("Webhook saved!");closeModal(id?"whModalEdit":"whModal");loadWebhooks();}catch(e){toast(e.message,"error");}}

async function editWebhook(id){showWebhookModal(id);}

async function deleteWebhook(id){if(!confirm("Delete this webhook?"))return;try{await dl("/api/v1/webhooks/"+id);toast("Deleted");loadWebhooks();}catch(e){toast(e.message,"error");}}

// ── Domains ─────────────────────────────────────────────────────────

async function loadDomains(){var el=document.getElementById("pageContent"),pa=document.getElementById("pageActions");pa.innerHTML='<button class="btn btn-primary btn-sm" onclick="showDomainModal(null)">+ Register Domain</button>';el.innerHTML='<div style="text-align:center;padding:40px"><span class="spinner-teal"></span></div>';try{var doms=await g("/api/v1/domains");if(!doms||!doms.length){el.innerHTML='<div class="empty-state"><div class="icon">🌍</div><h3>No Domains Yet</h3><p>Register custom domains for your directories.</p></div>';return;}var h='<div class="card-grid">';for(var i=0;i<doms.length;i++){var d=doms[i];h+='<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><h4>'+esc(d.domain||d.name||"")+'</h4><span class="badge '+(d.verified?"active":"inactive")+'">'+(d.verified?"Verified":"Unverified")+'</span></div>';h+='<div style="font-size:.8rem;color:var(--text-secondary);margin-bottom:4px">'+(d.directory_name?"Directory: "+esc(d.directory_name):"")+'</div>';h+='<div style="font-size:.75rem;color:var(--text-secondary);margin-bottom:8px">'+(d.expires_at?'Expires: '+new Date(d.expires_at).toLocaleDateString():'No expiration')+'</div>';h+='<div class="flex"><button class="btn btn-sm btn-secondary" onclick="verifyDomain(\''+d.id+'\')">Verify</button><button class="btn btn-sm btn-danger" onclick="deleteDomain(\''+d.id+'\')">Delete</button></div></div>';}h+='</div>';el.innerHTML=h;}catch(e){el.innerHTML='<div class="empty-state"><div class="icon">⚠️</div><h3>Error</h3><p>'+esc(e.message)+'</p></div>';}}

function showDomainModal(id){var ov=document.createElement("div");ov.className="modal-overlay";ov.id="domainModal";var dirOpts="<option value=\'\'>Select directory</option>";if(window.g_sync){for(var i=0;i<window.g_sync.length;i++){dirOpts+='<option value="'+window.g_sync[i].id+'">'+esc(window.g_sync[i].name)+'</option>';}}var h='<div class="modal" style="width:480px"><h2>Register Domain</h2>';h+='<div class="form-group"><label>Domain *</label><input id="domName" placeholder="example.com"></div>';h+='<div class="form-group"><label>Directory</label><select id="domDir">'+dirOpts+'</select></div>';h+='<div class="modal-actions"><button class="btn btn-secondary" onclick="closeModal(\'domainModal\')">Cancel</button><button class="btn btn-primary" onclick="saveDomain()">Register</button></div></div>';ov.innerHTML=h;document.body.appendChild(ov);}

async function saveDomain(){var domain=document.getElementById("domName").value.trim().toLowerCase();if(!domain){toast("Domain is required","error");return;}var body={domain:domain,directory_id:document.getElementById("domDir").value||null};try{await po("/api/v1/domains",body);toast("Domain registered!");closeModal("domainModal");loadDomains();}catch(e){toast(e.message,"error");}}

async function verifyDomain(id){try{var r=await po("/api/v1/domains/"+id+"/verify");toast(r.message||"Verification "+(r.verified?"passed":"failed"),r.verified?"success":"error");loadDomains();}catch(e){toast(e.message,"error");}}

async function deleteDomain(id){if(!confirm("Delete this domain?"))return;try{await dl("/api/v1/domains/"+id);toast("Deleted");loadDomains();}catch(e){toast(e.message,"error");}}

// ── Branding (Color Extraction, Portfolio Sync) ────────────────────

async function loadBranding(){var el=document.getElementById("pageContent"),pa=document.getElementById("pageActions");pa.innerHTML='<div style="display:flex;gap:8px"><button class="btn btn-primary btn-sm" onclick="showColorExtract()">Color Extract</button><button class="btn btn-secondary btn-sm" onclick="doPortfolioSync()">Sync Portfolio</button></div>';el.innerHTML='<div style="text-align:center;padding:40px"><span class="spinner-teal"></span></div>';showColorExtract();}

async function showColorExtract(){var el=document.getElementById("pageContent");el.innerHTML='<h2 style="margin-bottom:16px">🎨 Brand Color Extraction</h2><p style="font-size:.85rem;color:var(--text-secondary);margin-bottom:16px">Extract brand colors from a business logo or image URL.</p><div class="search-box"><input id="extractUrl" placeholder="Image URL (logo, brand asset)" onkeydown="if(event.key===\'Enter\')doExtract()"><button class="btn btn-primary" onclick="doExtract()">Extract</button></div><div id="extractResults"></div>';}

async function doExtract(){var url=document.getElementById("extractUrl").value.trim();if(!url){toast("Enter an image URL","error");return;}var el=document.getElementById("extractResults");el.innerHTML='<div style="text-align:center;padding:40px"><span class="spinner-teal"></span></div>';try{var r=await g("/api/v1/extract?url="+encodeURIComponent(url));var colors=r.colors||r.palette||r;el.innerHTML='<h3 style="margin-bottom:12px">Extracted Colors</h3><div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px">';for(var key in colors){if(typeof colors[key]==="string"){el.innerHTML+='<div style="text-align:center"><div style="width:60px;height:60px;border-radius:12px;background:'+colors[key]+';border:2px solid var(--border);margin:0 auto 4px"></div><div style="font-size:.75rem;color:var(--text-secondary)">'+colors[key]+'</div></div>';}}el.innerHTML+='</div>';el.innerHTML+='<pre style="background:#f1f5f9;padding:16px;border-radius:8px;font-size:.8rem;overflow:auto">'+esc(JSON.stringify(colors,null,2))+'</pre>';}catch(e){el.innerHTML='<div class="empty-state"><div class="icon">⚠️</div><h3>Error</h3><p>'+esc(e.message)+'</p></div>';}}

async function doPortfolioSync(){var el=document.getElementById("pageContent");el.innerHTML='<div style="text-align:center;padding:40px"><span class="spinner-teal"></span></div>';try{var r=await po("/api/v1/admin/portfolio-sync",{});el.innerHTML='<div class="empty-state"><div class="icon">🔄</div><h3>Portfolio Sync '+(r.status==="processing"?"Started":"Complete")+'</h3><p>'+esc(r.message||"")+'</p></div>';toast(r.message||"Portfolio synced","success");}catch(e){el.innerHTML='<div class="empty-state"><div class="icon">⚠️</div><h3>Error</h3><p>'+esc(e.message)+'</p></div>';}}
</script>
