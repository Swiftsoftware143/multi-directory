<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZaarHub — Discover Your Local Community</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌐</text></svg>">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#faf9f6;--card:#fff;--text:#1c1917;--text-light:#78716c;--text-muted:#a8a29e;
  --border:#e7e5e4;--border-light:#f0efed;
  --teal:#0d9488;--teal-dark:#0f766e;--teal-light:#14b8a6;--bg-teal:#f0fdfa;
  --warm:#d97706;--warm-light:#fef3c7;
  --terracotta:#bd5a41;
  --accent:#7c3aed;--accent-light:#ede9fe;
  --green:#16a34a;--green-light:#dcfce7;
  --orange:#ea580c;--orange-light:#fff7ed;
  --pink:#db2777;--pink-light:#fdf2f8;
  --blue:#2563eb;--blue-light:#eff6ff;
  --shadow-sm:0 1px 2px rgba(0,0,0,.05);--shadow:0 4px 12px rgba(0,0,0,.08);--shadow-lg:0 12px 32px rgba(0,0,0,.12);
  --radius:12px;--radius-lg:16px;--radius-xl:24px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
a{color:var(--teal);text-decoration:none}
a:hover{text-decoration:underline}

/* ── Header / Nav ── */
.zh-header{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.95);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
.zh-header-inner{max-width:1280px;margin:0 auto;padding:0 24px;display:flex;align-items:center;height:68px;gap:16px}
.zh-logo{font-size:1.25rem;font-weight:800;color:var(--teal);letter-spacing:-.5px;display:flex;align-items:center;gap:6px;white-space:nowrap}
.zh-logo span{font-size:1.3rem}
.zh-logo small{font-size:.75rem;font-weight:400;color:var(--text-light);margin-left:2px}
.zh-city-select{position:relative;flex-shrink:0}
.zh-city-select select{appearance:none;background:var(--bg-teal);border:1px solid var(--teal);border-radius:var(--radius);padding:8px 32px 8px 12px;font-size:.85rem;font-weight:600;color:var(--teal-dark);cursor:pointer;outline:none;min-width:160px}
.zh-city-select::after{content:'▾';position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:.7rem;color:var(--teal);pointer-events:none}
.zh-search-bar{flex:1;max-width:480px;position:relative}
.zh-search-bar input{width:100%;padding:10px 16px 10px 40px;border:1px solid var(--border);border-radius:100px;font-size:.9rem;outline:none;background:var(--bg);transition:all .2s}
.zh-search-bar input:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(13,148,136,.12)}
.zh-search-bar .icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:.9rem;color:var(--text-light)}
.zh-nav-links{display:flex;align-items:center;gap:8px;margin-left:auto;flex-shrink:0}
.zh-nav-links a{padding:8px 14px;border-radius:var(--radius);font-size:.85rem;font-weight:500;color:var(--text);transition:all .2s;white-space:nowrap}
.zh-nav-links a:hover{background:var(--bg-teal);color:var(--teal);text-decoration:none}
.zh-btn-primary{background:var(--teal);color:#fff !important;padding:8px 18px;border-radius:100px;font-weight:600}
.zh-btn-primary:hover{background:var(--teal-dark) !important}
.zh-hamburger{display:none;background:none;border:none;font-size:1.5rem;cursor:pointer;padding:4px;color:var(--text)}

/* ── Hero ── */
.zh-hero{background:linear-gradient(135deg,#0f172a 0%,#134e4a 50%,#0d9488 100%);padding:60px 24px 48px;text-align:center;position:relative;overflow:hidden}
.zh-hero::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle at 30% 40%,rgba(13,148,136,.15) 0%,transparent 60%),radial-gradient(circle at 70% 60%,rgba(20,184,166,.1) 0%,transparent 50%);pointer-events:none}
.zh-hero-inner{position:relative;max-width:720px;margin:0 auto}
.zh-hero h1{font-size:2.5rem;font-weight:800;color:#fff;line-height:1.15;margin-bottom:12px;letter-spacing:-.5px}
.zh-hero h1 span{background:linear-gradient(135deg,#5eead4,#2dd4bf);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.zh-hero p{font-size:1.1rem;color:#94a3b8;margin-bottom:28px;line-height:1.6}
.zh-hero-categories{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin-bottom:20px}
.zh-hero-cat{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:100px;color:#e2e8f0;font-size:.82rem;cursor:pointer;transition:all .2s}
.zh-hero-cat:hover{background:rgba(255,255,255,.2);border-color:rgba(255,255,255,.3);color:#fff;text-decoration:none}
.zh-hero-stats{display:flex;justify-content:center;gap:40px;margin-top:32px}
.zh-hero-stat{text-align:center}
.zh-hero-stat .num{font-size:1.5rem;font-weight:800;color:#5eead4;display:block}
.zh-hero-stat .label{font-size:.78rem;color:#94a3b8;margin-top:2px}

/* ── Sections ── */
.zh-section{padding:48px 24px}
.zh-section-inner{max-width:1280px;margin:0 auto}
.zh-section-title{font-size:1.35rem;font-weight:700;margin-bottom:4px}
.zh-section-sub{font-size:.9rem;color:var(--text-light);margin-bottom:24px}
.zh-section-header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:20px;flex-wrap:wrap;gap:8px}
.zh-section-header h2{font-size:1.25rem;font-weight:700}

/* ── City Cards Grid ── */
.zh-city-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
.zh-city-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.zh-city-card:hover{box-shadow:var(--shadow);border-color:var(--teal);transform:translateY(-2px)}
.zh-city-card .emoji{font-size:2rem;margin-bottom:8px}
.zh-city-card h3{font-size:1.05rem;font-weight:700;margin-bottom:4px}
.zh-city-card p{font-size:.82rem;color:var(--text-light);margin-bottom:8px}
.zh-city-card .count{font-size:.8rem;color:var(--teal);font-weight:600}
.zh-city-card .zh-featured-badge{position:absolute;top:12px;right:12px;background:var(--warm-light);color:var(--warm);font-size:.7rem;font-weight:700;padding:3px 10px;border-radius:100px}

/* ── Deals Carousel ── */
.zh-deals-scroll{display:flex;gap:16px;overflow-x:auto;padding-bottom:8px;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch}
.zh-deals-scroll::-webkit-scrollbar{height:4px}
.zh-deals-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.zh-deal-card{flex:0 0 300px;scroll-snap-align:start;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;transition:all .2s}
.zh-deal-card:hover{box-shadow:var(--shadow);transform:translateY(-2px)}
.zh-deal-img{height:140px;background:var(--bg-teal);display:flex;align-items:center;justify-content:center;font-size:2.5rem;color:var(--teal)}
.zh-deal-body{padding:16px}
.zh-deal-body h4{font-size:.95rem;font-weight:700;margin-bottom:4px}
.zh-deal-body .price{font-size:1.1rem;font-weight:800;color:var(--teal);margin-bottom:4px}
.zh-deal-body .price s{font-size:.85rem;color:var(--text-light);font-weight:400;margin-left:6px}
.zh-deal-body .biz{font-size:.78rem;color:var(--text-light)}
.zh-deal-body .deal-badge{display:inline-block;background:var(--warm-light);color:var(--warm);font-size:.7rem;font-weight:700;padding:2px 8px;border-radius:100px;margin-top:6px}

/* ── Activity Feed ── */
.zh-activity-list{display:flex;flex-direction:column;gap:10px}
.zh-activity-item{display:flex;align-items:flex-start;gap:12px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;transition:all .2s}
.zh-activity-item:hover{background:var(--bg-teal);border-color:var(--teal-light)}
.zh-activity-avatar{width:36px;height:36px;border-radius:50%;background:var(--bg-teal);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}
.zh-activity-body{flex:1;min-width:0}
.zh-activity-body .msg{font-size:.85rem;line-height:1.4}
.zh-activity-body .time{font-size:.75rem;color:var(--text-muted);margin-top:2px}
.zh-activity-body .stars{color:var(--warm);font-size:.8rem}

/* ── Events Grid ── */
.zh-event-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.zh-event-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;transition:all .2s}
.zh-event-card:hover{box-shadow:var(--shadow);transform:translateY(-2px)}
.zh-event-date{display:flex;align-items:center;justify-content:center;gap:4px;padding:10px;background:var(--accent-light);color:var(--accent);font-size:.75rem;font-weight:700}
.zh-event-body{padding:16px}
.zh-event-body h4{font-size:.95rem;font-weight:700;margin-bottom:4px}
.zh-event-body p{font-size:.82rem;color:var(--text-light);margin-bottom:6px}
.zh-event-body .meta{font-size:.78rem;color:var(--text-muted)}
.zh-event-body .rsvp{display:inline-block;margin-top:8px;background:var(--accent);color:#fff;padding:5px 14px;border-radius:100px;font-size:.78rem;font-weight:600}

/* ── CTA Banner ── */
.zh-cta{background:linear-gradient(135deg,#0f172a 0%,#134e4a 50%,#0d9488 100%);padding:56px 24px;text-align:center}
.zh-cta h2{font-size:1.75rem;font-weight:800;color:#fff;margin-bottom:8px}
.zh-cta p{font-size:1rem;color:#94a3b8;margin-bottom:24px;max-width:500px;margin-left:auto;margin-right:auto}
.zh-cta .zh-btn{display:inline-flex;align-items:center;gap:8px;padding:12px 28px;border-radius:100px;font-size:.95rem;font-weight:700;transition:all .2s;cursor:pointer;border:none}
.zh-cta .zh-btn-primary{background:#fff;color:var(--teal-dark)}
.zh-cta .zh-btn-primary:hover{background:var(--bg-teal);transform:translateY(-1px)}
.zh-cta .zh-btn-outline{background:transparent;border:2px solid rgba(255,255,255,.3);color:#fff;margin-left:12px}
.zh-cta .zh-btn-outline:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.5)}

/* ── Footer ── */
.zh-footer{background:#0f172a;padding:40px 24px;color:#94a3b8}
.zh-footer-inner{max-width:1280px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:32px}
.zh-footer h4{color:#e2e8f0;font-size:.85rem;font-weight:700;margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px}
.zh-footer a{display:block;padding:4px 0;font-size:.82rem;color:#94a3b8}
.zh-footer a:hover{color:#fff;text-decoration:none}
.zh-footer-bottom{border-top:1px solid #1e293b;margin-top:32px;padding-top:20px;max-width:1280px;margin-left:auto;margin-right:auto;font-size:.78rem;text-align:center}

/* ── Loading ── */
.zh-loading{text-align:center;padding:80px 24px;color:var(--text-light)}
.zh-spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--teal);border-radius:50%;animation:spin .6s linear;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── City Page ── */
.zh-city-hero{padding:48px 24px 32px;background:linear-gradient(135deg,#0f172a 0%,#134e4a 70%,#0d9488 100%);color:#fff;position:relative;overflow:hidden}
.zh-city-hero-inner{max-width:1280px;margin:0 auto;position:relative}
.zh-city-hero h1{font-size:2rem;font-weight:800;margin-bottom:6px}
.zh-city-hero .sub{color:#94a3b8;font-size:.95rem;margin-bottom:20px}
.zh-filter-bar{display:flex;flex-wrap:wrap;gap:8px}
.zh-filter-pill{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:100px;color:#e2e8f0;font-size:.8rem;cursor:pointer;transition:all .2s}
.zh-filter-pill:hover,.zh-filter-pill.active{background:rgba(255,255,255,.2);border-color:rgba(255,255,255,.3);color:#fff}
.zh-filter-pill.active{background:var(--teal);border-color:var(--teal);color:#fff}
.zh-city-content{max-width:1280px;margin:0 auto;padding:24px;display:grid;grid-template-columns:1fr;gap:24px}

/* ── View Toggle ── */
.zh-view-toggle .zh-toggle-btn{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 16px;font-size:.85rem;font-weight:600;cursor:pointer;color:var(--text-light);transition:all .2s}
.zh-view-toggle .zh-toggle-btn.active{background:var(--teal);color:#fff;border-color:var(--teal)}
.zh-view-toggle .zh-toggle-btn:hover:not(.active){border-color:var(--teal-light);color:var(--teal)}

/* ── Search Results ── */
.zh-search-hero{padding:40px 24px;background:linear-gradient(135deg,#0f172a 0%,#134e4a 50%,#0d9488 100%)}
.zh-search-hero-inner{max-width:720px;margin:0 auto}
.zh-search-hero h1{font-size:1.5rem;color:#fff;margin-bottom:16px}
.zh-search-hero .zh-search-bar{max-width:100%}

/* ── Responsive ── */
@media(max-width:768px){
  .zh-header-inner{padding:0 16px;gap:10px}
  .zh-logo small{display:none}
  .zh-nav-links{display:none}
  .zh-hamburger{display:block}
  .zh-nav-links.open{display:flex;flex-direction:column;position:absolute;top:68px;left:0;right:0;background:#fff;border-bottom:1px solid var(--border);padding:12px 16px;box-shadow:var(--shadow-lg)}
  .zh-hero h1{font-size:1.6rem}
  .zh-hero-stats{gap:20px}
  .zh-hero-stat .num{font-size:1.2rem}
  .zh-section{padding:32px 16px}
  .zh-city-grid{grid-template-columns:1fr}
  .zh-deal-card{flex:0 0 260px}
  .zh-city-select select{min-width:120px;font-size:.8rem}
  .zh-search-bar{max-width:200px}
}

/* ── City Page Biz Cards ── */
.zh-biz-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.zh-biz-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;display:flex;flex-direction:column;cursor:pointer;transition:all .2s}
.zh-biz-card:hover{box-shadow:var(--shadow);transform:translateY(-2px);border-color:var(--teal-light)}
.zh-biz-img{height:120px;display:flex;align-items:center;justify-content:center;font-size:2.5rem;color:var(--teal);overflow:hidden}
.zh-biz-img img{width:100%;height:100%;object-fit:cover}
.zh-biz-body{padding:14px}
.zh-biz-body h4{font-size:1rem;font-weight:700;margin-bottom:4px}
.zh-biz-body .stars{font-size:.82rem;color:var(--warm);margin-bottom:4px}
.zh-biz-body .addr{font-size:.8rem;color:var(--text-light);margin-bottom:4px}
.zh-biz-body .badges{display:flex;gap:4px;margin-bottom:4px}
.zh-biz-body .badge-owner,.zh-biz-body .badge-perk{display:inline-block;font-size:.7rem;font-weight:700;padding:2px 8px;border-radius:100px}
.badge-owner{background:var(--blue-light);color:var(--blue)}
.badge-perk{background:var(--warm-light);color:var(--warm)}
.zh-biz-actions{display:flex;gap:8px;margin-top:8px}
.zh-biz-actions .action{padding:6px 12px;border:1px solid var(--border);border-radius:100px;font-size:.78rem;font-weight:600;color:var(--text);transition:all .2s}
.zh-biz-actions .action:hover{border-color:var(--teal);color:var(--teal);background:var(--bg-teal);text-decoration:none}

/* ── Deal/Event cards (city page) ── */
.zh-deal-sm-grid,.zh-event-sm-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.zh-deal-card-sm,.zh-event-card-sm{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:all .2s;cursor:pointer}
.zh-deal-card-sm:hover,.zh-event-card-sm:hover{box-shadow:var(--shadow);transform:translateY(-1px)}
.zh-deal-sm-body{padding:14px}
.zh-deal-sm-body h4{font-size:.9rem;font-weight:700;margin-bottom:4px}
.zh-deal-sm-body .price{font-size:1rem;font-weight:800;color:var(--teal)}
.zh-deal-sm-body .biz{font-size:.78rem;color:var(--text-light)}
.zh-deal-sm-body .deal-badge{display:inline-block;background:var(--warm-light);color:var(--warm);font-size:.7rem;font-weight:700;padding:2px 8px;border-radius:100px;margin-top:4px}

</style>
</head>
<body>

<div id="app">
  <div class="zh-loading">
    <div class="zh-spinner"></div>
    <p style="margin-top:12px;font-size:.9rem">Loading ZaarHub...</p>
  </div>
</div>

<nav id="mobile-nav" class="zh-nav-links" style="display:none"></nav>

<script>
// ── Helpers ──
async function g(url){let r=await fetch('/api/v1'+url);if(!r.ok){let e=await r.json().catch(()=>({}));throw new Error(e.message||e.error||'Request failed')}return r.json()}
function esc(s){if(!s)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
function $$(s){return document.querySelector(s)}
function qa(s){return document.querySelectorAll(s)}
function ac(el,ev,fn){el.addEventListener(ev,fn)}
function ago(d){if(!d)return '';var s=Math.floor((Date.now()-new Date(d).getTime())/1000);if(s<60)return 'just now';if(s<3600)return Math.floor(s/60)+'m ago';if(s<86400)return Math.floor(s/3600)+'h ago';return Math.floor(s/86400)+'d ago'}
function toTitle(s){return s.replace(/-/g,' ').replace(/\b\w/g,c=>c.toUpperCase())}

// ── State ──
let state={page:'home',cities:[],homepageData:null,slug:'',searchQuery:'',filterCategory:'',loading:true,user:null}

// ── Router ──
// ── Auth State ──
var authUser=null
try{var au=localStorage.getItem('zh_user');if(au)authUser=JSON.parse(au)}catch(e){}

function isLoggedIn(){return authUser&&authUser.token}
function esc(str){if(typeof str!=='string')str=String(str||'');return str.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function toTitle(s){return s?s.replace(/-/g,' ').replace(/\b\w/g,function(c){return c.toUpperCase()}):''}
function ago(ts){var d=new Date(ts);var n=Date.now();var diff=Math.floor((n-d)/1000);if(diff<60)return'just now';if(diff<3600)return Math.floor(diff/60)+'m ago';if(diff<86400)return Math.floor(diff/3600)+'h ago';return d.toLocaleDateString()}
function qa(s){return[].slice.call(document.querySelectorAll(s))}

// ── Auth helpers ──
async function registerVisitor(email,password,name){
  var r=await fetch('/api/v1/visitor/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password,name})})
  var d=await r.json()
  if(!r.ok)throw new Error(d.error||'Registration failed')
  authUser={token:d.token,email:d.email,name:d.name,id:d.visitor_id}
  localStorage.setItem('zh_user',JSON.stringify(authUser))
  return authUser
}

async function loginVisitor(email,password){
  var r=await fetch('/api/v1/visitor/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})})
  var d=await r.json()
  if(!r.ok)throw new Error(d.error||'Login failed')
  authUser={token:d.token,email:d.email,name:d.name,id:d.visitor_id}
  localStorage.setItem('zh_user',JSON.stringify(authUser))
  return authUser
}

function logoutVisitor(){
  authUser=null
  localStorage.removeItem('zh_user')
  renderShell()
}

// ── Auth Modal ──
function showAuthModal(tab){
  var overlay=document.createElement('div')
  overlay.id='zhAuthOverlay'
  overlay.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);z-index:10000;display:flex;align-items:center;justify-content:center;padding:20px'
  overlay.innerHTML='\
<div style="background:var(--card,#fff);border-radius:16px;padding:32px;width:400px;max-width:100%;box-shadow:0 25px 60px rgba(0,0,0,.5);position:relative">\
  <button onclick="document.getElementById(\'zhAuthOverlay\').remove()" style="position:absolute;top:12px;right:16px;background:none;border:none;font-size:1.4rem;cursor:pointer;color:var(--text-light)">✕</button>\
  <h2 style="margin-bottom:4px;font-size:1.3rem;color:var(--teal)">🌟 Join the Community</h2>\

function switchAuthTab(tab){
  var lt=document.getElementById('zhAuthTabLogin')
  var rt=document.getElementById('zhAuthTabRegister')
  var lf=document.getElementById('zhLoginForm')
  var rf=document.getElementById('zhRegisterForm')
  var err=document.getElementById('zhAuthError')
  if(err)err.style.display='none'
  if(tab==='login'){
    if(lt)lt.style.cssText='flex:1;padding:10px;text-align:center;cursor:pointer;font-weight:600;color:var(--teal);border-bottom:2px solid var(--teal);margin-bottom:-2px;transition:all .2s'
    if(rt)rt.style.cssText='flex:1;padding:10px;text-align:center;cursor:pointer;font-weight:600;color:var(--text-secondary);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s'
    if(lf)lf.style.display='block';if(rf)rf.style.display='none'
  }else{
    if(rt)rt.style.cssText='flex:1;padding:10px;text-align:center;cursor:pointer;font-weight:600;color:var(--teal);border-bottom:2px solid var(--teal);margin-bottom:-2px;transition:all .2s'
    if(lt)lt.style.cssText='flex:1;padding:10px;text-align:center;cursor:pointer;font-weight:600;color:var(--text-secondary);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s'
    if(rf)rf.style.display='block';if(lf)lf.style.display='none'
  }
}

async function handleAuthLogin(){
  var email=document.getElementById('zhLoginEmail').value.trim()
  var pass=document.getElementById('zhLoginPass').value
  var err=document.getElementById('zhAuthError')
  if(!email||!pass){err.textContent='Please fill in all fields';err.style.display='block';return}
  try{
    var user=await loginVisitor(email,pass)
    document.getElementById('zhAuthOverlay').remove()
    renderShell()
    load()
  }catch(e){
    err.textContent=e.message;err.style.display='block'
  }
}

async function handleAuthRegister(){
  var name=document.getElementById('zhRegName').value.trim()
  var email=document.getElementById('zhRegEmail').value.trim()
  var pass=document.getElementById('zhRegPass').value
  var err=document.getElementById('zhAuthError')
  if(!name||!email||!pass){err.textContent='Please fill in all fields';err.style.display='block';return}
  if(pass.length<6){err.textContent='Password must be at least 6 characters';err.style.display='block';return}
  try{
    var user=await registerVisitor(email,pass,name)
    document.getElementById('zhAuthOverlay').remove()
    renderShell()
    load()
  }catch(e){
    err.textContent=e.message;err.style.display='block'
  }
}

async function toggleFavorite(bizId){

  try{

async function submitReview(bizId,rating,content,reviewerName){

  try{

// ── Claim Business ──
async function claimBusiness(bizId,phone){
  if(!isLoggedIn()){showAuthModal('login');return false}
  try{
    var r=await fetch('/api/v1/businesses/'+bizId+'/claim',{method:'POST',headers:{'Authorization':'Bearer '+authUser.token,'Content-Type':'application/json'},body:JSON.stringify({phone:phone})})

    return true

function route(){
  let hash=location.hash.slice(1)||'/';
  if(hash.startsWith('/city/') && hash.split('/').length >= 4){
    state.page='biz';state.slug=hash.split('/')[2];state.bizId=hash.split('/')[4]
  }else if(hash.startsWith('/city/')){
    state.page='city';state.slug=hash.split('/')[2];state.filterCategory=''
  }else if(hash.startsWith('/search/')){
    state.page='search';state.searchQuery=decodeURIComponent(hash.slice(8))
  }else if(hash==='/'||hash.startsWith('/?')){
    state.page='home'
  }else if(hash.startsWith('/deals')){
    state.page='deals'
  }else if(hash.startsWith('/events')){
    state.page='events'
  }else if(hash.startsWith('/saved')){
    state.page='saved'
  }else{state.page='home'}
  load()
}

window.addEventListener('hashchange',route)
window.addEventListener('load',route)

// ── Load ──
async function load(){
  state.loading=true;renderShell()
  try{
    if(!state.cities.length){
      var c=await g('/zaarhub/cities');state.cities=c.cities||c||[]
    }
    if(state.page==='home')await loadHomepage()
    else if(state.page==='city')await loadCityPage()
    else if(state.page==='search')await loadSearchResults()
    else if(state.page==='deals')await loadDealsPage()
    else if(state.page==='events')await loadEventsPage()
    else if(state.page==='biz')await loadBizPage()
    else if(state.page==='saved')await loadSavedPlaces()
  }catch(e){
    renderError(e.message)
  }
}

  // Category filter pills

  for(var i=0;i<cats.length;i++){

    catPills+='<span class="zh-filter-pill" data-cat="'+esc(ct.slug)+'" onclick="filterCity(\''+esc(ct.slug)+'\',this)">'

    if(b.has_deal)badges+='<span class="badge-perk">🎁 Perk</span>'
    var stars=b.rating?'★'.repeat(Math.round(b.rating))+'☆'.repeat(5-Math.round(b.rating)):''
    bizHtml+=`

    ${b.image_url?'<img src="'+esc(b.image_url)+'">':b.name[0]||'🏪'}
  </div>
  <div class="zh-biz-body">
    <h4>${esc(b.name)}</h4>
    <div class="badges">${badges}</div>

  }

  // Deals section
  var dealsHtml=''

    dealsHtml+=`

  </div>
</div>`
  }

  // Events section
  var eventsHtml=''
  for(var i=0;i<events.length;i++){
    var ev=events[i];var dd=new Date(ev.event_date)
    eventsHtml+=`
<div class="zh-event-card-sm">
  <div class="zh-event-date">📅 ${dd.toLocaleDateString('en-US',{month:'short',day:'numeric',hour:'numeric'})}</div>
  <div class="zh-event-body">

  }

  el.innerHTML=`
<div class="zh-city-hero">
  <div class="zh-city-hero-inner">
    <h1>${cityName}</h1>
    <p class="sub">${desc} — <strong>${bizCount} local spots</strong></p>

    ${deals.length?`

  setTimeout(function(){initCityMap(biz)}, 100)

// ── View Toggle (List / Map) ──
var currentView='list'
function switchView(view){
  currentView=view
  var listEl=document.getElementById('zhCityListView')
  var mapEl=document.getElementById('zhCityMapView')
  var toggleList=document.getElementById('zhToggleList')
  var toggleMap=document.getElementById('zhToggleMap')
  if(view==='list'){
    listEl.style.display='grid'
    mapEl.style.display='none'
    toggleList.classList.add('active')
    toggleMap.classList.remove('active')
  }else{
    listEl.style.display='none'
    mapEl.style.display='block'
    toggleList.classList.remove('active')
    toggleMap.classList.add('active')
    // Force map resize after showing
    if(window.cityMap) setTimeout(function(){window.cityMap.invalidateSize()}, 200)
  }
}

// ── City Map Initialization ──
var mapInitialized=false
function initCityMap(bizList){
  if(mapInitialized&&window.cityMap){
    // Already initialized, just show
    window.cityMap.invalidateSize()
    return
  }
  mapInitialized=true

  // Filter businesses with coordinates
  var points=bizList.filter(function(b){return b.latitude&&b.longitude})
  if(!points.length){
    document.getElementById('zhCityMap').innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-light)">📍 No location data available for this view</div>'
    return
  }

  // Calculate center from first point or average
  var lat=points[0].latitude
  var lng=points[0].longitude
  if(points.length>1){
    lat=points.reduce(function(s,b){return s+b.latitude},0)/points.length
    lng=points.reduce(function(s,b){return s+b.longitude},0)/points.length
  }

  try{
    var map=L.map('zhCityMap').setView([lat,lng], points.length>1?13:15)
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
      attribution:'&copy; <a href="https://openstreetmap.org/copyright">OpenStreetMap</a>',
      maxZoom:18
    }).addTo(map)
    window.cityMap=map

    // Add markers for each business
    var bounds=[]
    for(var i=0;i<points.length;i++){
      var p=points[i]
      var marker=L.marker([p.latitude,p.longitude]).addTo(map)
      var stars=p.rating?'★'.repeat(Math.round(p.rating))+'☆'.repeat(5-Math.round(p.rating)):''
      var popupContent='<strong>'+esc(p.name)+'</strong>'
      if(stars)popupContent+='<br>'+stars+(p.review_count?' ('+p.review_count+')':'')
      if(p.phone)popupContent+='<br>📞 '+esc(p.phone)
      popupContent+='<br><a href="#/city/'+state.slug+'/biz/'+p.id+'" style="color:var(--teal);font-weight:600">View Details →</a>'
      marker.bindPopup(popupContent)
      bounds.push([p.latitude,p.longitude])
    }

    // Fit map to all markers if multiple
    if(bounds.length>1) map.fitBounds(bounds,{padding:[30,30]})
  }catch(e){
    document.getElementById('zhCityMap').innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-light)">⚠️ Map could not be loaded</div>'
  }
}

function filterCity(slug,el){
  state.filterCategory=slug
  qa('.zh-filter-pill').forEach(function(p){p.classList.remove('active')})
  if(el)el.classList.add('active')
  // Reload with filter
  loadCityPage()
}

function renderSearchResults(r){

  var deals=r.deals||[]
  var total=r.total_count||biz.length
  var el=document.querySelector('#zh-content .zh-section .zh-section-inner')
  if(!el)return

  if(!biz.length&&!deals.length){
    el.innerHTML='<div style="text-align:center;padding:60px 24px"><div style="font-size:3rem;margin-bottom:12px">🔍</div><h3 style="margin-bottom:6px">No results found</h3><p style="color:var(--text-light)">Try a different search or browse by category</p></div>'
    return
  }

  var h='<div style="margin-bottom:16px"><strong>'+total+'</strong> results found</div>'
  if(biz.length){
    h+='<h3 style="margin-bottom:12px">🏪 Businesses</h3><div class="zh-biz-grid">'
    for(var i=0;i<biz.length;i++){
      var b=biz[i]
      var stars=b.rating?'★'.repeat(Math.round(b.rating))+'☆'.repeat(5-Math.round(b.rating)):''
      h+='<div class="zh-biz-card" onclick="location.hash=\'#/city/'+b.directory_slug+'/biz/'+b.id+'\">'+
        '<div class="zh-biz-img" style="background:'+(i%2===0?'var(--bg-teal)':'var(--accent-light)')+'">'+(b.image_url?'<img src="'+esc(b.image_url)+'">':b.name[0])+'</div>'+
        '<div class="zh-biz-body"><h4>'+esc(b.name)+'</h4>'+
        '<div class="stars">'+stars+' <span style="color:var(--text-light);font-size:.78rem">'+(b.review_count||0)+' reviews</span></div>'+
        (b.address?'<div class="addr">📍 '+esc(b.address)+'</div>':'')+
        (b.city?'<div class="addr">🏙️ '+esc(b.city)+'</div>':'')+
        '<div class="zh-biz-actions">'+(b.phone?'<a href="tel:'+esc(b.phone)+'" class="action">📞 Call</a>':'')+
        '</div></div></div>'
    }
    h+='</div>'
  }

  if(deals.length){
    h+='<h3 style="margin:20px 0 12px">🎁 Deals</h3><div class="zh-deal-sm-grid">'
    for(var i=0;i<deals.length;i++){
      var dl=deals[i]
      h+='<div class="zh-deal-card-sm"><div class="zh-deal-sm-body"><h4>'+esc(dl.title)+'</h4>'+
        (dl.deal_price?'<div class="price">$'+esc(dl.deal_price)+'</div>':'')+
        '<div class="biz">'+esc(dl.business_name||'')+'</div></div></div>'
    }
    h+='</div>'
  }

  el.innerHTML=h
}

        }).join(''):'<p style="color:var(--text-light);font-size:.85rem">No reviews yet — be the first!</p>')+'      </div>      <!-- Write Review -->      <div id="zhReviewForm" style="background:var(--bg-teal);padding:16px;border-radius:12px;margin-bottom:16px">        <h4 style="font-size:.95rem;margin-bottom:8px;font-weight:600">✍️ Write a Review</h4>        <div style="margin-bottom:8px">          <label style="font-size:.8rem;display:block;margin-bottom:4px;font-weight:500">Rating</label>          <div id="zhStarPicker" style="font-size:1.5rem;cursor:pointer">            <span data-star="1" onclick="pickStar(1)" style="color:var(--border)">★</span>            <span data-star="2" onclick="pickStar(2)" style="color:var(--border)">★</span>            <span data-star="3" onclick="pickStar(3)" style="color:var(--border)">★</span>            <span data-star="4" onclick="pickStar(4)" style="color:var(--border)">★</span>            <span data-star="5" onclick="pickStar(5)" style="color:var(--border)">★</span>          </div>        </div>        <div style="margin-bottom:8px">          <label style="font-size:.8rem;display:block;margin-bottom:4px;font-weight:500">Your thoughts</label>          <textarea id="zhReviewContent" placeholder="Share your experience..." style="width:100%;padding:10px;border:1px solid var(--border);border-radius:8px;font-size:.85rem;outline:none;resize:vertical;min-height:60px;font-family:inherit"></textarea>        </div>        <button onclick="handleSubmitReview('+bizId+')" style="padding:10px 20px;background:var(--teal);color:#fff;border:none;border-radius:8px;font-weight:600;cursor:pointer;font-size:.85rem">⭐ Post Review</button>      </div>\
    </div>\
  </div>\
</div></div>'
}


// ── Review Star Picker ──
var selectedRating=0
function pickStar(n){
  selectedRating=n
  var stars=document.getElementById('zhStarPicker')
  if(!stars)return
  var spans=stars.querySelectorAll('span')
  for(var i=0;i<spans.length;i++){
    spans[i].style.color=i<n?'var(--warm,#f59e0b)':'var(--border)'
  }
}

async function handleSubmitReview(bizId){
  if(!selectedRating){alert('Please select a rating');return}
  var content=document.getElementById('zhReviewContent').value.trim()
  if(!content){alert('Please write your review');return}
  var ok=await submitReview(bizId,selectedRating,content)
  if(ok){
    alert('✅ Review posted! Refreshing...')
    selectedRating=0
    document.getElementById('zhReviewContent').value=''
    loadBizPage()
  }
}

// ── Claim Business Form ──
function showClaimForm(bizId){
  if(!isLoggedIn()){showAuthModal('login');return}
  var overlay=document.createElement('div')
  overlay.id='zhClaimOverlay'
  overlay.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);z-index:10000;display:flex;align-items:center;justify-content:center;padding:20px'
  overlay.innerHTML='<div style="background:var(--card,#fff);border-radius:16px;padding:32px;width:420px;max-width:100%;box-shadow:0 25px 60px rgba(0,0,0,.5);position:relative">  <button onclick="document.getElementById(\'zhClaimOverlay\').remove()" style="position:absolute;top:12px;right:16px;background:none;border:none;font-size:1.4rem;cursor:pointer;color:var(--text-light)">✕</button>  <h2 style="margin-bottom:4px;font-size:1.3rem;color:var(--teal)">👑 Claim This Business</h2>  <p style="font-size:.85rem;color:var(--text-light);margin-bottom:20px">Verify ownership and get full control of your listing</p>  <div id="zhClaimError" style="background:#fef2f2;color:#dc2626;padding:8px 12px;border-radius:8px;font-size:.82rem;margin-bottom:12px;display:none"></div>  <div style="margin-bottom:12px">    <label style="font-size:.8rem;font-weight:600;display:block;margin-bottom:4px">Your Phone Number</label>    <input id="zhClaimPhone" type="tel" placeholder="(555) 123-4567" style="width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-size:.9rem;outline:none">    <div style="font-size:.75rem;color:var(--text-light);margin-top:4px">We\'ll call to verify your ownership of this business</div>  </div>  <button onclick="handleClaimBiz('+bizId+')" style="width:100%;padding:12px;background:var(--teal);color:#fff;border:none;border-radius:8px;font-weight:600;font-size:.95rem;cursor:pointer">Submit Claim Request →</button></div>'
  document.body.appendChild(overlay)
}

async function handleClaimBiz(bizId){
  var phone=document.getElementById('zhClaimPhone').value.trim()
  var err=document.getElementById('zhClaimError')
  if(!phone){err.textContent='Please enter your phone number';err.style.display='block';return}
  var ok=await claimBusiness(bizId,phone)
  if(ok){
    alert('✅ Claim submitted! The owner will verify shortly.')
    document.getElementById('zhClaimOverlay').remove()
    loadBizPage()
  }
}

// ── Saved Places Page ──
async function loadSavedPlaces(){
  var el=document.getElementById('zh-content')
  if(!isLoggedIn()){
    el.innerHTML='<div style="text-align:center;padding:80px 24px"><div style="font-size:3rem;margin-bottom:12px">❤️</div><h3 style="margin-bottom:8px">Saved Places</h3><p style="color:var(--text-light);margin-bottom:16px">Sign in to save and revisit your favorite local spots</p><button class="zh-btn-primary" onclick="showAuthModal(\'login\')" style="background:var(--teal);color:#fff;border:none;padding:10px 24px;border-radius:100px;cursor:pointer;font-size:.9rem">Sign In / Join</button></div>'
    return
  }
  el.innerHTML='<div class="zh-loading"><div class="zh-spinner"></div><p style="margin-top:12px">Loading saved spots...</p></div>'
  try{
    var r=await fetch('/api/v1/bookmarks',{headers:{'Authorization':'Bearer '+authUser.token}})
    var d=await r.json()
    if(!r.ok)throw new Error(d.error||'Failed')
    renderSavedPlaces(d.favorites||d||[])
  }catch(e){
    renderError(e.message)
  }
}

function renderSavedPlaces(items){
  var el=document.getElementById('zh-content')
  if(!items.length){
    el.innerHTML='<div style="text-align:center;padding:80px 24px"><div style="font-size:3rem;margin-bottom:12px">❤️</div><h3 style="margin-bottom:8px">No saved places yet</h3><p style="color:var(--text-light);margin-bottom:16px">Browse local businesses and save your favorites</p><a href="#/" class="zh-btn-primary" style="background:var(--teal);color:#fff;padding:10px 24px;border-radius:100px;text-decoration:none;font-weight:600;display:inline-block">Discover Local Spots →</a></div>'
    return
  }
  var html='<div class="zh-section" style="padding-top:40px"><div class="zh-section-inner"><h2 style="margin-bottom:4px;font-size:1.4rem">❤️ My Saved Places</h2><p style="color:var(--text-light);margin-bottom:20px">'+items.length+' saved spot'+(items.length>1?'s':'')+'</p><div class="zh-biz-grid">'
  for(var i=0;i<items.length;i++){
    var b=items[i]
    var stars=b.rating?'★'.repeat(Math.round(b.rating))+'☆'.repeat(5-Math.round(b.rating)):''
    html+='<div class="zh-biz-card" onclick="location.hash=\'#/city/'+b.directory_slug+'/biz/'+b.id+'\'">'+
      '<div class="zh-biz-img" style="background:'+(i%2===0?'var(--bg-teal)':'var(--accent-light)')+'">'+(b.image_url?'<img src="'+esc(b.image_url)+'">':b.name[0])+'</div>'+
      '<div class="zh-biz-body"><h4>'+esc(b.name)+'</h4>'+
      '<div class="stars">'+stars+' <span style="color:var(--text-light);font-size:.78rem">'+(b.review_count||0)+' reviews</span></div>'+
      (b.address?'<div class="addr">📍 '+esc(b.address)+'</div>':'')+
      '<div class="zh-biz-actions">'+(b.phone?'<a href="tel:'+esc(b.phone)+'" class="action">📞 Call</a>':'')+
      '</div></div></div>'
  }
  html+='</div></div></div>'
  el.innerHTML=html
}

// ── Init ──

route()
</script>
