<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Directory Portal</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--purple:#7c3aed;--purple-light:#a78bfa;--purple-bg:#f5f3ff;--bg:#f8fafc;--card:#fff;--text:#1e293b;--text-secondary:#64748b;--border:#e2e8f0;--sidebar:#0f172a;--sidebar-text:#94a3b8;--sidebar-active:#a78bfa;--danger:#ef4444;--danger-hover:#dc2626;--success:#22c55e;--warning:#f59e0b;--info:#3b82f6}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex}
a{color:var(--purple);text-decoration:none}a:hover{text-decoration:underline}
.login-container{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#0f172a 0%,#1e293b 100%);width:100%}
.login-card{background:var(--card);border-radius:16px;padding:40px;width:400px;max-width:90vw;box-shadow:0 25px 50px -12px rgba(0,0,0,.4)}
.login-card h1{font-size:1.75rem;color:var(--purple);text-align:center;margin-bottom:4px}
.login-card .tagline{text-align:center;color:var(--text-secondary);font-size:.9rem;margin-bottom:28px}
.login-card .error{background:#fef2f2;color:#dc2626;padding:10px 14px;border-radius:8px;font-size:.85rem;margin-bottom:16px;display:none}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:.85rem;font-weight:600;color:var(--text);margin-bottom:4px}
.form-group input,.form-group textarea,.form-group select{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-size:.9rem;outline:none;transition:border-color .2s;font-family:inherit}
.form-group input:focus,.form-group textarea:focus,.form-group select:focus{border-color:var(--purple);box-shadow:0 0 0 3px rgba(124,58,237,.15)}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:10px 20px;border-radius:8px;font-size:.9rem;font-weight:600;cursor:pointer;border:none;transition:all .2s;gap:6px}
.btn-primary{background:var(--purple);color:#fff}.btn-primary:hover{background:#6d28d9}
.btn-secondary{background:#e2e8f0;color:var(--text);border:1px solid var(--border)}.btn-secondary:hover{background:#cbd5e1}
.btn-danger{background:var(--danger);color:#fff}.btn-danger:hover{background:var(--danger-hover)}
.btn-sm{padding:6px 12px;font-size:.8rem}
.btn-full{width:100%}.btn:disabled{opacity:.6;cursor:not-allowed}
.sidebar{width:260px;min-height:100vh;background:var(--sidebar);position:fixed;top:0;left:0;display:flex;flex-direction:column;z-index:100}
.sidebar-brand{padding:24px 20px 16px;border-bottom:1px solid #1e293b}
.sidebar-brand h2{color:var(--purple-light);font-size:1.1rem;letter-spacing:.5px}
.sidebar-brand p{color:var(--sidebar-text);font-size:.75rem;margin-top:2px}
.sidebar-nav{flex:1;padding:12px 0;overflow-y:auto}
.sidebar-nav a{display:flex;align-items:center;gap:10px;padding:10px 20px;color:var(--sidebar-text);font-size:.85rem;transition:all .2s;border-left:3px solid transparent;cursor:pointer}
.sidebar-nav a:hover,.sidebar-nav a.active{color:#fff;background:rgba(124,58,237,.1);border-left-color:var(--purple-light)}
.sidebar-nav a .icon{font-size:1.1rem;width:22px;text-align:center}
.sidebar-footer{padding:16px 20px;border-top:1px solid #1e293b;font-size:.8rem;color:var(--sidebar-text)}
.sidebar-footer .dir-name{color:#fff;font-weight:600;margin-bottom:4px}
.sidebar-footer a{color:var(--sidebar-text);cursor:pointer}
.sidebar-footer a:hover{color:var(--danger)}
.main{margin-left:260px;flex:1;padding:0;min-height:100vh}
.main-header{display:flex;align-items:center;justify-content:space-between;padding:20px 32px;border-bottom:1px solid var(--border);background:var(--card);position:sticky;top:0;z-index:50}
.main-header h1{font-size:1.4rem;font-weight:700}
.main-header-actions{display:flex;gap:8px;align-items:center}
.main-content{padding:24px 32px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.card-header h3{font-size:1rem;font-weight:700}
.card:hover{box-shadow:0 4px 12px rgba(0,0,0,.06)}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px;text-align:center}
.stat-card .num{font-size:2.25rem;font-weight:800;color:var(--purple);display:block}
.stat-card .label{font-size:.85rem;color:var(--text-secondary);margin-top:4px}
.stat-card .icon{font-size:1.5rem;margin-bottom:8px}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th,td{text-align:left;padding:10px 14px;border-bottom:1px solid var(--border);font-size:.85rem}
th{font-weight:600;color:var(--text-secondary);background:#f8fafc;font-size:.8rem;text-transform:uppercase;letter-spacing:.5px}
tr:hover td{background:#f5f3ff}
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--card);border-radius:16px;width:520px;max-width:100%;max-height:90vh;overflow-y:auto;padding:28px}
.modal h2{font-size:1.2rem;margin-bottom:20px;color:var(--text)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
.toast-container{position:fixed;top:20px;right:20px;z-index:300;display:flex;flex-direction:column;gap:8px}
.toast{padding:12px 20px;border-radius:10px;font-size:.85rem;font-weight:500;box-shadow:0 10px 30px rgba(0,0,0,.15);animation:slideIn .3s ease;max-width:360px}
.toast.success{background:#14532d;color:#bbf7d0}.toast.error{background:#7f1d1d;color:#fca5a5}.toast.info{background:#1e3a5f;color:#bfdbfe}
.search-box{display:flex;gap:8px;margin-bottom:20px}
.search-box input{flex:1;padding:12px 16px;border:1px solid var(--border);border-radius:10px;font-size:.95rem;outline:none}
.search-box input:focus{border-color:var(--purple);box-shadow:0 0 0 3px rgba(124,58,237,.15)}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.75rem;font-weight:600}
.badge.active{background:#14532d;color:#bbf7d0}
.badge.inactive{background:#7f1d1d;color:#fca5a5}
.badge.premium{background:#14532d;color:#bbf7d0}
.badge.free{background:#1e3a5f;color:#bfdbfe}
.badge.enterprise{background:#713f12;color:#fde68a}
.badge.published{background:#14532d;color:#bbf7d0}
.badge.draft{background:#7f1d1d;color:#fca5a5}
.tabs{display:flex;gap:0;margin-bottom:20px;border-bottom:2px solid var(--border)}
.tabs button{padding:10px 20px;font-size:.85rem;font-weight:600;border:none;background:none;cursor:pointer;color:var(--text-secondary);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s}
.tabs button.active{color:var(--purple);border-bottom-color:var(--purple)}
.empty-state{text-align:center;padding:60px 20px;color:var(--text-secondary)}
.empty-state .icon{font-size:3rem;margin-bottom:12px}
.empty-state p{font-size:.95rem}
.spinner{display:inline-block;width:20px;height:20px;border:3px solid var(--border);border-top-color:var(--purple);border-radius:50%;animation:spin .6s linear infinite}
.spinner-teal{display:inline-block;width:20px;height:20px;border:3px solid #e2e8f0;border-top-color:var(--purple);border-radius:50%;animation:spin .6s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
input[type="color"]{height:40px;padding:4px;border-radius:8px;cursor:pointer}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.dir-selector{display:flex;align-items:center;gap:8px;margin-bottom:20px;padding:12px 16px;background:var(--card);border:1px solid var(--border);border-radius:10px}
.dir-selector select{flex:1;padding:8px;border:1px solid var(--border);border-radius:6px;font-size:.9rem;outline:none}
.dir-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:4px;font-size:.7rem;font-weight:600}
.dir-badge.primary{background:#f3e8ff;color:#7c3aed}
.preview-section{border:1px dashed var(--border);border-radius:8px;padding:16px;margin-top:12px;background:#fafafa}
.code-block{background:#0f172a;color:#e2e8f0;padding:16px;border-radius:8px;font-family:monospace;font-size:.8rem;overflow-x:auto;white-space:pre-wrap;margin-top:8px}
.help-text{font-size:.78rem;color:var(--text-secondary);margin-top:4px}
</style>
</head>
<body>
<div id="app"></div>
<div class="toast-container" id="toastContainer"></div>
<div class="modal-overlay" id="modalOverlay" style="display:none" onclick="if(event.target===this)closeModal()"><div class="modal" id="modalContent" onclick="event.stopPropagation()"></div></div>
<script>

// ── Utilities ──────────────────────────────────────────
function esc(s){if(typeof s!=='string')s=String(s||'');return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toast(m,t){var c=document.getElementById('toastContainer'),e=document.createElement('div');e.className='toast '+(t||'info');e.textContent=m;c.appendChild(e);setTimeout(function(){e.style.opacity='0';e.style.transition='opacity .3s';setTimeout(function(){e.remove()},300)},3500);}
function spinner(){return '<span class="spinner"></span>';}
function slugify(s){return s.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');}

// ── API Helpers ────────────────────────────────────────
function api(mth,path,body,cb,err){
  var opts={method:mth,headers:{'Authorization':'Bearer '+localStorage.token,'Accept':'application/json'}};
  if(body){opts.headers['Content-Type']='application/json';opts.body=JSON.stringify(body);}
  fetch('/api/v1'+path,opts).then(function(r){if(!r.ok)throw r;return r.json();}).then(function(d){if(cb)cb(d);}).catch(function(e){if(err)err(e);else{e.text().then(function(t){toast(t||'Request failed','error');});}});
}
function g(path,cb,err){return api('GET',path,null,cb,err);}
function po(path,b,cb,err){return api('POST',path,b,cb,err);}
function pu(path,b,cb,err){return api('PUT',path,b,cb,err);}
function dl(path,cb,err){return api('DELETE',path,null,cb,err);}

// ── Modal ──────────────────────────────────────────────
function showModal(html){document.getElementById('modalContent').innerHTML=html;document.getElementById('modalOverlay').style.display='flex';}
function closeModal(){document.getElementById('modalOverlay').style.display='none';}

// ── State ──────────────────────────────────────────────
var CP='dashboard';
var DIRS=[];
var CUR_DIR=null;
var PAGES=['dashboard','listings','categories','reviews','deals','branding','domains','webhooks','datacompany','monetization','crm','analytics','seo','blog','legals'];
var PAGE_ICONS={'dashboard':'📊','listings':'📋','categories':'🏷️','reviews':'⭐','deals':'🏆','branding':'🎨','domains':'🌐','webhooks':'🔗','datacompany':'📁','monetization':'💰','crm':'👥','analytics':'📈','seo':'🔍','blog':'✍️','legals':'⚖️'};
var PAGE_TITLES={'dashboard':'Dashboard','listings':'Listings','categories':'Categories','reviews':'Reviews','deals':'Deals & Coupons','branding':'Branding','domains':'Custom Domains','webhooks':'Webhooks','datacompany':'Data Company','monetization':'Monetization','crm':'CRM','analytics':'Analytics','seo':'SEO','blog':'Blog','legals':'Legal Pages'};

function navigate(p){CP=p;history.pushState({page:p},'',location.pathname+'#'+p);renderApp();}

// ── Login / Init ───────────────────────────────────────
function logout(){localStorage.removeItem('token');localStorage.removeItem('user');render();}

function init(){
  var hash=location.hash.replace(/^#/,'');
  if(hash&&PAGES.indexOf(hash)>-1)CP=hash;
  var token=localStorage.getItem('token');
  var user=localStorage.getItem('user');
  if(!token||!user){render();return;}
  try{user=JSON.parse(user);}catch(e){localStorage.removeItem('token');localStorage.removeItem('user');render();return;}
  g('/admin/directories',function(dirs){
    DIRS=dirs||[];
    if(DIRS.length>0){CUR_DIR=DIRS[0];}
    else{CUR_DIR={id:0,slug:'default',name:'My Directory',tier:'free'};}
    renderApp();
  },function(){
    localStorage.removeItem('token');localStorage.removeItem('user');render();
  });
}

// ── Render ─────────────────────────────────────────────
function render(){
  var app=document.getElementById('app');
  var token=localStorage.getItem('token');
  if(!token){
    app.innerHTML=
    '<div class="login-container">'+
      '<div class="login-card">'+
        '<h1>📂 Directory Portal</h1>'+
        '<p class="tagline">Manage your directory listings, reviews, and more.</p>'+
        '<div class="error" id="loginError"></div>'+
        '<div class="form-group"><label>Email</label><input type="email" id="loginEmail" placeholder="you@example.com" value="swiftsoftware143@yahoo.com"></div>'+
        '<div class="form-group"><label>Password</label><input type="password" id="loginPassword" placeholder="Enter password" onkeydown="if(event.key===\'Enter\')doLogin()"></div>'+
        '<button class="btn btn-primary btn-full" onclick="doLogin()">Sign In</button>'+
      '</div>'+
    '</div>';
    return;
  }
  // Check if dirs loaded
  if(!CUR_DIR){
    app.innerHTML='<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;width:100%">'+spinner()+'</div>';
    return;
  }
  renderApp();
}

function doLogin(){
  var email=document.getElementById('loginEmail').value;
  var pass=document.getElementById('loginPassword').value;
  if(!email||!pass){document.getElementById('loginError').textContent='Please enter email and password.';document.getElementById('loginError').style.display='block';return;}
  document.getElementById('loginError').style.display='none';
  po('/auth/login',{email:email,password:pass},function(r){
    localStorage.setItem('token',r.token);
    localStorage.setItem('user',JSON.stringify(r.user||{}));
    init();
  },function(e){
    e.text().then(function(t){document.getElementById('loginError').textContent=t||'Login failed';document.getElementById('loginError').style.display='block';});
  });
}

function renderApp(){
  var app=document.getElementById('app');
  var dirSelect='';
  if(DIRS.length>1){
    dirSelect='<div class="dir-selector"><label>🌐 Directory:</label><select onchange="switchDir(this.value)">';
    for(var i=0;i<DIRS.length;i++)dirSelect+='<option value="'+esc(DIRS[i].slug||DIRS[i].id)+'"'+(CUR_DIR&&CUR_DIR.slug===DIRS[i].slug?' selected':'')+'>'+esc(DIRS[i].name)+'</option>';
    dirSelect+='</select></div>';
  }
  var nav='';
  for(var i=0;i<PAGES.length;i++){
    var p=PAGES[i];
    nav+='<a class="'+(p===CP?'active':'')+'" onclick="navigate(\x27'+p+'\x27)"><span class="icon">'+PAGE_ICONS[p]+'</span> '+PAGE_TITLES[p]+'</a>';
  }
  app.innerHTML=
  '<div class="sidebar">'+
    '<div class="sidebar-brand"><h2>📂 Directory Portal</h2><p>Owner Dashboard</p></div>'+
    '<div class="sidebar-nav">'+nav+'</div>'+
    '<div class="sidebar-footer">'+
      '<div class="dir-name">'+(CUR_DIR?esc(CUR_DIR.name):'')+'</div>'+
      '<div><a onclick="logout()">🚪 Sign Out</a></div>'+
    '</div>'+
  '</div>'+
  '<div class="main">'+
    '<div class="main-header"><h1>'+PAGE_TITLES[CP]+'</h1><div class="main-header-actions"></div></div>'+
    '<div class="main-content" id="pageContent">'+spinner()+'</div>'+
  '</div>';
  renderPage();
}

function switchDir(slug){
  for(var i=0;i<DIRS.length;i++){
    if(DIRS[i].slug===slug||String(DIRS[i].id)===slug){CUR_DIR=DIRS[i];break;}
  }
  renderApp();
}

// ── Page Router ────────────────────────────────────────
function renderPage(){
  var el=document.getElementById('pageContent');
  if(!el)return;
  el.innerHTML='<div style="text-align:center;padding:40px">'+spinner()+'</div>';
  switch(CP){
    case 'dashboard': renderDashboard();break;
    case 'listings': renderListings();break;
    case 'categories': renderCategories();break;
    case 'reviews': renderReviews();break;
    case 'deals': renderDeals();break;
    case 'branding': renderBranding();break;
    case 'domains': renderDomains();break;
    case 'webhooks': renderWebhooks();break;
    case 'datacompany': renderDataCompany();break;
    case 'monetization': renderMonetization();break;
    case 'crm': renderCRM();break;
    case 'analytics': renderAnalytics();break;
    case 'seo': renderSEO();break;
    case 'blog': renderBlog();break;
    case 'legals': renderLegals();break;
    default: el.innerHTML='<div class="empty-state"><div class="icon">📂</div><p>Page not found</p></div>';
  }
}

// ── Dashboard ──────────────────────────────────────────
function renderDashboard(){
  if(!CUR_DIR){return setContent('<div class="empty-state"><p>No directory selected.</p></div>');}
  var el=document.getElementById('pageContent');
  el.innerHTML='<div style="text-align:center;padding:40px">'+spinner()+'</div>';
  var slug=CUR_DIR.slug;
  var did=CUR_DIR.id;
  g('/directories/'+slug+'/businesses?limit=5',function(listings){
    var lcount=listings&&listings.data?listings.data.length:0;
    var ltotal=listings&&listings.total!==undefined?listings.total:(listings&&listings.data?listings.data.length:0);
    g('/deals?directory_id='+did+'&limit=5',function(deals){
      var dcount=deals&&deals.data?deals.data.length:0;
      var dtotal=deals&&deals.total!==undefined?deals.total:dcount;
      g('/admin/reviews?directory_id='+did+'&limit=5',function(reviews){
        var rcount=reviews&&reviews.data?reviews.data.length:0;
        var rtotal=reviews&&reviews.total!==undefined?reviews.total:rcount;
        g('/admin/ad-zones?directory_id='+did,function(zones){
          var zcount=zones&&zones.length?zones.length:0;
          var tier=(CUR_DIR&&CUR_DIR.tier)||'free';
          el.innerHTML=
          '<div class="stat-grid">'+
            '<div class="stat-card"><div class="icon">📋</div><span class="num">'+ltotal+'</span><div class="label">Total Listings</div></div>'+
            '<div class="stat-card"><div class="icon">⭐</div><span class="num">'+rtotal+'</span><div class="label">Reviews</div></div>'+
            '<div class="stat-card"><div class="icon">🏆</div><span class="num">'+dtotal+'</span><div class="label">Active Deals</div></div>'+
            '<div class="stat-card"><div class="icon">💰</div><span class="num">'+zcount+'</span><div class="label">Ad Zones</div></div>'+
          '</div>'+
          '<div class="card"><div class="card-header"><h3>📋 Directory Info</h3></div>'+
            '<p><strong>Name:</strong> '+esc(CUR_DIR.name)+'</p>'+
            '<p><strong>Slug:</strong> '+esc(CUR_DIR.slug)+'</p>'+
            '<p><strong>Plan:</strong> <span class="badge '+(tier==='enterprise'?'enterprise':tier==='premium'?'premium':'free')+'">'+esc(tier)+'</span></p>'+
          '</div>'+
          (listings&&listings.data&&listings.data.length>0?
          '<div class="card"><div class="card-header"><h3>📋 Recent Listings</h3></div><div class="table-wrap"><table><tr><th>Name</th><th>Status</th><th>Category</th></tr>'+
            listings.data.map(function(b){return '<tr><td>'+esc(b.name||b.business_name||'')+'</td><td><span class="badge '+(b.status==='published'?'published':'draft')+'">'+esc(b.status||'draft')+'</span></td><td>'+esc(b.category||'')+'</td></tr>';}).join('')+
          '</table></div></div>':'');
        },function(){setContent(el,'<div class="empty-state"><p>Could not load dashboard data.</p></div>');});
      },function(){setContent(el,'<div class="empty-state"><p>Could not load reviews.</p></div>');});
    },function(){setContent(el,'<div class="empty-state"><p>Could not load deals.</p></div>');});
  },function(){setContent(el,'<div class="empty-state"><p>Could not load listings.</p></div>');});
}

// ── Listings ───────────────────────────────────────────
var LISTINGS_LISTING_DATA=null;
function renderListings(){
  var el=document.getElementById('pageContent');
  if(!CUR_DIR){el.innerHTML='<div class="empty-state"><p>No directory selected.</p></div>';return;}
  el.innerHTML='<div style="text-align:center;padding:40px">'+spinner()+'</div>';
  var slug=CUR_DIR.slug;
  g('/directories/'+slug+'/businesses',function(r){
    LISTINGS_LISTING_DATA=r;
    var data=r.data||r||[];
    el.innerHTML=
    '<div class="card-header"><h3>All Listings</h3><button class="btn btn-primary btn-sm" onclick="showAddListing()">+ Add Listing</button></div>'+
    '<div class="table-wrap"><table>'+
      '<tr><th>Name</th><th>Category</th><th>Email</th><th>Phone</th><th>Status</th><th>Actions</th></tr>'+
      (data.length===0?'<tr><td colspan="6" style="text-align:center;color:var(--text-secondary)">No listings yet</td></tr>':
      data.map(function(b,i){
        var bn=b.name||b.business_name||'';
        return '<tr><td>'+esc(bn)+'</td><td>'+esc(b.category||'')+'</td><td>'+esc(b.email||'')+'</td><td>'+esc(b.phone||'')+'</td><td><span class="badge '+(b.status==='published'?'published':'draft')+'">'+esc(b.status||'draft')+'</span></td>'+
        '<td><button class="btn btn-secondary btn-sm" onclick="showEditListing('+i+')">✏️</button> <button class="btn btn-danger btn-sm" onclick="deleteListing('+(b.id||i)+')">🗑️</button></td></tr>';
      }).join(''))+
    '</table></div>';
  },function(){el.innerHTML='<div class="empty-state"><p>Failed to load listings.</p></div>';});
}
function showAddListing(){
  showModal(
    '<h2>Add Listing</h2>'+

function exportData(fmt){
  var did=CUR_DIR.id;
  var a=document.createElement('a');
  a.href='/api/v1/export/bulk?directory_id='+did+'&format='+fmt;
  a.download='export.'+fmt;
  a.click();
  toast('Download started','info');
}
function importData(){
  var file=document.getElementById('importFile').files[0];
  if(!file){toast('Select a file','error');return;}
  var fd=new FormData();
  fd.append('file',file);
  var xhr=new XMLHttpRequest();
  xhr.open('POST','/api/v1/import');
  xhr.setRequestHeader('Authorization','Bearer '+localStorage.token);
  xhr.onload=function(){if(xhr.status>=200&&xhr.status<300){toast('Import successful','success');}else{toast('Import failed: '+xhr.statusText,'error');}};
  xhr.onerror=function(){toast('Import failed','error');};
  xhr.send(fd);
}

  },function(){alert('Failed to create sponsored listing.');});
}

      data.map(function(l,i){

        '<td><button class="btn btn-secondary btn-sm" onclick="showEditLegal('+(l.id||i)+')">✏️</button> <button class="btn btn-danger btn-sm" onclick="deleteLegal('+(l.id||i)+')">🗑️</button></td></tr>';
      }).join(''))+
    '</table></div>';
  },function(){el.innerHTML='<div class="empty-state"><p>Failed to load legal pages.</p></div>';});
}
function showAddLegal(){
  showModal(
    '<h2>Add Legal Page</h2>'+
    '<div class="form-group"><label>Type</label><select id="lg_type"><option value="privacy">Privacy Policy</option><option value="terms">Terms of Service</option><option value="cookies">Cookie Policy</option><option value="custom">Custom</option></select></div>'+
    '<div class="form-group"><label>Title</label><input id="lg_title" placeholder="Page title"></div>'+
    '<div class="form-group"><label>Content (Markdown)</label><textarea id="lg_content" rows="8" placeholder="Page content in Markdown..."></textarea></div>'+
    '<div class="modal-actions"><button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveLegal()">Save</button></div>'
  );
}
function saveLegal(){
  closeModal();
  po('/legal-pages?directory_id='+CUR_DIR.id,{
    type:document.getElementById('lg_type').value,
    title:document.getElementById('lg_title').value,
    content:document.getElementById('lg_content').value
  },function(){toast('Legal page created','success');renderLegals();},function(){toast('Failed','error');renderLegals();});
}
function showEditLegal(id){
  g('/legal-pages?directory_id='+CUR_DIR.id,function(r){
    var data=r.data||r||[];
    var lg=null;
    for(var i=0;i<data.length;i++){if(data[i].id===id||i===id-1){lg=data[i];break;}}
    if(!lg){toast('Not found','error');return;}
    showModal(
      '<h2>Edit Legal Page</h2>'+
      '<div class="form-group"><label>Type</label><select id="lg_type"><option value="privacy" '+(lg.type==='privacy'?'selected':'')+'>Privacy Policy</option><option value="terms" '+(lg.type==='terms'?'selected':'')+'>Terms of Service</option><option value="cookies" '+(lg.type==='cookies'?'selected':'')+'>Cookie Policy</option><option value="custom" '+(lg.type==='custom'?'selected':'')+'>Custom</option></select></div>'+
      '<div class="form-group"><label>Title</label><input id="lg_title" value="'+esc(lg.title||'')+'"></div>'+
      '<div class="form-group"><label>Content</label><textarea id="lg_content" rows="8">'+esc(lg.content||'')+'</textarea></div>'+
      '<div class="modal-actions"><button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="updateLegal('+(lg.id||0)+')">Update</button></div>'
    );
  });
}
function updateLegal(id){
  closeModal();
  pu('/legal-pages/'+id,{
    type:document.getElementById('lg_type').value,
    title:document.getElementById('lg_title').value,
    content:document.getElementById('lg_content').value
  },function(){toast('Legal page updated','success');renderLegals();},function(){toast('Failed','error');renderLegals();});
}
function deleteLegal(id){
  if(!confirm('Delete this legal page?'))return;
  dl('/legal-pages/'+id,function(){toast('Deleted','success');renderLegals();},function(){toast('Failed','error');renderLegals();});
}

// ── Helper ─────────────────────────────────────────────
function setContent(el,html){
  el=el||document.getElementById('pageContent');
  if(typeof el==='string')el=document.getElementById('pageContent');
  if(el){el.innerHTML=html||'<div class="empty-state"><p>No data.</p></div>';}
}

// ── Init on popstate ───────────────────────────────────
window.onpopstate=function(e){
  var p=e.state&&e.state.page;
  if(p&&PAGES.indexOf(p)>-1){CP=p;renderApp();}
};

// ── Boot ───────────────────────────────────────────────
init();
</script>
</body>
</html>
