<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MultiDirectory Admin</title>
<style>
  :root{--bg:#f1f5f9;--bg-card:#fff;--text:#1e293b;--text-secondary:#64748b;--primary:#2563eb;--border:#e2e8f0;--danger:#ef4444;--success:#22c55e}
  *{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
  body{background:var(--bg);color:var(--text);min-height:100vh}
  
  .sidebar{width:240px;background:var(--bg-card);border-right:1px solid var(--border);position:fixed;top:0;left:0;height:100vh;overflow-y:auto;z-index:100}
  .sidebar .logo{padding:20px;font-weight:700;font-size:1.1rem;border-bottom:1px solid var(--border);color:var(--primary);display:flex;align-items:center;gap:8px}
  .sidebar .logo img{width:28px;height:28px}
  .sidebar .nav-item{padding:12px 20px;cursor:pointer;display:flex;align-items:center;gap:10px;font-size:.9rem;color:var(--text-secondary);transition:all .15s;border-left:3px solid transparent}
  .sidebar .nav-item:hover{background:#f8fafc;color:var(--text)}
  .sidebar .nav-item.active{background:#eff6ff;color:var(--primary);border-left-color:var(--primary);font-weight:600}
  .sidebar .nav-item .icon{font-size:1.1rem;width:24px;text-align:center}
  
  .main{margin-left:240px;padding:24px}
  .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
  .header h1{font-size:1.3rem;font-weight:700}
  .header .user-info{font-size:.85rem;color:var(--text-secondary);display:flex;align-items:center;gap:12px}
  .header .user-info .email{max-width:250px;overflow:hidden;text-overflow:ellipsis}
  .header .logout-btn{padding:6px 16px;border-radius:6px;border:1px solid var(--border);background:var(--bg-card);cursor:pointer;font-size:.8rem;color:var(--text-secondary)}
  .header .logout-btn:hover{background:#fef2f2;color:var(--danger);border-color:var(--danger)}
  
  .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px}
  .stat-card{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:20px}
  .stat-card .stat-icon{font-size:1.5rem;margin-bottom:8px}
  .stat-card .stat-num{font-size:1.8rem;font-weight:700;margin-bottom:4px}
  .stat-card .stat-label{font-size:.8rem;color:var(--text-secondary)}
  
  .card{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:16px}
  .card h3{font-size:.95rem;margin-bottom:12px;font-weight:600}
  
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  
  .loading{display:flex;justify-content:center;align-items:center;padding:60px;color:var(--text-secondary);font-size:.9rem}
  .spinner{width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .6s linear infinite;margin-right:8px;display:inline-block;vertical-align:middle}
  @keyframes spin{to{transform:rotate(360deg)}}
  
  .empty-state{text-align:center;padding:40px;color:var(--text-secondary)}
  .empty-state .icon{font-size:2rem;margin-bottom:12px}
  
  .toast-container{position:fixed;bottom:20px;right:20px;z-index:1000;display:flex;flex-direction:column;gap:8px}
  .toast{padding:12px 20px;border-radius:8px;font-size:.85rem;color:#fff;animation:slideIn .3s ease;max-width:350px}
  .toast.success{background:var(--success)}
  .toast.error{background:var(--danger);color:#fff}
  .toast.info{background:var(--primary)}
  @keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
  
  table{width:100%;border-collapse:collapse;font-size:.85rem}
  th{text-align:left;padding:10px 12px;border-bottom:2px solid var(--border);color:var(--text-secondary);font-weight:600}
  td{padding:10px 12px;border-bottom:1px solid var(--border)}
  tr:hover{background:#f8fafc}
  
  .badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:.75rem;font-weight:500}
  .badge.active{background:#dcfce7;color:#166534}
  .badge.inactive{background:#fef9c3;color:#854d0e}
  .badge.pending{background:#fef9c3;color:#854d0e}
  
  @media(max-width:768px){.sidebar{width:0;overflow:hidden}.main{margin-left:0;padding:16px}.grid-2{grid-template-columns:1fr}}
  
  .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;border:1px solid var(--border);font-size:.85rem;cursor:pointer;transition:all .15s;background:var(--bg-card);color:var(--text);text-decoration:none}
  .btn:hover{background:#f1f5f9}
  .btn-primary{background:var(--primary);color:#fff;border-color:var(--primary)}
  .btn-primary:hover{background:#1d4ed8}
  .btn-sm{padding:4px 10px;font-size:.8rem}
  .btn-danger{background:var(--danger);color:#fff;border-color:var(--danger)}
  .btn-danger:hover{background:#dc2626}
  
  .flex{display:flex;align-items:center;gap:8px}
  .mt-2{margin-top:8px}
  .mt-4{margin-top:16px}
  
  .modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:200}
  .modal{background:var(--bg-card);border-radius:12px;padding:24px;max-width:500px;width:90%;max-height:80vh;overflow-y:auto}
  .modal h2{font-size:1.1rem;margin-bottom:16px}
  .form-group{margin-bottom:12px}
  .form-group label{display:block;font-size:.8rem;font-weight:600;color:var(--text-secondary);margin-bottom:4px}
  .form-group input,.form-group select,.form-group textarea{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:6px;font-size:.85rem;font-family:inherit;background:var(--bg-card);color:var(--text)}
  .form-group input:focus,.form-group select:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
  .modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:16px}
</style>
</head>
<body>

<div class="sidebar" id="sidebar">
  <div class="logo">📂 MultiDirectory</div>
  <div class="nav-item active" onclick="navigate('dashboard')">
    <span class="icon">📊</span> Dashboard
  </div>
  <div class="nav-item" onclick="navigate('directories')">
    <span class="icon">📁</span> Directories
  </div>
  <div class="nav-item" onclick="navigate('listings')">
    <span class="icon">📋</span> Listings
  </div>
  <div class="nav-item" onclick="navigate('users')">
    <span class="icon">👥</span> Users
  </div>
  <div class="nav-item" onclick="navigate('settings')">
    <span class="icon">⚙️</span> Settings
  </div>
  <div class="nav-item" onclick="navigate('sponsored')">
    <span class="icon">💡</span> Sponsored Listings
  </div>
  <div class="nav-item" onclick="navigate('notifications')">
    <span class="icon">🔔</span> Notifications
  </div>
</div>

<div class="main">
  <div class="header">
    <h1 id="pageTitle">Dashboard</h1>
    <div class="user-info">
      <span class="email" id="userEmail"></span>
      <button class="logout-btn" onclick="logout()">Log out</button>
    </div>
  </div>
  
  <div id="pageContent">
    <div class="loading"><span class="spinner"></span> Loading...</div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
const API = "https://directory.swiftsoftware.net/api/v1";
const token = localStorage.getItem("ws_dir_token");
const user = localStorage.getItem("ws_dir_user");

if (!token) {
  window.location.href = "/admin-login.html";
}

document.getElementById("userEmail").textContent = user ? JSON.parse(user).email || "" : "";

async function g(path) {
  const r = await fetch(API + path, {
    headers: { "Authorization": "Bearer " + token, "Content-Type": "application/json" }
  });
  if (!r.ok) throw new Error((await r.json()).error || r.statusText);
  return r.json();
}

async function po(path, body) {
  const r = await fetch(API + path, {
    method: "POST",
    headers: { "Authorization": "Bearer " + token, "Content-Type": "application/json" },
    body: JSON.stringify(body)
  });
  if (!r.ok) throw new Error((await r.json()).error || r.statusText);
  return r.json();
}

function toast(msg, type) {
  type = type || "info";
  const el = document.createElement("div");
  el.className = "toast " + type;
  el.textContent = msg;
  document.getElementById("toastContainer").appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

function logout() {
  localStorage.removeItem("ws_dir_token");
  localStorage.removeItem("ws_dir_user");
  window.location.href = "/admin-login.html";
}

// Navigation
function navigate(section) {
  document.querySelectorAll(".nav-item").forEach(n => n.classList.remove("active"));
  document.querySelector(`.nav-item[onclick*="'${section}'"]`).classList.add("active");
  
  const titles = { dashboard: "Dashboard", directories: "Directories", listings: "Listings", users: "Users", settings: "Settings", sponsored: "Sponsored Listings", notifications: "Notifications" };
  document.getElementById("pageTitle").textContent = titles[section] || section;
  
  switch(section) {
    case "dashboard": loadDashboard(); break;
    case "directories": loadDirectories(); break;
    case "listings": loadListings(); break;
    case "users": loadUsers(); break;
    case "settings": loadSettings(); break;
    case "sponsored": loadSponsoredListings(); break;
    case "notifications": loadNotifications(); break;
  }
}

async function loadDashboard() {
  const el = document.getElementById("pageContent");
  el.innerHTML = '<div class="loading"><span class="spinner"></span> Loading...</div>';
  try {
    const s = await g("/dashboard/stats");
    el.innerHTML = \`
      <div class="stat-grid">
        <div class="stat-card"><div class="stat-icon">📁</div><div class="stat-num">\${s.total_directories || 0}</div><div class="stat-label">Directories</div></div>
        <div class="stat-card"><div class="stat-icon">📋</div><div class="stat-num">\${s.total_listings || 0}</div><div class="stat-label">Listings</div></div>
        <div class="stat-card"><div class="stat-icon">👥</div><div class="stat-num">\${s.active_users || 0}</div><div class="stat-label">Active Users</div></div>
        <div class="stat-card"><div class="stat-icon">🔍</div><div class="stat-num">\${s.searches_today || 0}</div><div class="stat-label">Searches Today</div></div>
      </div>
    \`;
  } catch(e) {
    el.innerHTML = \`<div class="empty-state"><div class="icon">⚠️</div><h3>Error</h3><p>\${e.message}</p></div>\`;
  }
}

async function loadDirectories() {
  const el = document.getElementById("pageContent");
  el.innerHTML = '<div class="loading"><span class="spinner"></span> Loading...</div>';
  try {
    const r = await g("/directories");
    if (!r.data || !r.data.length) {
      el.innerHTML = '<div class="empty-state"><div class="icon">📁</div><h3>No Directories</h3><p>Create your first directory to get started.</p></div>';
      return;
    }
    let h = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><span style="font-size:.85rem;color:var(--text-secondary)">' + r.data.length + ' directories</span></div>';
    h += '<table><thead><tr><th>Name</th><th>Slug</th><th>City</th><th>Status</th></tr></thead><tbody>';
    r.data.forEach(d => {
      h += \`<tr><td>\${d.name}</td><td><code>\${d.slug}</code></td><td>\${d.city || "-"}</td><td><span class="badge \${d.status === "active" ? "active" : "inactive"}">\${d.status || "active"}</span></td></tr>\`;
    });
    h += '</tbody></table>';
    el.innerHTML = h;
  } catch(e) {
    el.innerHTML = \`<div class="empty-state"><div class="icon">⚠️</div><h3>Error</h3><p>\${e.message}</p></div>\`;
  }
}

async function loadListings() {
  const el = document.getElementById("pageContent");
  el.innerHTML = '<div class="loading"><span class="spinner"></span> Loading...</div>';
  try {
    const r = await g("/listings");
    if (!r.data || !r.data.length) {
      el.innerHTML = '<div class="empty-state"><div class="icon">📋</div><h3>No Listings</h3><p>No business listings yet.</p></div>';
      return;
    }
    let h = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><span style="font-size:.85rem;color:var(--text-secondary)">' + r.data.length + ' listings</span></div>';
    h += '<table><thead><tr><th>Name</th><th>Category</th><th>Status</th></tr></thead><tbody>';
    r.data.forEach(l => {
      h += \`<tr><td>\${l.name}</td><td>\${l.category || "-"}</td><td><span class="badge \${l.status === "active" ? "active" : "inactive"}">\${l.status || "active"}</span></td></tr>\`;
    });
    h += '</tbody></table>';
    el.innerHTML = h;
  } catch(e) {
    el.innerHTML = \`<div class="empty-state"><div class="icon">⚠️</div><h3>Error</h3><p>\${e.message}</p></div>\`;
  }
}

async function loadUsers() {
  const el = document.getElementById("pageContent");
  el.innerHTML = '<div class="loading"><span class="spinner"></span> Loading...</div>';
  try {
    const r = await g("/admin/users");
    if (!r.data || !r.data.length) {
      el.innerHTML = '<div class="empty-state"><div class="icon">👥</div><h3>No Users</h3></div>';
      return;
    }
    let h = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><span style="font-size:.85rem;color:var(--text-secondary)">' + r.data.length + ' users</span></div>';
    h += '<table><thead><tr><th>Email</th><th>Role</th><th>Created</th></tr></thead><tbody>';
    r.data.forEach(u => {
      h += \`<tr><td>\${u.email}</td><td><span class="badge active">\${u.role || "user"}</span></td><td style="color:var(--text-secondary)">\${(u.created_at || "").substring(0, 10)}</td></tr>\`;
    });
    h += '</tbody></table>';
    el.innerHTML = h;
  } catch(e) {
    el.innerHTML = \`<div class="empty-state"><div class="icon">⚠️</div><h3>Error</h3><p>\${e.message}</p></div>\`;
  }
}

function loadSettings() {
  const el = document.getElementById("pageContent");
  el.innerHTML = \`
    <div class="card"><h3>Account</h3>
      <div class="form-group"><label>Email</label><input value="\${user ? JSON.parse(user).email : ""}" disabled></div>
    </div>
  \`;
}

// ── Sponsored Listings ──
let _sponsoredDirId = "";

async function loadSponsoredListings() {
  const el = document.getElementById("pageContent");
  el.innerHTML = '<div class="loading"><span class="spinner"></span> Loading...</div>';
  try {
    // Fetch directories for the selector
    const dirs = await g("/directories");
    const dirList = dirs.data || dirs || [];
    
    let h = `<div class="card">
      <h3>Select Directory</h3>
      <div class="form-group">
        <select id="sponsoredDirSelect" onchange="loadSponsoredForDir(this.value)">
          <option value="">-- Choose a directory --</option>`;
    dirList.forEach(d => {
      h += `<option value="${d.id}">${d.name} (${d.slug})</option>`;
    });
    h += `</select>
      </div>
    </div>
    <div id="sponsoredListContainer">
      <div class="empty-state"><div class="icon">💡</div><h3>Select a directory</h3><p>Choose a directory above to manage sponsored listings</p></div>
    </div>`;
    el.innerHTML = h;
  } catch(e) {
    el.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><h3>Error</h3><p>${e.message}</p></div>`;
  }
}

async function loadSponsoredForDir(dirId) {
  if (!dirId) return;
  _sponsoredDirId = dirId;
  const container = document.getElementById("sponsoredListContainer");
  container.innerHTML = '<div class="loading"><span class="spinner"></span> Loading...</div>';
  try {
    // Get directory slug
    const dirs = await g("/directories");
    const dirList = dirs.data || dirs || [];
    const dir = dirList.find(d => d.id === dirId);
    const slug = dir ? dir.slug : "";
    
    // Fetch sponsored listings
    const listings = await g("/monetization/sponsored-listings?directory_id=" + dirId);
    const list = Array.isArray(listings) ? listings : (listings.data || []);
    // Also try directory-specific endpoint
    const dirListings = slug ? await g("/monetization/directories/" + slug + "/sponsored-listings") : [];
    const activeList = Array.isArray(dirListings) ? dirListings : (dirListings.data || []);
    
    let h = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">';
    h += `<span style="font-size:.85rem;color:var(--text-secondary)">${list.length + activeList.length} sponsored listings</span>`;
    h += `<button class="btn btn-primary btn-sm" onclick="showAddSponsoredForm('${dirId}')">+ New Spotlight</button></div>`;
    
    const allListings = [...activeList, ...list.filter(l => !activeList.find(a => a.id === l.id))];
    
    if (!allListings.length) {
      h += '<div class="empty-state"><div class="icon">💡</div><h3>No sponsored listings</h3><p>Add a spotlight listing for this directory</p></div>';
      container.innerHTML = h;
      return;
    }
    
    h += '<table><thead><tr><th>Business</th><th>Slot</th><th>Badge</th><th>Start</th><th>End</th><th>Status</th><th>Actions</th></tr></thead><tbody>';
    for (let i = 0; i < allListings.length; i++) {
      const l = allListings[i];
      const active = l.is_active && l.end_date >= new Date().toISOString().split('T')[0];
      h += `<tr>
        <td>${l.business_name || l.business_id || "-"}</td>
        <td>#${l.slot_position || "-"}</td>
        <td>${l.badge_text || "-"}</td>
        <td style="color:var(--text-secondary)">${(l.start_date || "").substring(0, 10)}</td>
        <td style="color:var(--text-secondary)">${(l.end_date || "").substring(0, 10)}</td>
        <td><span class="badge ${active ? "active" : "inactive"}">${active ? "Active" : "Inactive"}</span></td>
        <td>
          <button class="btn btn-sm" onclick="editSponsored('${l.id}')">✏️</button>
          <button class="btn btn-sm btn-danger" onclick="deleteSponsored('${l.id}')">🗑️</button>
        </td>
      </tr>`;
    }
    h += '</tbody></table>';
    
    container.innerHTML = h;
  } catch(e) {
    container.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><h3>Error</h3><p>${e.message}</p></div>`;
  }
}

async function showAddSponsoredForm(dirId) {
  const overlay = document.getElementById("modalOverlay");
  if (!overlay) {
    const div = document.createElement("div");
    div.id = "modalOverlay";
    div.className = "modal-overlay";
    document.body.appendChild(div);
  }
  document.getElementById("modalOverlay").innerHTML = `
    <div class="modal">
      <h2>New Sponsored Listing</h2>
      <div class="form-group">
        <label>Business ID (UUID)</label>
        <input id="spBizId" type="text" placeholder="Business UUID">
      </div>
      <div class="form-group">
        <label>Badge Text</label>
        <input id="spBadge" type="text" placeholder="e.g. ★ Featured, 🏆 Top Rated">
      </div>
      <div class="form-group">
        <label>Slot Position</label>
        <input id="spSlot" type="number" value="1" min="1">
      </div>
      <div class="form-group">
        <label>Start Date (YYYY-MM-DD)</label>
        <input id="spStart" type="date" value="${new Date().toISOString().split('T')[0]}">
      </div>
      <div class="form-group">
        <label>End Date (YYYY-MM-DD)</label>
        <input id="spEnd" type="date" value="${new Date(Date.now() + 30*86400000).toISOString().split('T')[0]}">
      </div>
      <div class="form-group">
        <label>Price Paid</label>
        <input id="spPrice" type="number" step="0.01" value="0">
      </div>
      <div class="form-group">
        <label>Featured</label>
        <input id="spFeatured" type="checkbox" checked>
      </div>
      <div class="modal-actions">
        <button class="btn" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveSponsored('${dirId}')">Create</button>
      </div>
    </div>`;
  document.getElementById("modalOverlay").style.display = "flex";
}

async function saveSponsored(dirId) {
  const bizId = document.getElementById("spBizId").value.trim();
  if (!bizId) { toast("Business ID is required", "error"); return; }
  try {
    await po("/monetization/sponsored-listings", {
      directory_id: dirId,
      business_id: bizId,
      badge_text: document.getElementById("spBadge").value || null,
      slot_position: parseInt(document.getElementById("spSlot").value) || 1,
      start_date: document.getElementById("spStart").value,
      end_date: document.getElementById("spEnd").value,
      price_paid: parseFloat(document.getElementById("spPrice").value) || 0,
      featured: document.getElementById("spFeatured").checked,
      currency: "USD",
      is_active: true,
    });
    toast("Spotlight created!", "success");
    closeModal();
    loadSponsoredForDir(dirId);
  } catch(e) {
    toast(e.message, "error");
  }
}

async function editSponsored(id) {
  try {
    const listing = await g("/monetization/sponsored-listings/" + id);
    const l = listing.listing || listing;
    const overlay = document.getElementById("modalOverlay") || document.createElement("div");
    overlay.id = "modalOverlay";
    overlay.className = "modal-overlay";
    if (!overlay.parentNode) document.body.appendChild(overlay);
    overlay.innerHTML = `
      <div class="modal">
        <h2>Edit Sponsored Listing</h2>
        <div class="form-group">
          <label>Badge Text</label>
          <input id="spBadge" type="text" value="${l.badge_text || ""}" placeholder="e.g. ★ Featured">
        </div>
        <div class="form-group">
          <label>Slot Position</label>
          <input id="spSlot" type="number" value="${l.slot_position || 1}" min="1">
        </div>
        <div class="form-group">
          <label>Start Date</label>
          <input id="spStart" type="date" value="${(l.start_date || "").substring(0, 10)}">
        </div>
        <div class="form-group">
          <label>End Date</label>
          <input id="spEnd" type="date" value="${(l.end_date || "").substring(0, 10)}">
        </div>
        <div class="form-group">
          <label>Active</label>
          <input id="spActive" type="checkbox" ${l.is_active ? "checked" : ""}>
        </div>
        <div class="form-group">
          <label>Featured</label>
          <input id="spFeatured" type="checkbox" ${l.featured ? "checked" : ""}>
        </div>
        <div class="modal-actions">
          <button class="btn" onclick="closeModal()">Cancel</button>
          <button class="btn btn-primary" onclick="updateSponsored('${id}')">Update</button>
        </div>
      </div>`;
    overlay.style.display = "flex";
  } catch(e) {
    toast(e.message, "error");
  }
}

async function updateSponsored(id) {
  try {
    await po("/monetization/sponsored-listings/" + id, {
      badge_text: document.getElementById("spBadge").value || null,
      slot_position: parseInt(document.getElementById("spSlot").value) || 1,
      start_date: document.getElementById("spStart").value,
      end_date: document.getElementById("spEnd").value,
      is_active: document.getElementById("spActive").checked,
      featured: document.getElementById("spFeatured").checked,
    });
    toast("Spotlight updated!", "success");
    closeModal();
    loadSponsoredForDir(_sponsoredDirId);
  } catch(e) {
    toast(e.message, "error");
  }
}

async function deleteSponsored(id) {
  if (!confirm("Delete this sponsored listing?")) return;
  try {
    const r = await fetch(API + "/monetization/sponsored-listings/" + id, {
      method: "DELETE",
      headers: { "Authorization": "Bearer " + token }
    });
    if (!r.ok) throw new Error((await r.json()).error || r.statusText);
    toast("Spotlight deleted", "success");
    loadSponsoredForDir(_sponsoredDirId);
  } catch(e) {
    toast(e.message, "error");
  }
}

function closeModal() {
  const el = document.getElementById("modalOverlay");
  if (el) el.style.display = "none";
}

// ── Notifications ──
let _notifDirId = "";

async function loadNotifications() {
  const el = document.getElementById("pageContent");
  el.innerHTML = '<div class="loading"><span class="spinner"></span> Loading...</div>';
  try {
    const dirs = await g("/directories");
    const dirList = dirs.data || dirs || [];
    
    let h = `<div class="card">
      <h3>Select Directory</h3>
      <div class="form-group">
        <select id="notifDirSelect" onchange="loadNotifsForDir(this.value)">
          <option value="">-- Choose a directory --</option>`;
    dirList.forEach(d => {
      h += `<option value="${d.id}">${d.name} (${d.slug})</option>`;
    });
    h += `</select>
      </div>
    </div>
    <div id="notifListContainer">
      <div class="empty-state"><div class="icon">🔔</div><h3>Select a directory</h3><p>Choose a directory above to manage notifications</p></div>
    </div>`;
    el.innerHTML = h;
  } catch(e) {
    el.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><h3>Error</h3><p>${e.message}</p></div>`;
  }
}

async function loadNotifsForDir(dirId) {
  if (!dirId) return;
  _notifDirId = dirId;
  const container = document.getElementById("notifListContainer");
  container.innerHTML = '<div class="loading"><span class="spinner"></span> Loading...</div>';
  try {
    const notifs = await g("/monetization/notifications?directory_id=" + dirId);
    const list = Array.isArray(notifs) ? notifs : [];
    
    let h = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">';
    h += `<span style="font-size:.85rem;color:var(--text-secondary)">${list.length} notifications</span>`;
    h += `<button class="btn btn-primary btn-sm" onclick="showAddNotifForm('${dirId}')">+ New Notification</button></div>`;
    
    if (!list.length) {
      h += '<div class="empty-state"><div class="icon">🔔</div><h3>No notifications</h3><p>Create announcements that appear as a ticker bar</p></div>';
      container.innerHTML = h;
      return;
    }
    
    h += '<table><thead><tr><th>Message</th><th>Type</th><th>Link</th><th>Active</th><th>Expires</th><th>Actions</th></tr></thead><tbody>';
    for (let i = 0; i < list.length; i++) {
      const n = list[i];
      const isActive = n.is_active && (!n.expires_at || new Date(n.expires_at) > new Date());
      h += `<tr>
        <td>${n.message || "-"}</td>
        <td><span class="badge ${n.notification_type === "info" ? "active" : n.notification_type === "warning" ? "pending" : "active"}">${n.notification_type || "info"}</span></td>
        <td>${n.link_text ? `<a href="${n.link_url || "#"}" target="_blank">${n.link_text}</a>` : "-"}</td>
        <td><span class="badge ${isActive ? "active" : "inactive"}">${isActive ? "Active" : "Inactive"}</span></td>
        <td style="color:var(--text-secondary)">${n.expires_at ? new Date(n.expires_at).toLocaleDateString() : "Never"}</td>
        <td>
          <button class="btn btn-sm" onclick="toggleNotif('${n.id}', ${!n.is_active})">${n.is_active ? "🔴" : "🟢"}</button>
          <button class="btn btn-sm btn-danger" onclick="deleteNotif('${n.id}')">🗑️</button>
        </td>
      </tr>`;
    }
    h += '</tbody></table>';
    container.innerHTML = h;
  } catch(e) {
    container.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><h3>Error</h3><p>${e.message}</p></div>`;
  }
}

async function showAddNotifForm(dirId) {
  let overlay = document.getElementById("notifModal");
  if (!overlay) {
    overlay = document.createElement("div");
    overlay.id = "notifModal";
    overlay.className = "modal-overlay";
    document.body.appendChild(overlay);
  }
  overlay.innerHTML = `
    <div class="modal">
      <h2>New Notification</h2>
      <div class="form-group">
        <label>Message *</label>
        <textarea id="notifMsg" rows="2" placeholder="Announcement text for ticker bar"></textarea>
      </div>
      <div class="form-group">
        <label>Type</label>
        <select id="notifType">
          <option value="info">Info</option>
          <option value="warning">Warning</option>
          <option value="promo">Promotion</option>
          <option value="alert">Alert</option>
        </select>
      </div>
      <div class="form-group">
        <label>Link Text (optional)</label>
        <input id="notifLinkText" type="text" placeholder="Learn More">
      </div>
      <div class="form-group">
        <label>Link URL</label>
        <input id="notifLinkUrl" type="url" placeholder="https://...">
      </div>
      <div class="form-group">
        <label>Active</label>
        <input id="notifActive" type="checkbox" checked>
      </div>
      <div class="form-group">
        <label>Expires At (optional)</label>
        <input id="notifExpires" type="datetime-local">
      </div>
      <div class="modal-actions">
        <button class="btn" onclick="closeNotifModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveNotif('${dirId}')">Create</button>
      </div>
    </div>`;
  overlay.style.display = "flex";
}

async function saveNotif(dirId) {
  const msg = document.getElementById("notifMsg").value.trim();
  if (!msg) { toast("Message is required", "error"); return; }
  const expires = document.getElementById("notifExpires").value;
  try {
    await po("/monetization/notifications", {
      directory_id: dirId,
      message: msg,
      notification_type: document.getElementById("notifType").value,
      link_text: document.getElementById("notifLinkText").value || null,
      link_url: document.getElementById("notifLinkUrl").value || null,
      is_active: document.getElementById("notifActive").checked,
      expires_at: expires ? new Date(expires).toISOString() : null,
    });
    toast("Notification created!", "success");
    closeNotifModal();
    loadNotifsForDir(dirId);
  } catch(e) {
    toast(e.message, "error");
  }
}

async function toggleNotif(id, newState) {
  try {
    await po("/monetization/notifications/" + id, { is_active: newState });
    toast("Notification updated", "success");
    loadNotifsForDir(_notifDirId);
  } catch(e) {
    toast(e.message, "error");
  }
}

async function deleteNotif(id) {
  if (!confirm("Delete this notification?")) return;
  try {
    const r = await fetch(API + "/monetization/notifications/" + id, {
      method: "DELETE",
      headers: { "Authorization": "Bearer " + token }
    });
    if (!r.ok) throw new Error((await r.json()).error || r.statusText);
    toast("Notification deleted", "success");
    loadNotifsForDir(_notifDirId);
  } catch(e) {
    toast(e.message, "error");
  }
}

function closeNotifModal() {
  const el = document.getElementById("notifModal");
  if (el) el.style.display = "none";
}

// Bootstrap
loadDashboard();
</script>
