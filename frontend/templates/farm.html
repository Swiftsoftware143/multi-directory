<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Farm Directory | Find Local Farms & Produce</title>
  <meta name="description" content="Discover local farms, farmers markets, CSA programs, and fresh produce near you. Support local agriculture.">
  <meta property="og:title" content="Farm Directory">
  <meta property="og:description" content="Find local farms, fresh produce, and farmers markets in your area.">
  <meta property="og:type" content="website">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "ItemList",
    "itemListElement": [],
    "name": "Farm Directory"
  }
  </script>
  <style>
    :root { --primary: #2d6a4f; --primary-dark: #1b4332; --accent: #d4a373; --bg: #fafaf5; --card: #ffffff; --text: #1a1a2e; --text-light: #6b7280; --radius: 12px; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
    .hero { background: linear-gradient(135deg, var(--primary-dark), var(--primary)); color: white; padding: 60px 20px; text-align: center; }
    .hero h1 { font-size: 2.5rem; margin-bottom: 8px; }
    .hero p { font-size: 1.1rem; opacity: .9; margin-bottom: 24px; }
    .hero input { width: 100%; max-width: 500px; padding: 14px 20px; border: none; border-radius: 50px; font-size: 1rem; outline: none; }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    .controls { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 24px; }
    .controls select { padding: 10px 16px; border: 1px solid #ddd; border-radius: 8px; background: white; font-size: .9rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; margin-bottom: 32px; }
    .card { background: var(--card); border-radius: var(--radius); overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,.08); transition: transform .2s, box-shadow .2s; cursor: pointer; }
    .card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,.12); }
    .card-img { width: 100%; height: 180px; object-fit: cover; background: #e8f5e9; }
    .card-body { padding: 16px; }
    .card h3 { font-size: 1.15rem; margin-bottom: 4px; color: var(--primary); }
    .card .badge { display: inline-block; padding: 2px 10px; border-radius: 50px; font-size: .75rem; font-weight: 600; background: #e8f5e9; color: var(--primary-dark); margin-bottom: 8px; }
    .card .meta { font-size: .85rem; color: var(--text-light); }
    .card .actions { display: flex; gap: 8px; margin-top: 12px; }
    .card .actions a { flex: 1; text-align: center; padding: 8px; border-radius: 8px; font-size: .85rem; text-decoration: none; font-weight: 500; }
    .btn-phone { background: #e8f5e9; color: var(--primary); }
    .btn-website { background: #fff3e0; color: #e65100; }
    .map-wrap { height: 400px; border-radius: var(--radius); margin-bottom: 24px; overflow: hidden; }
    #map { height: 100%; width: 100%; }
    .pagination { display: flex; justify-content: center; gap: 8px; }
    .pagination button { padding: 8px 16px; border: 1px solid #ddd; border-radius: 8px; background: white; cursor: pointer; }
    .pagination button.active { background: var(--primary); color: white; border-color: var(--primary); }
    .skeleton { background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 8px; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .skeleton-card { height: 320px; }
    .footer { text-align: center; padding: 24px; color: var(--text-light); font-size: .85rem; border-top: 1px solid #eee; margin-top: 40px; }
    @media (max-width: 640px) { .hero h1 { font-size: 1.8rem; } .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="hero">
    <h1>🌱 Farm & Produce Directory</h1>
    <p>Find local farms, fresh produce, and farmers markets near you</p>
    <input type="text" id="searchInput" placeholder="Search farms, produce, or location...">
  </div>
  <div class="container">
    <div class="controls">
      <select id="categoryFilter"><option value="">All Categories</option></select>
      <select id="cityFilter"><option value="">All Locations</option></select>
      <select id="sortFilter"><option value="name">Sort: Name</option><option value="rating">Sort: Rating</option></select>
    </div>
    <div class="map-wrap"><div id="map"></div></div>
    <div id="results" class="grid"></div>
    <div id="pagination" class="pagination"></div>
  </div>
  <div class="footer">Powered by Multi-Directory Platform</div>
  <script>
    const SLUG = new URLSearchParams(location.search).get('slug') || 'farm-directory';
    const API = '/api/v1';
    let page = 1, map, markers = [], allBiz = [];

    async function load() {
      const [dir, biz] = await Promise.all([
        fetch(`${API}/directories/${SLUG}`).then(r => r.json()),
        fetch(`${API}/directories/${SLUG}/businesses?page=${page}&per_page=50`).then(r => r.json())
      ]);
      if (dir.branding) applyBranding(dir.branding);
      allBiz = biz.data || biz;
      renderFilters(allBiz);
      renderMap(allBiz);
      renderList(allBiz);
    }

    function applyBranding(b) {
      if (b.primary_color) document.documentElement.style.setProperty('--primary', b.primary_color);
      if (b.secondary_color) document.documentElement.style.setProperty('--accent', b.secondary_color);
    }

    function renderFilters(biz) {
      const cats = [...new Set(biz.map(b => b.category?.name || 'Uncategorized'))];
      const cities = [...new Set(biz.map(b => b.city).filter(Boolean))];
      const catSel = document.getElementById('categoryFilter');
      const citySel = document.getElementById('cityFilter');
      cats.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; catSel.appendChild(o); });
      cities.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; citySel.appendChild(o); });
    }

    function renderMap(biz) {
      if (!map) {
        map = L.map('map').setView([39.8283, -98.5795], 4);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);
      }
      const hasCoords = biz.filter(b => b.latitude && b.longitude);
      if (hasCoords.length === 0) return;
      const bounds = [];
      hasCoords.forEach(b => {
        const m = L.marker([b.latitude, b.longitude]).addTo(map);
        m.bindPopup(`<b>${b.name}</b><br>${b.city || ''}, ${b.state || ''}`);
        markers.push(m);
        bounds.push([b.latitude, b.longitude]);
      });
      if (bounds.length > 1) map.fitBounds(bounds, { padding: [30, 30] });
      else if (bounds.length === 1) map.setView(bounds[0], 10);
    }

    function renderList(biz) {
      const el = document.getElementById('results');
      const q = document.getElementById('searchInput').value.toLowerCase();
      const cat = document.getElementById('categoryFilter').value;
      const city = document.getElementById('cityFilter').value;
      let filtered = biz;
      if (q) filtered = filtered.filter(b => b.name.toLowerCase().includes(q) || (b.description||'').toLowerCase().includes(q));
      if (cat) filtered = filtered.filter(b => (b.category?.name || 'Uncategorized') === cat);
      if (city) filtered = filtered.filter(b => b.city === city);
      if (filtered.length === 0) { el.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-light)">No farms found matching your criteria.</div>'; return; }
      el.innerHTML = filtered.map(b => `
        <div class="card" onclick="window.open('/#/business/${b.id}','_blank')">
          <div class="card-img" style="background:#e8f5e9;display:flex;align-items:center;justify-content:center;font-size:3rem">🌿</div>
          <div class="card-body">
            <span class="badge">${b.category?.name || 'Farm'}</span>
            <h3>${b.name}</h3>
            <div class="meta">${[b.city, b.state].filter(Boolean).join(', ')}${b.phone ? ' &middot; '+b.phone : ''}</div>
            <div class="actions">
              ${b.phone ? `<a href="tel:${b.phone}" class="btn-phone">📞 Call</a>` : ''}
              ${b.website ? `<a href="${b.website}" target="_blank" class="btn-website">🌐 Website</a>` : ''}
            </div>
          </div>
        </div>
      `).join('');
    }

    document.getElementById('searchInput').addEventListener('input', () => renderList(allBiz));
    document.getElementById('categoryFilter').addEventListener('change', () => renderList(allBiz));
    document.getElementById('cityFilter').addEventListener('change', () => renderList(allBiz));
    load();
  </script>
</body>
</html>
