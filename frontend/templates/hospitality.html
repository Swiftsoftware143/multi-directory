<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hospitality Directory | Find Hotels, B&Bs & Rentals</title>
  <meta name="description" content="Discover hotels, B&amp;Bs, vacation rentals, and event venues near you. Compare star ratings, amenities, and book your stay.">
  <meta property="og:title" content="Hospitality Directory">
  <meta property="og:description" content="Find hotels, B&Bs, vacation rentals, and event venues in your area.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://via.placeholder.com/1200x630/7c3aed/ffffff?text=Hospitality">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Hospitality Directory">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "ItemList",
    "itemListElement": [],
    "name": "Hospitality Directory"
  }
  </script>
  <style>
    :root { --primary: #7c3aed; --primary-dark: #5b21b6; --primary-light: #ede9fe; --accent: #f59e0b; --bg: #f5f3ff; --card: #ffffff; --text: #1a1a2e; --text-light: #6b7280; --radius: 12px; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
    .hero { background: linear-gradient(135deg, var(--primary-dark), var(--primary)); color: white; padding: 60px 20px; text-align: center; }
    .hero .icon { font-size: 3.5rem; margin-bottom: 8px; }
    .hero h1 { font-size: 2.5rem; margin-bottom: 8px; }
    .hero p { font-size: 1.1rem; opacity: .9; margin-bottom: 24px; }
    .hero input { width: 100%; max-width: 500px; padding: 14px 20px; border: none; border-radius: 50px; font-size: 1rem; outline: none; }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    .controls { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 24px; }
    .controls select { padding: 10px 16px; border: 1px solid #ddd; border-radius: 8px; background: white; font-size: .9rem; cursor: pointer; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(330px, 1fr)); gap: 24px; margin-bottom: 32px; }
    .card { background: var(--card); border-radius: var(--radius); overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,.08); transition: transform .2s, box-shadow .2s; cursor: pointer; }
    .card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(124,58,237,0.15); }
    .card-img { height: 180px; display: flex; align-items: center; justify-content: center; font-size: 3rem; position: relative; }
    .card-img .price-badge { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,.65); color: white; padding: 4px 12px; border-radius: 6px; font-size: .82rem; font-weight: 600; }
    .card-img .type-badge { position: absolute; top: 10px; left: 10px; background: var(--primary); color: white; padding: 3px 10px; border-radius: 6px; font-size: .75rem; font-weight: 500; }
    .card-body { padding: 18px; }
    .card h3 { font-size: 1.15rem; margin-bottom: 2px; color: var(--primary-dark); }
    .card .stars { color: var(--accent); font-size: .9rem; margin-bottom: 4px; }
    .card .meta { font-size: .85rem; color: var(--text-light); margin-bottom: 8px; }
    .card .amenities { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 12px; }
    .card .amenity-badge { display: inline-flex; align-items: center; gap: 3px; padding: 3px 8px; border-radius: 6px; font-size: .72rem; background: var(--primary-light); color: var(--primary-dark); font-weight: 500; }
    .card .actions { display: flex; gap: 8px; }
    .card .actions a { flex: 1; text-align: center; padding: 8px; border-radius: 8px; font-size: .85rem; text-decoration: none; font-weight: 500; }
    .btn-book { background: var(--primary); color: white; }
    .btn-call { background: var(--primary-light); color: var(--primary-dark); }
    .btn-website { background: #fef3c7; color: #92400e; border: 1px solid #fde68a; }
    .map-wrap { height: 350px; border-radius: var(--radius); margin-bottom: 24px; overflow: hidden; }
    #map { height: 100%; width: 100%; }
    .skeleton { background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 8px; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .skeleton-card { height: 360px; }
    .pagination { display: flex; justify-content: center; gap: 8px; }
    .pagination button { padding: 8px 16px; border: 1px solid #ddd; border-radius: 8px; background: white; cursor: pointer; }
    .pagination button.active { background: var(--primary); color: white; border-color: var(--primary); }
    .empty { text-align: center; padding: 60px 20px; color: var(--text-light); }
    .empty .icon { font-size: 3rem; margin-bottom: 12px; }
    .footer { text-align: center; padding: 24px; color: var(--text-light); font-size: .85rem; border-top: 1px solid #eee; margin-top: 40px; }
    @media (max-width: 640px) { .hero h1 { font-size: 1.8rem; } .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="hero">
    <div class="icon">🏨</div>
    <h1>Hospitality Directory</h1>
    <p>Find hotels, B&Bs, vacation rentals, and event venues near you</p>
    <input type="text" id="searchInput" placeholder="Search hotels, venues, destinations...">
  </div>
  <div class="container">
    <div class="controls">
      <select id="categoryFilter"><option value="">All Types</option></select>
      <select id="cityFilter"><option value="">All Destinations</option></select>
      <select id="ratingFilter"><option value="all">Any Rating</option><option value="4">4+ Stars</option><option value="3">3+ Stars</option></select>
    </div>
    <div class="map-wrap"><div id="map"></div></div>
    <div id="results" class="grid"></div>
    <div id="pagination" class="pagination"></div>
  </div>
  <div class="footer">Powered by Multi-Directory Platform</div>
  <script>
    const SLUG = new URLSearchParams(location.search).get('slug') || 'hospitality-directory';
    const API = '/api/v1';
    let page = 1, map, allBiz = [];

    async function load() {
      document.getElementById('results').innerHTML = '<div style="grid-column:1/-1;display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:24px">'+Array(6).fill('<div class="skeleton skeleton-card"></div>').join('')+'</div>';
      const [dir, biz] = await Promise.all([
        fetch(`${API}/directories/${SLUG}`).then(r => r.json()).catch(() => ({})),
        fetch(`${API}/directories/${SLUG}/businesses?page=${page}&per_page=50`).then(r => r.json()).catch(() => ({data: []}))
      ]);
      if (dir.branding) applyBranding(dir.branding);
      allBiz = biz.data || biz || [];
      renderFilters(allBiz);
      renderMap(allBiz);
      renderList(allBiz);
    }

    function applyBranding(b) {
      if (b.primary_color) document.documentElement.style.setProperty('--primary', b.primary_color);
    }

    function renderFilters(biz) {
      const cats = [...new Set(biz.map(b => b.category?.name || 'Property').filter(Boolean))];
      const cities = [...new Set(biz.map(b => b.city).filter(Boolean))];
      const catSel = document.getElementById('categoryFilter');
      const citySel = document.getElementById('cityFilter');
      cats.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; catSel.appendChild(o); });
      cities.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; citySel.appendChild(o); });
    }

    function renderMap(biz) {
      if (!map) {
        map = L.map('map').setView([39.8283, -98.5795], 4);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);
      }
      const coords = biz.filter(b => b.latitude && b.longitude);
      if (!coords.length) return;
      const icon = L.divIcon({html: '🏨', iconSize: [28,28], className: 'hotel-marker'});
      const bounds = [];
      coords.forEach(b => {
        const m = L.marker([b.latitude, b.longitude], {icon}).addTo(map);
        const stars = '★'.repeat(Math.round(b.rating||0));
        m.bindPopup(`<b>${b.name}</b><br>${[b.city,b.state].filter(Boolean).join(', ')}<br>${stars} ${b.rating||''}`);
        bounds.push([b.latitude, b.longitude]);
      });
      if (bounds.length > 1) map.fitBounds(bounds, {padding:[30,30]});
      else if (bounds.length === 1) map.setView(bounds[0], 12);
    }

    function renderList(biz) {
      const el = document.getElementById('results');
      const q = document.getElementById('searchInput').value.toLowerCase();
      const cat = document.getElementById('categoryFilter').value;
      const city = document.getElementById('cityFilter').value;
      const ratingFilter = document.getElementById('ratingFilter').value;
      let filtered = biz;
      if (q) filtered = filtered.filter(b => b.name.toLowerCase().includes(q) || (b.description||'').toLowerCase().includes(q) || (b.city||'').toLowerCase().includes(q));
      if (cat) filtered = filtered.filter(b => (b.category?.name || 'Property') === cat);
      if (city) filtered = filtered.filter(b => b.city === city);
      if (ratingFilter !== 'all') filtered = filtered.filter(b => (b.rating||0) >= parseInt(ratingFilter));
      if (!filtered.length) { el.innerHTML = '<div class="empty"><div class="icon">🏨</div><h3>No listings found</h3><p>Try adjusting your search criteria.</p></div>'; return; }
      el.innerHTML = filtered.map(b => `
        <div class="card" onclick="window.open('/#/business/${b.id}','_blank')">
          <div class="card-img" style="background:linear-gradient(135deg,var(--primary-light),#ddd6fe)">
            🏨
            <span class="type-badge">${b.category?.name || 'Property'}</span>
            ${b.meta?.price_range ? `<span class="price-badge">${b.meta.price_range}</span>` : ''}
          </div>
          <div class="card-body">
            <div class="stars">${'★'.repeat(Math.round(b.rating||0))}${'☆'.repeat(5-Math.round(b.rating||0))} ${b.rating ? '('+b.review_count+' reviews)' : ''}</div>
            <h3>${b.name}</h3>
            <div class="meta">${[b.city,b.state].filter(Boolean).join(', ')}${b.address ? ' · '+b.address : ''}</div>
            ${b.meta?.amenities ? `<div class="amenities">${b.meta.amenities.split(',').map(a => `<span class="amenity-badge">✓ ${a.trim()}</span>`).join('')}</div>` : ''}
            <div class="actions">
              ${b.meta?.book_url ? `<a href="${b.meta.book_url}" target="_blank" class="btn-book">📅 Book Now</a>` : ''}
              ${b.phone ? `<a href="tel:${b.phone}" class="btn-call">📞 Call</a>` : ''}
              ${b.website ? `<a href="${b.website}" target="_blank" class="btn-website">🌐 Website</a>` : ''}
            </div>
          </div>
        </div>
      `).join('');
    }

    document.getElementById('searchInput').addEventListener('input', () => renderList(allBiz));
    document.getElementById('categoryFilter').addEventListener('change', () => renderList(allBiz));
    document.getElementById('cityFilter').addEventListener('change', () => renderList(allBiz));
    document.getElementById('ratingFilter').addEventListener('change', () => renderList(allBiz));
    load();
  </script>
</body>
</html>
