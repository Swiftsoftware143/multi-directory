<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Automotive Directory | Find Dealers, Repairs & Parts</title>
  <meta name="description" content="Find auto dealers, repair shops, body shops, and parts stores near you. Compare ratings, hours, and services.">
  <meta property="og:title" content="Automotive Directory">
  <meta property="og:description" content="Discover auto dealers, repair shops, and parts stores in your area.">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Automotive Directory">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "ItemList",
    "itemListElement": [],
    "name": "Automotive Directory"
  }
  </script>
  <style>
    :root { --primary: #dc2626; --primary-dark: #991b1b; --primary-light: #fee2e2; --accent: #f59e0b; --bg: #fef2f2; --card: #ffffff; --text: #1a1a2e; --text-light: #6b7280; --radius: 12px; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
    .hero { background: linear-gradient(135deg, var(--primary-dark), var(--primary)); color: white; padding: 60px 20px; text-align: center; }
    .hero .icon { font-size: 3.5rem; margin-bottom: 8px; }
    .hero h1 { font-size: 2.5rem; margin-bottom: 8px; }
    .hero p { font-size: 1.1rem; opacity: .9; margin-bottom: 24px; }
    .hero input { width: 100%; max-width: 500px; padding: 14px 20px; border: none; border-radius: 50px; font-size: 1rem; outline: none; }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    .controls { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 24px; }
    .controls select { padding: 10px 16px; border: 1px solid #ddd; border-radius: 8px; background: white; font-size: .9rem; cursor: pointer; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; margin-bottom: 32px; }
    .card { background: var(--card); border-radius: var(--radius); overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,.08); transition: transform .2s, box-shadow .2s; cursor: pointer; }
    .card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,.12); }
    .card-img { height: 140px; display: flex; align-items: center; justify-content: center; font-size: 3rem; position: relative; }
    .card-img .type-badge { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,.65); color: white; padding: 3px 10px; border-radius: 6px; font-size: .75rem; }
    .card-body { padding: 16px; }
    .card h3 { font-size: 1.1rem; margin-bottom: 2px; }
    .card .stars { color: var(--accent); font-size: .85rem; margin-bottom: 4px; }
    .card .meta { font-size: .85rem; color: var(--text-light); margin-bottom: 4px; }
    .card .hours { font-size: .82rem; color: var(--text-light); margin-bottom: 6px; }
    .card .services { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 10px; }
    .card .service-tag { padding: 2px 8px; border-radius: 6px; font-size: .72rem; background: #1f2937; color: white; }
    .card .actions { display: flex; gap: 8px; }
    .card .actions a { flex: 1; text-align: center; padding: 8px; border-radius: 8px; font-size: .85rem; text-decoration: none; font-weight: 500; }
    .btn-call { background: var(--primary); color: white; }
    .btn-website { background: var(--primary-light); color: var(--primary-dark); border: 1px solid #fecaca; }
    .btn-map { background: #f3f4f6; color: #374151; }
    .map-cta { margin: 24px 0; background: #1f2937; border-radius: var(--radius); padding: 32px; text-align: center; color: white; }
    .map-cta h3 { color: white; font-size: 1.3rem; margin-bottom: 4px; }
    .map-cta p { color: #9ca3af; margin-bottom: 16px; }
    .map-cta a { display: inline-block; padding: 12px 28px; background: var(--primary); color: white; border-radius: 8px; text-decoration: none; font-weight: 600; }
    .map-wrap { height: 350px; border-radius: var(--radius); margin-bottom: 24px; overflow: hidden; }
    #map { height: 100%; width: 100%; }
    .skeleton { background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 8px; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .skeleton-card { height: 320px; }
    .pagination { display: flex; justify-content: center; gap: 8px; }
    .pagination button { padding: 8px 16px; border: 1px solid #ddd; border-radius: 8px; background: white; cursor: pointer; }
    .pagination button.active { background: var(--primary); color: white; border-color: var(--primary); }
    .empty { text-align: center; padding: 60px 20px; color: var(--text-light); }
    .empty .icon { font-size: 3rem; margin-bottom: 12px; }
    .footer { text-align: center; padding: 24px; color: var(--text-light); font-size: .85rem; border-top: 1px solid #eee; margin-top: 40px; }
    @media (max-width: 640px) { .hero h1 { font-size: 1.8rem; } .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="hero">
    <div class="icon">🚗</div>
    <h1>Automotive Directory</h1>
    <p>Find dealers, repair shops, body shops, and parts stores near you</p>
    <input type="text" id="searchInput" placeholder="Search dealers, shops, parts...">
  </div>
  <div class="container">
    <div class="controls">
      <select id="categoryFilter"><option value="">All Categories</option></select>
      <select id="cityFilter"><option value="">All Locations</option></select>
      <select id="sortFilter"><option value="name">Sort: Name</option><option value="rating">Sort: Rating</option></select>
    </div>
    <div class="map-wrap"><div id="map"></div></div>
    <div id="results" class="grid"></div>
    <div id="pagination" class="pagination"></div>
    <div class="map-cta">
      <h3>📍 Find Auto Services Near You</h3>
      <p>View all automotive listings on the map and find the closest shop to your location.</p>
      <a href="#" onclick="useLocation();return false;">Use My Location</a>
    </div>
  </div>
  <div class="footer">Powered by Multi-Directory Platform</div>
  <script>
    const SLUG = new URLSearchParams(location.search).get('slug') || 'automotive-directory';
    const API = '/api/v1';
    let page = 1, map, allBiz = [];

    async function load() {
      document.getElementById('results').innerHTML = '<div style="grid-column:1/-1;display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px">'+Array(6).fill('<div class="skeleton skeleton-card"></div>').join('')+'</div>';
      const [dir, biz] = await Promise.all([
        fetch(`${API}/directories/${SLUG}`).then(r => r.json()).catch(() => ({})),
        fetch(`${API}/directories/${SLUG}/businesses?page=${page}&per_page=50`).then(r => r.json()).catch(() => ({data: []}))
      ]);
      if (dir.branding) applyBranding(dir.branding);
      allBiz = biz.data || biz || [];
      renderFilters(allBiz);
      renderMap(allBiz);
      renderList(allBiz);
    }

    function applyBranding(b) {
      if (b.primary_color) document.documentElement.style.setProperty('--primary', b.primary_color);
    }

    function renderFilters(biz) {
      const cats = [...new Set(biz.map(b => b.category?.name || 'General').filter(Boolean))];
      const cities = [...new Set(biz.map(b => b.city).filter(Boolean))];
      const catSel = document.getElementById('categoryFilter');
      const citySel = document.getElementById('cityFilter');
      cats.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; catSel.appendChild(o); });
      cities.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; citySel.appendChild(o); });
    }

    function renderMap(biz) {
      if (!map) {
        map = L.map('map').setView([39.8283, -98.5795], 4);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);
      }
      const coords = biz.filter(b => b.latitude && b.longitude);
      if (!coords.length) return;
      const bounds = [];
      coords.forEach(b => {
        const m = L.marker([b.latitude, b.longitude]).addTo(map);
        m.bindPopup(`<b>${b.name}</b><br>${[b.city,b.state].filter(Boolean).join(', ')}<br>⭐ ${b.rating||'N/A'} | 📞 ${b.phone||''}`);
        bounds.push([b.latitude, b.longitude]);
      });
      if (bounds.length > 1) map.fitBounds(bounds, {padding:[30,30]});
      else if (bounds.length === 1) map.setView(bounds[0], 12);
    }

    function renderList(biz) {
      const el = document.getElementById('results');
      const q = document.getElementById('searchInput').value.toLowerCase();
      const cat = document.getElementById('categoryFilter').value;
      const city = document.getElementById('cityFilter').value;
      const sort = document.getElementById('sortFilter').value;
      let filtered = biz;
      if (q) filtered = filtered.filter(b => b.name.toLowerCase().includes(q) || (b.description||'').toLowerCase().includes(q));
      if (cat) filtered = filtered.filter(b => (b.category?.name || 'General') === cat);
      if (city) filtered = filtered.filter(b => b.city === city);
      if (sort === 'rating') filtered = [...filtered].sort((a,b) => (b.rating||0) - (a.rating||0));
      else filtered = [...filtered].sort((a,b) => a.name.localeCompare(b.name));
      if (!filtered.length) { el.innerHTML = '<div class="empty"><div class="icon">🔧</div><h3>No listings found</h3><p>Try adjusting your search or browse a different category.</p></div>'; return; }
      el.innerHTML = filtered.map(b => `
        <div class="card" onclick="window.open('/#/business/${b.id}','_blank')">
          <div class="card-img" style="background:linear-gradient(135deg,var(--primary-light),#fecaca)">🚗<span class="type-badge">${b.category?.name || 'Auto'}</span></div>
          <div class="card-body">
            <div class="stars">${'★'.repeat(Math.round(b.rating||0))}${'☆'.repeat(5-Math.round(b.rating||0))} ${b.rating ? '('+b.review_count+')' : ''}</div>
            <h3>${b.name}</h3>
            <div class="meta">${[b.city,b.state].filter(Boolean).join(', ')}${b.address ? ' · '+b.address : ''}</div>
            ${b.meta?.hours ? `<div class="hours">🕐 ${b.meta.hours}</div>` : ''}
            ${b.meta?.services ? `<div class="services">${b.meta.services.split(',').map(s => `<span class="service-tag">${s.trim()}</span>`).join('')}</div>` : ''}
            <div class="actions">
              ${b.phone ? `<a href="tel:${b.phone}" class="btn-call">📞 Call</a>` : ''}
              ${b.website ? `<a href="${b.website}" target="_blank" class="btn-website">🌐 Website</a>` : ''}
              ${b.latitude && b.longitude ? `<a href="https://maps.google.com/?q=${b.latitude},${b.longitude}" target="_blank" class="btn-map">📍 Map</a>` : ''}
            </div>
          </div>
        </div>
      `).join('');
    }

    function useLocation() {
      if (!navigator.geolocation) return;
      navigator.geolocation.getCurrentPosition(p => {
        const withCoord = allBiz.filter(b => b.latitude && b.longitude);
        const sorted = withCoord.map(b => ({...b, dist: haversine(p.coords.latitude, p.coords.longitude, b.latitude, b.longitude)})).sort((a,b)=>a.dist-b.dist);
        renderList(sorted);
        if (map) {
          map.setView([p.coords.latitude, p.coords.longitude], 10);
          L.circle([p.coords.latitude, p.coords.longitude], {radius: 5000, color: '#dc2626', fillOpacity: 0.1}).addTo(map);
        }
      });
    }

    function haversine(lat1, lon1, lat2, lon2) {
      const R = 6371, dLat = (lat2-lat1)*Math.PI/180, dLon = (lon2-lon1)*Math.PI/180;
      const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    document.getElementById('searchInput').addEventListener('input', () => renderList(allBiz));
    document.getElementById('categoryFilter').addEventListener('change', () => renderList(allBiz));
    document.getElementById('cityFilter').addEventListener('change', () => renderList(allBiz));
    document.getElementById('sortFilter').addEventListener('change', () => renderList(allBiz));
    load();
  </script>
</body>
</html>
