<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZaarHub — Discover Your Local Community</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌐</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#faf9f6;--card:#fff;--text:#1c1917;--text-light:#78716c;--text-muted:#a8a29e;
  --border:#e7e5e4;--border-light:#f0efed;
  --teal:#0d9488;--teal-dark:#0f766e;--teal-light:#14b8a6;--bg-teal:#f0fdfa;
  --warm:#d97706;--warm-light:#fef3c7;
  --terracotta:#bd5a41;
  --accent:#7c3aed;--accent-light:#ede9fe;
  --green:#16a34a;--green-light:#dcfce7;
  --orange:#ea580c;--orange-light:#fff7ed;
  --pink:#db2777;--pink-light:#fdf2f8;
  --blue:#2563eb;--blue-light:#eff6ff;
  --shadow-sm:0 1px 2px rgba(0,0,0,.05);--shadow:0 4px 12px rgba(0,0,0,.08);--shadow-lg:0 12px 32px rgba(0,0,0,.12);
  --radius:12px;--radius-lg:16px;--radius-xl:24px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
a{color:var(--teal);text-decoration:none}
a:hover{text-decoration:underline}

/* ── Header / Nav ── */
.zh-header{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.95);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
.zh-header-inner{max-width:1280px;margin:0 auto;padding:0 24px;display:flex;align-items:center;height:68px;gap:16px}
.zh-logo{font-size:1.25rem;font-weight:800;color:var(--teal);letter-spacing:-.5px;display:flex;align-items:center;gap:6px;white-space:nowrap}
.zh-logo span{font-size:1.3rem}
.zh-logo small{font-size:.75rem;font-weight:400;color:var(--text-light);margin-left:2px}
.zh-city-select{position:relative;flex-shrink:0}
.zh-city-select select{appearance:none;background:var(--bg-teal);border:1px solid var(--teal);border-radius:var(--radius);padding:8px 32px 8px 12px;font-size:.85rem;font-weight:600;color:var(--teal-dark);cursor:pointer;outline:none;min-width:160px}
.zh-city-select::after{content:'▾';position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:.7rem;color:var(--teal);pointer-events:none}
.zh-search-bar{flex:1;max-width:480px;position:relative}
.zh-search-bar input{width:100%;padding:10px 16px 10px 40px;border:1px solid var(--border);border-radius:100px;font-size:.9rem;outline:none;background:var(--bg);transition:all .2s}
.zh-search-bar input:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(13,148,136,.12)}
.zh-search-bar .icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:.9rem;color:var(--text-light)}
.zh-nav-links{display:flex;align-items:center;gap:8px;margin-left:auto;flex-shrink:0}
.zh-nav-links a{padding:8px 14px;border-radius:var(--radius);font-size:.85rem;font-weight:500;color:var(--text);transition:all .2s;white-space:nowrap}
.zh-nav-links a:hover{background:var(--bg-teal);color:var(--teal);text-decoration:none}
.zh-btn-primary{background:var(--teal);color:#fff !important;padding:8px 18px;border-radius:100px;font-weight:600}
.zh-btn-primary:hover{background:var(--teal-dark) !important}
.zh-hamburger{display:none;background:none;border:none;font-size:1.5rem;cursor:pointer;padding:4px;color:var(--text)}

/* ── Ticker / Notification Bar ── */
.zh-ticker{background:linear-gradient(90deg,#0f766e,#0d9488);color:#fff;overflow:hidden;white-space:nowrap;position:relative;height:40px;line-height:40px;font-size:.82rem;font-weight:500;cursor:pointer}
.zh-ticker-inner{display:inline-block;padding-left:100%;animation:ticker-scroll 30s linear infinite}
@keyframes ticker-scroll{0%{transform:translateX(0)}100%{transform:translateX(-100%)}}
.zh-ticker-close{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.2);border:none;color:#fff;width:24px;height:24px;border-radius:50%;cursor:pointer;font-size:.7rem;display:flex;align-items:center;justify-content:center;z-index:2}
.zh-ticker-close:hover{background:rgba(255,255,255,.4)}
.zh-ticker-item{margin-right:48px}
.zh-ticker-item a{color:#fff;text-decoration:underline}
.zh-ticker-item a:hover{color:#ccfbf1}

/* ── Mobile Bottom Nav ── */
.zh-bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);z-index:200;padding:6px 0;padding-bottom:calc(6px + env(safe-area-inset-bottom,0px))}
.zh-bottom-nav-inner{display:flex;justify-content:space-around;align-items:center}
.zh-bottom-nav a{display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 12px;min-height:48px;min-width:56px;color:var(--text-light);font-size:.7rem;font-weight:500;text-decoration:none;transition:all .15s;border-radius:8px}
.zh-bottom-nav a .nav-icon{font-size:1.2rem}
.zh-bottom-nav a.active{color:var(--teal)}
.zh-bottom-nav a:hover{background:var(--bg-teal);color:var(--teal);text-decoration:none}

/* ── Spotlight Cards ── */
.zh-spotlight-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.zh-spotlight-card{background:linear-gradient(135deg,#fff,var(--bg-teal));border:1px solid var(--teal-light);border-radius:var(--radius-lg);padding:16px;position:relative;overflow:hidden;transition:all .2s;cursor:pointer}
.zh-spotlight-card:hover{box-shadow:var(--shadow);transform:translateY(-2px)}
.zh-spotlight-card .spot-badge{position:absolute;top:0;right:0;background:linear-gradient(135deg,var(--warm),#f59e0b);color:#fff;font-size:.65rem;font-weight:800;padding:4px 12px 4px 16px;border-radius:0 0 0 12px;text-transform:uppercase;letter-spacing:.5px}
.zh-spotlight-card h4{font-size:1rem;font-weight:700;margin-bottom:4px;padding-right:80px}
.zh-spotlight-card .cat{margin-top:8px;display:inline-block;background:var(--bg-teal);color:var(--teal-dark);font-size:.72rem;font-weight:600;padding:2px 10px;border-radius:100px}
.zh-spotlight-card .stars{color:var(--warm);font-size:.8rem;margin-top:4px}

/* ── Ad Slots ── */
.zh-ad-slot{display:none;max-width:100%;overflow:hidden}
.zh-ad-slot.active{display:block}
.zh-ad-slot .ad-label{font-size:.68rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;font-weight:500}
.zh-ad-slot img{max-width:100%;height:auto;border-radius:var(--radius);display:block}
.zh-ad-hero{margin:8px auto 24px;text-align:center;max-width:728px}
.zh-ad-hero img{border-radius:var(--radius);box-shadow:var(--shadow-sm)}
.zh-ad-sidebar{margin:16px 0;text-align:center}
.zh-ad-sidebar img{border-radius:var(--radius);box-shadow:var(--shadow-sm)}
.zh-ad-footer{margin:32px auto 8px;text-align:center;max-width:728px}
.zh-ad-footer img{border-radius:var(--radius);box-shadow:var(--shadow-sm)}
.zh-ad-card{display:flex;flex-direction:column;align-items:center;gap:4px;background:var(--card);border:1px solid var(--border-light);border-radius:var(--radius);padding:12px;transition:box-shadow .2s}
.zh-ad-card:hover{box-shadow:var(--shadow)}
.zh-ad-card a{display:block;width:100%}
.zh-ad-card .sponsor-name{font-size:.72rem;color:var(--text-muted);margin-top:2px}

/* ── Fix mobile touch targets min 44px ── */
.zh-hero-cat,.zh-filter-pill,.zh-biz-actions .action,.zh-event-card .rsvp,.zh-city-card,.zh-deal-card{cursor:pointer;min-height:44px;display:inline-flex;align-items:center}
.zh-biz-card,.zh-deal-card-sm,.zh-event-card-sm{cursor:pointer}

@media(max-width:768px){
  body{padding-bottom:68px}
  .zh-bottom-nav{display:block}
}

/* ── Hero ── */
.zh-hero{background:linear-gradient(135deg,#0f172a 0%,#134e4a 50%,#0d9488 100%);padding:60px 24px 48px;text-align:center;position:relative;overflow:hidden}
.zh-hero::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle at 30% 40%,rgba(13,148,136,.15) 0%,transparent 60%),radial-gradient(circle at 70% 60%,rgba(20,184,166,.1) 0%,transparent 50%);pointer-events:none}
.zh-hero-inner{position:relative;max-width:720px;margin:0 auto}
.zh-hero h1{font-size:2.5rem;font-weight:800;color:#fff;line-height:1.15;margin-bottom:12px;letter-spacing:-.5px}
.zh-hero h1 span{background:linear-gradient(135deg,#5eead4,#2dd4bf);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.zh-hero p{font-size:1.1rem;color:#94a3b8;margin-bottom:28px;line-height:1.6}
.zh-hero-categories{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin-bottom:20px}
.zh-hero-cat{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:100px;color:#e2e8f0;font-size:.82rem;cursor:pointer;transition:all .2s}
.zh-hero-cat:hover{background:rgba(255,255,255,.2);border-color:rgba(255,255,255,.3);color:#fff;text-decoration:none}
.zh-hero-stats{display:flex;justify-content:center;gap:40px;margin-top:32px}
.zh-hero-stat{text-align:center}
.zh-hero-stat .num{font-size:1.5rem;font-weight:800;color:#5eead4;display:block}
.zh-hero-stat .label{font-size:.78rem;color:#94a3b8;margin-top:2px}

/* ── Sections ── */
.zh-section{padding:48px 24px}
.zh-section-inner{max-width:1280px;margin:0 auto}
.zh-section-title{font-size:1.35rem;font-weight:700;margin-bottom:4px}
.zh-section-sub{font-size:.9rem;color:var(--text-light);margin-bottom:24px}
.zh-section-header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:20px;flex-wrap:wrap;gap:8px}
.zh-section-header h2{font-size:1.25rem;font-weight:700}

/* ── City Cards Grid ── */
.zh-city-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
.zh-city-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.zh-city-card:hover{box-shadow:var(--shadow);border-color:var(--teal);transform:translateY(-2px)}
.zh-city-card .emoji{font-size:2rem;margin-bottom:8px}
.zh-city-card h3{font-size:1.05rem;font-weight:700;margin-bottom:4px}
.zh-city-card p{font-size:.82rem;color:var(--text-light);margin-bottom:8px}
.zh-city-card .count{font-size:.8rem;color:var(--teal);font-weight:600}
.zh-city-card .zh-featured-badge{position:absolute;top:12px;right:12px;background:var(--warm-light);color:var(--warm);font-size:.7rem;font-weight:700;padding:3px 10px;border-radius:100px}

/* ── Deals Carousel ── */
.zh-deals-scroll{display:flex;gap:16px;overflow-x:auto;padding-bottom:8px;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch}
.zh-deals-scroll::-webkit-scrollbar{height:4px}
.zh-deals-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.zh-deal-card{flex:0 0 300px;scroll-snap-align:start;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;transition:all .2s}
.zh-deal-card:hover{box-shadow:var(--shadow);transform:translateY(-2px)}
.zh-deal-img{height:140px;background:var(--bg-teal);display:flex;align-items:center;justify-content:center;font-size:2.5rem;color:var(--teal)}
.zh-deal-body{padding:16px}
.zh-deal-body h4{font-size:.95rem;font-weight:700;margin-bottom:4px}
.zh-deal-body .price{font-size:1.1rem;font-weight:800;color:var(--teal);margin-bottom:4px}
.zh-deal-body .price s{font-size:.85rem;color:var(--text-light);font-weight:400;margin-left:6px}
.zh-deal-body .biz{font-size:.78rem;color:var(--text-light)}
.zh-deal-body .deal-badge{display:inline-block;background:var(--warm-light);color:var(--warm);font-size:.7rem;font-weight:700;padding:2px 8px;border-radius:100px;margin-top:6px}

/* ── Activity Feed ── */
.zh-activity-list{display:flex;flex-direction:column;gap:10px}
.zh-activity-item{display:flex;align-items:flex-start;gap:12px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;transition:all .2s}
.zh-activity-item:hover{background:var(--bg-teal);border-color:var(--teal-light)}
.zh-activity-avatar{width:36px;height:36px;border-radius:50%;background:var(--bg-teal);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}
.zh-activity-body{flex:1;min-width:0}
.zh-activity-body .msg{font-size:.85rem;line-height:1.4}
.zh-activity-body .time{font-size:.75rem;color:var(--text-muted);margin-top:2px}
.zh-activity-body .stars{color:var(--warm);font-size:.8rem}

/* ── Events Grid ── */
.zh-event-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.zh-event-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;transition:all .2s}
.zh-event-card:hover{box-shadow:var(--shadow);transform:translateY(-2px)}
.zh-event-date{display:flex;align-items:center;justify-content:center;gap:4px;padding:10px;background:var(--accent-light);color:var(--accent);font-size:.75rem;font-weight:700}
.zh-event-body{padding:16px}
.zh-event-body h4{font-size:.95rem;font-weight:700;margin-bottom:4px}
.zh-event-body p{font-size:.82rem;color:var(--text-light);margin-bottom:6px}
.zh-event-body .meta{font-size:.78rem;color:var(--text-muted)}
.zh-event-body .rsvp{display:inline-block;margin-top:8px;background:var(--accent);color:#fff;padding:5px 14px;border-radius:100px;font-size:.78rem;font-weight:600}

/* ── CTA Banner ── */
.zh-cta{background:linear-gradient(135deg,#0f172a 0%,#134e4a 50%,#0d9488 100%);padding:56px 24px;text-align:center}
.zh-cta h2{font-size:1.75rem;font-weight:800;color:#fff;margin-bottom:8px}
.zh-cta p{font-size:1rem;color:#94a3b8;margin-bottom:24px;max-width:500px;margin-left:auto;margin-right:auto}
.zh-cta .zh-btn{display:inline-flex;align-items:center;gap:8px;padding:12px 28px;border-radius:100px;font-size:.95rem;font-weight:700;transition:all .2s;cursor:pointer;border:none}
.zh-cta .zh-btn-primary{background:#fff;color:var(--teal-dark)}
.zh-cta .zh-btn-primary:hover{background:var(--bg-teal);transform:translateY(-1px)}
.zh-cta .zh-btn-outline{background:transparent;border:2px solid rgba(255,255,255,.3);color:#fff;margin-left:12px}
.zh-cta .zh-btn-outline:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.5)}

/* ── Footer ── */
.zh-footer{background:#0f172a;padding:40px 24px;color:#94a3b8}
.zh-footer-inner{max-width:1280px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:32px}
.zh-footer h4{color:#e2e8f0;font-size:.85rem;font-weight:700;margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px}
.zh-footer a{display:block;padding:4px 0;font-size:.82rem;color:#94a3b8}
.zh-footer a:hover{color:#fff;text-decoration:none}
.zh-footer-bottom{border-top:1px solid #1e293b;margin-top:32px;padding-top:20px;max-width:1280px;margin-left:auto;margin-right:auto;font-size:.78rem;text-align:center}

/* ── Loading ── */
.zh-loading{text-align:center;padding:80px 24px;color:var(--text-light)}
.zh-spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--teal);border-radius:50%;animation:spin .6s linear;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── City Page ── */
.zh-city-hero{padding:48px 24px 32px;background:linear-gradient(135deg,#0f172a 0%,#134e4a 70%,#0d9488 100%);color:#fff;position:relative;overflow:hidden}
.zh-city-hero-inner{max-width:1280px;margin:0 auto;position:relative}
.zh-city-hero h1{font-size:2rem;font-weight:800;margin-bottom:6px}
.zh-city-hero .sub{color:#94a3b8;font-size:.95rem;margin-bottom:20px}
.zh-filter-bar{display:flex;flex-wrap:wrap;gap:8px}
.zh-filter-pill{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:100px;color:#e2e8f0;font-size:.8rem;cursor:pointer;transition:all .2s}
.zh-filter-pill:hover,.zh-filter-pill.active{background:rgba(255,255,255,.2);border-color:rgba(255,255,255,.3);color:#fff}
.zh-filter-pill.active{background:var(--teal);border-color:var(--teal);color:#fff}
.zh-city-content{max-width:1280px;margin:0 auto;padding:24px;display:grid;grid-template-columns:1fr;gap:24px}

/* ── Search Results ── */
.zh-search-hero{padding:40px 24px;background:linear-gradient(135deg,#0f172a 0%,#134e4a 50%,#0d9488 100%)}
.zh-search-hero-inner{max-width:720px;margin:0 auto}
.zh-search-hero h1{font-size:1.5rem;color:#fff;margin-bottom:16px}
.zh-search-hero .zh-search-bar{max-width:100%}

/* ── Responsive ── */
@media(max-width:768px){
  .zh-header-inner{padding:0 16px;gap:10px}
  .zh-logo small{display:none}
  .zh-nav-links{display:none}
  .zh-hamburger{display:block}
  .zh-nav-links.open{display:flex;flex-direction:column;position:absolute;top:68px;left:0;right:0;background:#fff;border-bottom:1px solid var(--border);padding:12px 16px;box-shadow:var(--shadow-lg)}
  .zh-hero h1{font-size:1.6rem}
  .zh-hero-stats{gap:20px}
  .zh-hero-stat .num{font-size:1.2rem}
  .zh-section{padding:32px 16px}
  .zh-city-grid{grid-template-columns:1fr}
  .zh-deal-card{flex:0 0 260px}
  .zh-city-select select{min-width:120px;font-size:.8rem}
  .zh-search-bar{max-width:200px}
}

/* ── City Page Biz Cards ── */
.zh-biz-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.zh-biz-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;display:flex;flex-direction:column;cursor:pointer;transition:all .2s}
.zh-biz-card:hover{box-shadow:var(--shadow);transform:translateY(-2px);border-color:var(--teal-light)}
.zh-biz-img{height:120px;display:flex;align-items:center;justify-content:center;font-size:2.5rem;color:var(--teal);overflow:hidden}
.zh-biz-img img{width:100%;height:100%;object-fit:cover}
.zh-biz-body{padding:14px}
.zh-biz-body h4{font-size:1rem;font-weight:700;margin-bottom:4px}
.zh-biz-body .stars{font-size:.82rem;color:var(--warm);margin-bottom:4px}
.zh-biz-body .addr{font-size:.8rem;color:var(--text-light);margin-bottom:4px}
.zh-biz-body .badges{display:flex;gap:4px;margin-bottom:4px}
.zh-biz-body .badge-owner,.zh-biz-body .badge-perk{display:inline-block;font-size:.7rem;font-weight:700;padding:2px 8px;border-radius:100px}
.badge-owner{background:var(--blue-light);color:var(--blue)}
.badge-perk{background:var(--warm-light);color:var(--warm)}
.zh-biz-actions{display:flex;gap:8px;margin-top:8px}
.zh-biz-actions .action{padding:6px 12px;border:1px solid var(--border);border-radius:100px;font-size:.78rem;font-weight:600;color:var(--text);transition:all .2s}
.zh-biz-actions .action:hover{border-color:var(--teal);color:var(--teal);background:var(--bg-teal);text-decoration:none}

/* ── Deal/Event cards (city page) ── */
.zh-deal-sm-grid,.zh-event-sm-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.zh-deal-card-sm,.zh-event-card-sm{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:all .2s;cursor:pointer}
.zh-deal-card-sm:hover,.zh-event-card-sm:hover{box-shadow:var(--shadow);transform:translateY(-1px)}
.zh-deal-sm-body{padding:14px}
.zh-deal-sm-body h4{font-size:.9rem;font-weight:700;margin-bottom:4px}
.zh-deal-sm-body .price{font-size:1rem;font-weight:800;color:var(--teal)}
.zh-deal-sm-body .biz{font-size:.78rem;color:var(--text-light)}
.zh-deal-sm-body .deal-badge{display:inline-block;background:var(--warm-light);color:var(--warm);font-size:.7rem;font-weight:700;padding:2px 8px;border-radius:100px;margin-top:4px}

/* ── ENHANCED: Happening Today Ticker ── */
.zh-today-ticker{background:linear-gradient(90deg,#fef3c7,#fffbeb);border-bottom:1px solid var(--border);padding:8px 24px;display:flex;align-items:center;gap:10px;font-size:.82rem;overflow:hidden;position:relative;min-height:36px}
.zh-today-ticker .today-label{font-weight:700;color:var(--warm);white-space:nowrap;flex-shrink:0}
.zh-today-ticker .today-msg{color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;opacity:1;transition:opacity .5s}
.zh-today-ticker .today-msg.fade-out{opacity:0}
.zh-today-ticker .today-msg.fade-in{opacity:1}

/* ── ENHANCED: Spot of the Week ── */

.zh-spot-week .spot-icon{font-size:1.2rem}
.zh-spot-week .spot-info{flex:1}

.zh-spot-week .spot-info span{font-size:.75rem;color:var(--text-light)}
.zh-spot-week .spot-badge{background:var(--warm-light);color:var(--warm);font-size:.68rem;font-weight:800;padding:2px 10px;border-radius:100px;white-space:nowrap}
.zh-spot-week .spot-link{font-size:.78rem;font-weight:600;color:var(--teal);white-space:nowrap}

/* ── ENHANCED: Founder's Spotlight / Story Cards ── */

.zh-story-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;transition:all .2s;cursor:pointer;position:relative;border-left:4px solid var(--warm)}
.zh-story-card:hover{box-shadow:var(--shadow);transform:translateY(-2px);border-color:var(--warm)}
.zh-story-card .zh-story-avatar{width:48px;height:48px;border-radius:50%;background:var(--warm-light);display:flex;align-items:center;justify-content:center;font-size:1.5rem;margin-bottom:10px}

.zh-story-card .owner{font-size:.78rem;color:var(--text-light);margin-bottom:8px}
.zh-story-card .blurb{font-size:.82rem;color:var(--text);line-height:1.5;margin-bottom:10px}

.zh-story-card a:hover{color:var(--teal-dark)}

/* ── ENHANCED: View Toggle (List/Map/Split) ── */
.zh-view-toggle{display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap}
.zh-view-toggle button{display:inline-flex;align-items:center;gap:4px;padding:8px 16px;border:1px solid var(--border);border-radius:100px;background:var(--card);color:var(--text);font-size:.82rem;font-weight:600;cursor:pointer;transition:all .2s;min-height:44px}
.zh-view-toggle button:hover{background:var(--bg-teal);border-color:var(--teal-light)}

#zh-city-map{width:100%;height:400px;border-radius:var(--radius-lg);overflow:hidden;border:1px solid var(--border);display:none}
#zh-city-map.active{display:block}
.zh-city-view-split{display:flex;gap:16px}
.zh-city-view-split .zh-biz-grid{flex:1;min-width:0}
.zh-city-view-split #zh-city-map{flex:1;height:600px;display:block}
.zh-city-view-split .zh-biz-side{flex:1;min-width:0;overflow-y:auto;max-height:600px}

/* ── ENHANCED: Notification Bell ── */
.zh-notif-bell{position:relative;display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:50%;background:transparent;border:none;cursor:pointer;font-size:1.2rem;transition:all .2s;min-height:44px;min-width:44px}

/* ── ENHANCED: Role Switcher ── */
.zh-role-switcher{display:inline-flex;align-items:center;gap:4px;background:var(--bg-teal);border:1px solid var(--teal);border-radius:100px;padding:3px;font-size:.75rem;font-weight:600}
.zh-role-switcher button{padding:4px 12px;border:none;border-radius:100px;cursor:pointer;font-size:.75rem;font-weight:600;transition:all .2s;background:transparent;color:var(--text-light);min-height:32px}

/* ── ENHANCED: Sign In Button ── */
.zh-signin-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border:1px solid var(--border);border-radius:100px;font-size:.82rem;font-weight:600;color:var(--text);background:var(--card);cursor:pointer;transition:all .2s;min-height:44px}
.zh-signin-btn:hover{background:var(--bg-teal);border-color:var(--teal);color:var(--teal);text-decoration:none}

/* ── ENHANCED: Business Owner CTA Block ── */
.zh-owner-cta{background:linear-gradient(135deg,#0f172a 0%,#134e4a 50%,#0d9488 100%);padding:48px 24px;text-align:center;border-radius:var(--radius-xl);margin:24px 0}
.zh-owner-cta h2{font-size:1.5rem;font-weight:800;color:#fff;margin-bottom:6px}
.zh-owner-cta p{color:#94a3b8;font-size:.95rem;margin-bottom:20px}
.zh-owner-cta-features{display:flex;justify-content:center;gap:20px;flex-wrap:wrap;margin-bottom:16px}
.zh-owner-cta-features span{display:inline-flex;align-items:center;gap:6px;color:#5eead4;font-size:.85rem;font-weight:600}
.zh-owner-cta .count{color:#94a3b8;font-size:.85rem;margin-bottom:20px}
.zh-owner-cta .zh-btn-primary{background:#fff;color:var(--teal-dark);padding:14px 32px;border-radius:100px;font-size:1rem;font-weight:700;display:inline-flex;align-items:center;gap:8px;transition:all .2s}
.zh-owner-cta .zh-btn-primary:hover{background:var(--bg-teal);transform:translateY(-2px)}

/* ── ENHANCED: Verification Badges ── */
.zh-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.7rem;font-weight:600;margin-right:4px;white-space:nowrap}
.zh-badge-verified{background:#065f46;color:#a7f3d0}
.zh-badge-toprated{background:#fef3c7;color:#92400e}
.zh-badge-family{background:#ede9fe;color:#5b21b6}
.zh-badge-perk{background:#fef3c7;color:#92400e}

/* ── ENHANCED: Rating Stars ── */
.zh-rating{color:var(--warm);font-size:.82rem;display:inline-flex;align-items:center;gap:2px}
.zh-rating .num{color:var(--text-light);font-size:.78rem;font-weight:400}

/* ── ENHANCED: Biz Card Action Buttons Row ── */
.zh-biz-actions-row{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.zh-biz-actions-row .action{display:inline-flex;align-items:center;gap:4px;padding:6px 12px;border:1px solid var(--border);border-radius:100px;font-size:.75rem;font-weight:600;color:var(--text);background:var(--card);cursor:pointer;transition:all .2s;min-height:44px;min-width:44px;justify-content:center}
.zh-biz-actions-row .action:hover{border-color:var(--teal);color:var(--teal);background:var(--bg-teal);text-decoration:none}
.zh-biz-actions-row .action.save-active{color:var(--warm);border-color:var(--warm);background:var(--warm-light)}

/* ── ENHANCED: Cover Image Area ── */
.zh-biz-cover{height:130px;display:flex;align-items:center;justify-content:center;font-size:2.5rem;color:#fff;overflow:hidden;position:relative}
.zh-biz-cover img{width:100%;height:100%;object-fit:cover}
.zh-biz-cover .letter{font-size:2.8rem;font-weight:800;opacity:.9;text-shadow:0 2px 8px rgba(0,0,0,.2)}
.zh-biz-cover .cat-tag{position:absolute;bottom:8px;left:8px;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);color:#fff;font-size:.68rem;font-weight:700;padding:2px 10px;border-radius:100px}

/* ── ENHANCED: City Hero Enhanced ── */
.zh-city-hero-enhanced{position:relative;overflow:hidden}
.zh-city-hero-enhanced .weather{font-size:.85rem;color:#94a3b8;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.zh-city-hero-enhanced .biz-stat{font-size:.85rem;color:#94a3b8;margin-bottom:16px}

/* ── ENHANCED: Modal for Collections ── */
.zh-modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:24px}
.zh-modal{background:var(--card);border-radius:var(--radius-xl);max-width:480px;width:100%;max-height:80vh;overflow-y:auto;box-shadow:var(--shadow-lg);padding:24px}
.zh-modal h3{font-size:1.2rem;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.zh-modal-close{float:right;background:none;border:none;font-size:1.2rem;cursor:pointer;color:var(--text-light);padding:4px;min-height:44px;min-width:44px}
.zh-modal-close:hover{color:var(--text)}
.zh-collection-create{display:flex;gap:8px;margin-bottom:16px}
.zh-collection-create input{flex:1;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius);font-size:.9rem;outline:none}
.zh-collection-create input:focus{border-color:var(--teal)}
.zh-collection-create button{background:var(--teal);color:#fff;border:none;padding:10px 18px;border-radius:var(--radius);font-weight:600;cursor:pointer;font-size:.85rem;min-height:44px}
.zh-collection-create button:hover{background:var(--teal-dark)}
.zh-collection-item{border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:all .2s}
.zh-collection-item:hover{background:var(--bg-teal)}
.zh-collection-item .name{font-size:.88rem;font-weight:600}
.zh-collection-item .count{font-size:.75rem;color:var(--text-light);margin-top:2px}
.zh-collection-item .biz-list{padding:8px 0 0 12px;display:none}
.zh-collection-item .biz-list.open{display:block}
.zh-collection-item .biz-list div{padding:4px 0;font-size:.82rem;color:var(--text)}
.zh-collection-empty{text-align:center;padding:24px;color:var(--text-light);font-size:.9rem}

/* ── Responsive additions ── */
@media(max-width:768px){
  .zh-city-view-split{flex-direction:column}
  .zh-city-view-split #zh-city-map{height:300px}
  .zh-city-view-split .zh-biz-side{max-height:none}
  .zh-view-toggle{justify-content:center}
  .zh-view-toggle button{font-size:.78rem;padding:6px 12px}
  #zh-city-map{height:300px}
  .zh-today-ticker{padding:6px 12px;font-size:.78rem;flex-wrap:wrap}
  .zh-owner-cta{padding:32px 16px}
  .zh-owner-cta h2{font-size:1.25rem}
  .zh-owner-cta-features{gap:10px;flex-direction:column;align-items:center}
  .zh-founders-grid{grid-template-columns:1fr}
  .zh-spot-week{margin:0 12px;flex-wrap:wrap}
  .zh-modal{margin:12px}
  .zh-notif-bell,.zh-signin-btn,.zh-role-switcher{display:none}
}

@media(max-width:480px){
  .zh-biz-actions-row .action{font-size:.72rem;padding:4px 8px}
  .zh-biz-cover{height:100px}
  .zh-filter-bar button:nth-last-child(1){width:100%!important;justify-content:center}
  .zh-near-badge{width:100%!important;justify-content:center}
}

<body>

<div id="app">
  <div class="zh-loading">
    <div class="zh-spinner"></div>
    <p style="margin-top:12px;font-size:.9rem">Loading ZaarHub...</p>
  </div>
</div>

<nav id="mobile-nav" class="zh-nav-links" style="display:none"></nav>

<script>
// ── Helpers ──
async function g(url){let r=await fetch('/api/v1'+url);if(!r.ok){let e=await r.json().catch(()=>({}));throw new Error(e.message||e.error||'Request failed')}return r.json()}
function esc(s){if(!s)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
function $$(s){return document.querySelector(s)}
function qa(s){return document.querySelectorAll(s)}
function ac(el,ev,fn){el.addEventListener(ev,fn)}
function ago(d){if(!d)return '';var s=Math.floor((Date.now()-new Date(d).getTime())/1000);if(s<60)return 'just now';if(s<3600)return Math.floor(s/60)+'m ago';if(s<86400)return Math.floor(s/3600)+'h ago';return Math.floor(s/86400)+'d ago'}
function toTitle(s){return s.replace(/-/g,' ').replace(/\b\w/g,c=>c.toUpperCase())}

// ── Haversine distance (km) ──
function haversineKm(lat1,lng1,lat2,lng2){
  var R=6371; // km
  var dLat=(lat2-lat1)*Math.PI/180;
  var dLng=(lng2-lng1)*Math.PI/180;
  var a=Math.sin(dLat/2)*Math.sin(dLat/2)+
        Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
        Math.sin(dLng/2)*Math.sin(dLng/2);
  var c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
  return R*c;
}
function haversineMi(lat1,lng1,lat2,lng2){return haversineKm(lat1,lng1,lat2,lng2)*0.621371}

// ── Near Me (Geolocation) ──
function requestNearMe(){
  if(!navigator.geolocation){
    showNearToast('Geolocation not supported in your browser');
    return;
  }
  showNearToast('📍 Finding businesses near you...');
  navigator.geolocation.getCurrentPosition(
    function(pos){
      state.userLat=pos.coords.latitude;
      state.userLng=pos.coords.longitude;
      state.isNearActive=true;
      state.nearRadius=state.nearRadius||5000;
      showNearToast('📍 Location acquired! Updating results...',2000);
      // Re-fetch search results if on search page, or reload city page
      if(state.page==='search'){loadSearchResults()}
      else if(state.page==='city'){loadCityPage()}
      else{location.hash='#/search/'}
    },
    function(err){
      var msgs={1:'Permission denied. Enable location access in your browser settings to find businesses near you.',2:'Position unavailable. Try again later.',3:'Location request timed out.'};
      showNearToast('📍 '+ (msgs[err.code]||'Could not get location. Please enable location access.'));
      state.isNearActive=false;
    },
    {enableHighAccuracy:true,timeout:10000,maximumAge:300000}
  );
}

function clearNearMe(){
  state.isNearActive=false;
  state.userLat=null;
  state.userLng=null;
  state.nearRadius=5000;
  if(state.page==='search'){loadSearchResults()}
  else if(state.page==='city'){loadCityPage()}
}

function changeNearMeLocation(){
  state.isNearActive=false;
  requestNearMe();
}

function setNearRadius(meters){
  state.nearRadius=meters;
  if(state.isNearActive&&state.userLat&&state.userLng){
    if(state.page==='search'){loadSearchResults()}
    else if(state.page==='city'){loadCityPage()}
  }
}

// Toasts for near-me messages
var _nearToastTimer=null;
function showNearToast(msg,duration){
  duration=duration||5000;
  var existing=document.getElementById('zh-near-toast');
  if(existing)existing.remove();
  if(_nearToastTimer)clearTimeout(_nearToastTimer);
  var toast=document.createElement('div');
  toast.id='zh-near-toast';
  toast.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:9999;background:#1c1917;color:#fff;padding:12px 24px;border-radius:12px;font-size:.85rem;font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,.25);max-width:90vw;text-align:center;animation:fadeIn .3s ease';
  toast.textContent=msg;
  document.body.appendChild(toast);
  _nearToastTimer=setTimeout(function(){if(toast.parentNode){toast.style.opacity='0';toast.style.transition='opacity .3s';setTimeout(function(){if(toast.parentNode)toast.remove()},300)}},duration);
}

// Inject fade-in animation if not present
(function(){var s=document.createElement('style');s.textContent='@keyframes fadeIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}.zh-near-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;background:var(--teal);color:#fff;border-radius:100px;font-size:.78rem;font-weight:600;white-space:nowrap}.zh-near-badge .close{cursor:pointer;opacity:.7;margin-left:4px}.zh-near-badge .close:hover{opacity:1}.zh-dist-badge{font-size:.72rem;color:var(--text-muted);display:inline-flex;align-items:center;gap:3px;margin-left:6px}';document.head.appendChild(s)})()

// ── State ──
let state={page:'home',cities:[],homepageData:null,slug:'',searchQuery:'',filterCategory:'',loading:true,user:null,authUser:null,roleMode:'resident',userLat:null,userLng:null,nearRadius:5000,isNearActive:false}

// ── Collections (localStorage) ──
function loadCollections(){try{var r=localStorage.getItem('zh_collections');return r?JSON.parse(r):[]}catch(e){return[]}}
function saveCollections(c){try{localStorage.setItem('zh_collections',JSON.stringify(c))}catch(e){}}
function findCollectionForBiz(name){var c=loadCollections();for(var i=0;i<c.length;i++){for(var j=0;j<c[i].businesses.length;j++){if(c[i].businesses[j].name===name)return c[i].name}}return null}
function removeBizFromCollections(name){var c=loadCollections();for(var i=0;i<c.length;i++){c[i].businesses=c[i].businesses.filter(function(b){return b.name!==name})}c=c.filter(function(col){return col.businesses.length>0});saveCollections(c)}

// ── Role Mode ──
function getRoleMode(){try{var r=localStorage.getItem('zh_role_mode');return r||'resident'}catch(e){return'resident'}}
function setRoleMode(m){try{localStorage.setItem('zh_role_mode',m)}catch(e){}}
// Determine if user has owner accounts (placeholder - will read from authUser later)
function hasOwnerAccounts(){return false}

// ── Router ──
function route(){
  let hash=location.hash.slice(1)||'/';
  if(hash.startsWith('/city/')){
    state.page='city';state.slug=hash.split('/')[2];state.filterCategory=''
  }else if(hash.startsWith('/search/')){
    state.page='search';state.searchQuery=decodeURIComponent(hash.slice(8))
  }else if(hash==='/'||hash.startsWith('/?')){
    state.page='home'
  }else if(hash.startsWith('/deals')){
    state.page='deals'
  }else if(hash.startsWith('/events')){
    state.page='events'
  }else if(hash.startsWith('/cities')){
    state.page='home'
  }else{state.page='home'}
  load()
}

window.addEventListener('hashchange',route)
window.addEventListener('load',route)

// ── City Selector ──
async function onCitySelect(e){
  var slug=e.value;if(slug)location.hash='#/city/'+slug
}

// ── Search ──
function onSearchInput(e){
  if(e.key==='Enter'){
    var q=e.target.value.trim();if(q)location.hash='#/search/'+encodeURIComponent(q)
  }
}

// ── Load ──
async function load(){
  state.loading=true;renderShell()
  try{
    if(!state.cities.length){
      var c=await g('/zaarhub/cities');state.cities=c.cities||c||[]
    }
    if(state.page==='home')await loadHomepage()
    else if(state.page==='city')await loadCityPage()
    else if(state.page==='search')await loadSearchResults()
    else if(state.page==='deals')await loadDealsPage()
    else if(state.page==='events')await loadEventsPage()
  }catch(e){
    renderError(e.message)
  }
}

// ── Render Shell (Header) ──
function renderShell(){
  var cityOpts='<option value="">All Cities</option>'
  for(var i=0;i<state.cities.length;i++){
    var c=state.cities[i];var sel=c.slug===state.slug?'selected':''
    cityOpts+='<option value="'+c.slug+'" '+sel+'>'+esc(c.name)+' ('+c.business_count+' spots)</option>'
  }

  $$('#app').innerHTML=`
<div class="zh-header">
  <div class="zh-header-inner">
    <a class="zh-logo" href="#/" onclick="location.hash='#/'">
      <span>🌐</span>ZaarHub <small>Community</small>
    </a>
    <div class="zh-city-select">
      <select onchange="onCitySelect(this)">${cityOpts}</select>
    </div>
    <div class="zh-search-bar">
      <span class="icon">🔍</span>
      <input type="text" placeholder="Search businesses, categories..." onkeydown="onSearchInput(event)" value="${esc(state.searchQuery)}">
    </div>
    <div class="zh-nav-links" id="zh-desktop-nav">
      <a href="#/deals">🎁 Deals</a>
      <a href="#/events">📅 Events</a>
      <a href="#/about">ℹ️ About</a>
      <a href="/portal" class="zh-btn-primary">+ Add Business</a>
    </div>
    <button class="zh-notif-bell" onclick="location.hash='#/notifications'" title="Notifications" style="background:none;border:none;cursor:pointer">
      🔔<span class="zh-notif-dot" id="zh-notif-dot"></span>
    </button>
    <a href="/visitor" class="zh-signin-btn" id="zh-signin-btn">
      👤 Sign In
    </a>
    <div class="zh-role-switcher" id="zh-role-switcher" style="display:none">
      <button class="active" data-role="resident" onclick="switchRole('resident',this)">Resident View</button>
      <button data-role="owner" onclick="switchRole('owner',this)">Owner Dashboard</button>
    </div>
    <button class="zh-hamburger" onclick="toggleMobile()">☰</button>
  </div>
  <div id="zh-mobile-nav" class="zh-nav-links" style="display:none">
    <a href="#/deals" onclick="closeMobile()">🎁 Deals & Perks</a>
    <a href="#/events" onclick="closeMobile()">📅 Community Events</a>
    <a href="#/about" onclick="closeMobile()">ℹ️ About ZaarHub</a>

// ── Happening Today Ticker ──
var _todayInterval=null
var _todayMessages=[]
var _todayIdx=0

function startTodayTicker(messages){
  var el=document.getElementById('zh-today-ticker')
  var msgEl=document.getElementById('zh-today-msg')
  if(!el||!msgEl)return
  if(!messages||!messages.length){el.style.display='none';return}
  _todayMessages=messages
  _todayIdx=0
  el.style.display='flex'
  msgEl.textContent=messages[0]
  if(_todayInterval)clearInterval(_todayInterval)
  _todayInterval=setInterval(function(){
    _todayIdx=(_todayIdx+1)%_todayMessages.length
    msgEl.classList.add('fade-out')
    setTimeout(function(){
      msgEl.textContent=_todayMessages[_todayIdx]
      msgEl.classList.remove('fade-out')
      msgEl.classList.add('fade-in')
    },300)
    setTimeout(function(){msgEl.classList.remove('fade-in')},600)
  },8000)
}

function buildTodayMessages(d,deals,events,spotlights){
  var msgs=[]
  if(deals&&deals.length){
    for(var i=0;i<Math.min(deals.length,3);i++){
      var dl=deals[i];msgs.push('🎉 Deal: '+esc(dl.title)+' at '+esc(dl.business_name||'')+(dl.deal_price?' - $'+dl.deal_price:''))
    }
  }
  if(events&&events.length){
    for(var i=0;i<Math.min(events.length,3);i++){
      var ev=events[i]
      msgs.push('📅 Event: '+esc(ev.title)+(ev.location?' at '+esc(ev.location):''))
    }
  }
  if(spotlights&&spotlights.length){
    msgs.push('⭐ Visit '+esc(spotlights[0].name)+' - Featured Local Business!')
  }
  if(!msgs.length)msgs.push('☀️ Discover your local community today!')
  return msgs
}

var _tickerDismissed=false;

  _tickerDismissed=true;

  if(el)el.style.display='none';
}

var _tickerInterval=null;

async function loadTicker(){
  if(_tickerDismissed)return;
  // Try to get notifications for first available city
  if(!state.cities||!state.cities.length)return;
  var dirSlug=state.slug||state.cities[0].slug;
  if(!dirSlug)return;
  try{
    // Convert slug to id via cities list
    var city=state.cities.find(function(c){return c.slug===dirSlug});
    if(!city)city=state.cities[0];
    if(!city)return;
    // Try to find directory_id — city response has id
    if(!city.id)return;
    var notifs=await g('/notifications/'+city.id);
    var list=Array.isArray(notifs)?notifs:[];
    if(!list.length){return}
    var inner=document.getElementById('zh-ticker-inner');
    if(!inner)return;
    var html='';
    for(var i=0;i<list.length;i++){
      var n=list[i];
      var icon=n.notification_type==='warning'?'⚠️':n.notification_type==='promo'?'🎉':n.notification_type==='alert'?'🔴':'💡';
      html+='<span class="zh-ticker-item">'+icon+' '+esc(n.message);
      if(n.link_text)html+=' <a href="'+esc(n.link_url||'#')+'" target="_blank">'+esc(n.link_text)+'</a>';
      html+='</span>';
    }
    inner.innerHTML=html;
    var ticker=document.getElementById('zh-ticker');
    if(ticker&&html){ticker.style.display='block'}
  }catch(e){/* silently fail */}
}

var _cityView='list'
var _cityMap=null
var _cityMapInitialized=false

function setCityView(view){
  _cityView=view
  var content=document.getElementById('zh-city-content')
  if(!content)return
  content.classList.remove('zh-city-view-split','zh-city-view-map')
  if(view==='split')content.classList.add('zh-city-view-split')
  else if(view==='map')content.classList.add('zh-city-view-map')
  if(view==='map'||view==='split'){
    var mapEl=document.getElementById('zh-city-map')
    if(mapEl)mapEl.classList.add('active')
    setTimeout(function(){if(!_cityMapInitialized)initCityMap();else{_cityMap.invalidateSize()}},100)
  }else{
    var mapEl=document.getElementById('zh-city-map')
    if(mapEl)mapEl.classList.remove('active')
  }
  // Update toggle buttons
  var btns=document.querySelectorAll('.zh-view-toggle button')
  btns.forEach(function(b){b.classList.remove('active')})
  var activeBtn=document.querySelector('.zh-view-toggle button[data-view="'+view+'"]')
  if(activeBtn)activeBtn.classList.add('active')
}

function initCityMap(){
  var mapEl=document.getElementById('zh-city-map')
  if(!mapEl||_cityMapInitialized)return
  if(typeof L==='undefined'){console.warn('Leaflet not loaded');return}
  _cityMap=L.map('zh-city-map').setView([28.5383,-81.3792],10)
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'© <a href="https://www.openstreetmap.org/copyright">OSM</a>',
    maxZoom:19
  }).addTo(_cityMap)
  _cityMapInitialized=true
  // Get business data and add markers
  var bizCards=document.querySelectorAll('.zh-biz-card[data-lat][data-lng]')
  bizCards.forEach(function(card){
    var lat=parseFloat(card.getAttribute('data-lat'))
    var lng=parseFloat(card.getAttribute('data-lng'))
    if(isNaN(lat)||isNaN(lng))return
    var name=card.getAttribute('data-name')||'Business'
    var slug=card.getAttribute('data-slug')||''
    var id=card.getAttribute('data-id')||''
    var marker=L.marker([lat,lng]).addTo(_cityMap)
    marker.bindPopup('<strong>'+esc(name)+'</strong><br><a href="#/city/'+slug+'/biz/'+id+'" style="color:var(--teal)">View Business →</a>')
  })
}

function closeCollectionsModal(){
  var el=document.getElementById('zh-collections-overlay')
  if(el)el.remove()
}

function createCollection(){
  var inp=document.getElementById('zh-new-collection-name')
  if(!inp||!inp.value.trim())return
  var cols=loadCollections()
  cols.push({name:inp.value.trim(),businesses:[]})
  saveCollections(cols)
  inp.value=''
  // Refresh list
  var list=document.getElementById('zh-collections-list')
  if(!list)return
  var col=cols[cols.length-1]
  var item=document.createElement('div')
  item.className='zh-collection-item'
  item.onclick=function(){toggleCollectionList(item)}
  item.innerHTML='<div class="name">📑 '+esc(col.name)+' <span style="font-size:.75rem;color:var(--text-light);font-weight:400">(0)</span></div><div class="count">0 saved businesses</div><div class="biz-list"></div>'
  var empty=document.querySelector('.zh-collection-empty')
  if(empty)empty.remove()
  list.appendChild(item)
}

function toggleCollectionList(el){
  var list=el.querySelector('.biz-list')
  if(list)list.classList.toggle('open')
}

// ── Save Business to Collection ──
function saveBusinessToCollection(name,slug,id,buttonEl){
  var cols=loadCollections()
  // Check if already saved
  var existingCol=findCollectionForBiz(name)
  if(existingCol){
    // Remove
    removeBizFromCollections(name)
    if(buttonEl){buttonEl.classList.remove('save-active');buttonEl.innerHTML='☆ Save'}
    return
  }
  // If no collections, prompt to create first
  if(!cols.length){
    openCollectionsModal()
    return
  }
  // Show quick picker modal
  var overlay=document.createElement('div')
  overlay.className='zh-modal-overlay'
  overlay.style.zIndex='1100'
  overlay.onclick=function(e){if(e.target===overlay)overlay.remove()}
  var html='<div class="zh-modal" style="max-width:360px"><button class="zh-modal-close" onclick="this.closest(\'.zh-modal-overlay\').remove()">✕</button><h3>💾 Save to Collection</h3>'
  for(var i=0;i<cols.length;i++){
    html+='<div class="zh-collection-item" onclick="addBizToCollection('+i+',\''+esc(name.replace(/'/g,"\\'"))+'\',\''+esc(slug.replace(/'/g,"\\'"))+'\',\''+esc(String(id).replace(/'/g,"\\'"))+'\',this)"><div class="name">📑 '+esc(cols[i].name)+'</div><div class="count">'+cols[i].businesses.length+' saved</div></div>'
  }
  html+='</div>'
  overlay.innerHTML=html
  document.body.appendChild(overlay)
}

function addBizToCollection(idx,name,slug,id,el){
  var cols=loadCollections()
  if(!cols[idx])return
  cols[idx].businesses.push({id:id,name:name,slug:slug})
  saveCollections(cols)
  // Update button
  var btn=document.querySelector('.zh-biz-card[data-name="'+esc(name)+'"] .action.save, .zh-biz-card[data-name="'+esc(name)+'"] .zh-biz-actions-row .action:last-child')
  if(btn){btn.classList.add('save-active');btn.innerHTML='★ Saved'}
  // Close picker
  var overlay=el.closest('.zh-modal-overlay')
  if(overlay)overlay.remove()
}

// ── Ad Slot Rendering ──
// Fetch active ads for a directory and return grouped by zone_key
async function fetchActiveAds(dirId){
  if(!dirId)return {};
  try{
    var resp=await fetch('/api/v1/ads/active/'+dirId);
    var ads=await resp.json();
    if(!Array.isArray(ads))return {};
    var grouped={};
    for(var i=0;i<ads.length;i++){
      var a=ads[i];
      if(!grouped[a.zone_key])grouped[a.zone_key]=[];
      grouped[a.zone_key].push(a);
    }
    return grouped;
  }catch(e){
    console.warn('Ad fetch failed:',e);
    return {};
  }
}

// Render a single ad slot at the given container
function renderAdSlot(zoneKey, containerId, ads){
  var container=document.getElementById(containerId);
  if(!container)return;
  var group=ads[zoneKey];
  if(!group||!group.length){
    container.classList.remove('active');
    container.style.display='none';
    container.innerHTML='';
    return;
  }
  var ad=group[0]; // Pick first ad for the zone
  var w=ad.width||728;
  var h=ad.height||90;
  var imgStyle='max-width:100%;height:auto;border-radius:var(--radius);display:block;width:'+w+'px';
  container.innerHTML='<div class="ad-label">Sponsored</div>'+
    '<a href="'+esc(ad.target_url||'#')+'" target="_blank" rel="sponsored noopener">'+
      '<img src="'+esc(ad.image_url)+'" width="'+w+'" height="'+h+'" alt="'+esc(ad.sponsor_name)+' ad" style="'+imgStyle+'">'+
    '</a>'+
    '<div class="sponsor-name">'+esc(ad.sponsor_name)+'</div>';
  container.style.display='';
  container.classList.add('active');
}

// Load and render ads for a given directory
async function loadAdsForDirectory(dirId, zones){
  var ads=await fetchActiveAds(dirId);
  var hasAny=false;
  for(var i=0;i<zones.length;i++){
    var z=zones[i];
    renderAdSlot(z.zoneKey, z.containerId, ads);
    if(ads[z.zoneKey]&&ads[z.zoneKey].length)hasAny=true;
  }
  return hasAny;
}

// ── Role Switcher ──
function switchRole(mode,btn){
  setRoleMode(mode)
  var switcher=document.getElementById('zh-role-switcher')
  if(switcher){
    var btns=switcher.querySelectorAll('button')
    btns.forEach(function(b){b.classList.remove('active')})
    if(btn)btn.classList.add('active')
    else{
      var match=switcher.querySelector('button[data-role="'+mode+'"]')
      if(match)match.classList.add('active')
    }
  }
  // Update sign-in button link based on mode
  var signinBtn=document.getElementById('zh-signin-btn')
  if(signinBtn)signinBtn.href=mode==='owner'?'/portal':'/visitor'
}

// ── Weather API (Open-Meteo, no key needed) ──
var weatherCache={}

async function fetchWeather(city, lat, lng) {
  var key = city + '_' + lat.toFixed(2) + '_' + lng.toFixed(2);
  if (weatherCache[key]) {
    updateWeatherDisplay(city, weatherCache[key]);
    return;
  }
  try {
    var resp = await fetch(
      'https://api.open-meteo.com/v1/forecast?latitude=' + lat + '&longitude=' + lng + '&current=temperature_2m,weather_code&temperature_unit=fahrenheit'
    );
    var data = await resp.json();
    var temp = Math.round(data.current.temperature_2m);
    var code = data.current.weather_code;
    var emoji = getWeatherEmoji(code);
    var result = emoji + ' ' + city + ' — ' + temp + '°F';
    weatherCache[key] = result;
    updateWeatherDisplay(city, result);
  } catch(e) {
    updateWeatherDisplay(city, '🌤️ ' + city);
  }
}

function getWeatherEmoji(code) {
  if (code === 0) return '☀️';
  if (code <= 3) return '⛅';
  if (code <= 48) return '☁️';
  if (code <= 57) return '🌧️';
  if (code <= 67) return '🌧️';
  if (code <= 77) return '❄️';
  if (code <= 82) return '🌦️';
  if (code <= 86) return '🌧️';
  return '🌤️';
}

function updateWeatherDisplay(city, text) {
  var el = document.getElementById('zh-city-weather');
  if (!el) return;
  el.style.opacity = '0';
  el.style.transition = 'opacity .5s ease';
  setTimeout(function() {
    el.textContent = text;
    el.style.opacity = '1';
  }, 50);
}
